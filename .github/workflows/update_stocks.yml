name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import time

          def get_data():
              # 策略 A: 政府 Open Data JSON 介面 (最不容易被阻擋)
              # 網址參考自 https://data.gov.tw/dataset/11764
              urls = [
                  "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=json",
                  "https://openapi.twse.com.tw/v1/exchangeReport/BWIBYK_ALL"
              ]
              
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
              }

              for url in urls:
                  try:
                      print(f"📡 嘗試從 {url} 抓取數據...")
                      resp = requests.get(url, headers=headers, timeout=30)
                      
                      # 處理 OpenAPI 格式 (可能是 List)
                      data = resp.json()
                      raw_list = data if isinstance(data, list) else data.get('data', [])
                      
                      if not raw_list:
                          continue

                      stocks = []
                      for row in raw_list:
                          # 判定是 JSON 陣列還是物件 (OpenAPI 回傳物件, 官網回傳陣列)
                          is_dict = isinstance(row, dict)
                          sid = row.get('Code', '') if is_dict else row[0]
                          name = row.get('Name', '') if is_dict else row[1]
                          yield_rate = row.get('YieldRatio', 0) if is_dict else row[2]
                          pbr = row.get('PBRatio', 0) if is_dict else row[5]
                          price = row.get('ClosingPrice', 0) if is_dict else row[8]

                          if len(str(sid)) == 4:
                              try:
                                  def clean(v):
                                      s = str(v).replace(',', '').strip()
                                      return float(s) if s not in ['', '-', 'N/A'] else 0.0

                                  stocks.append({
                                      "id": str(sid),
                                      "name": str(name),
                                      "price": clean(price),
                                      "pbr": clean(pbr),
                                      "totalYield": clean(yield_rate),
                                      "category": "一般產業"
                                  })
                              except: continue
                      
                      if len(stocks) > 500:
                          return stocks
                  except Exception as e:
                      print(f"⚠️ 此來源失敗: {e}")
                      continue
              return []

          final_res = get_data()
          if final_res:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_res, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功！獲取 {len(final_res)} 檔具備 PBR 與殖利率的個股。")
          else:
              print("❌ 所有來源均失效，請檢查證交所是否進入維護期。")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正數據源與解析邏輯" && git push)
