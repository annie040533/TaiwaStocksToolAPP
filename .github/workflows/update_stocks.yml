name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import yfinance as yf
          import time

          def get_full_stock_list():
              # 直接從證交所獲取全市場中文名稱清單 (此 API 通常只會回傳 JSON，較少封鎖)
              # 如果這裡被封鎖，我們至少保證代號是正確的
              try:
                  url = "https://openapi.twse.com.tw/v1/exchangeReport/BWIBYK_ALL"
                  items = requests.get(url, timeout=15).json()
                  return {i['Code']: i['Name'] for i in items if len(i['Code']) == 4}
              except:
                  # 萬一被封鎖，提供基礎權值股對照
                  return {"2330": "台積電", "2317": "鴻海", "2454": "聯發科", "1477": "聚陽", "1476": "儒鴻"}

          def fetch_data():
              name_map = get_full_stock_list()
              # 擴大掃描範圍，確保資料量達到 400-500 筆以上
              target_ids = list(name_map.keys())
              if len(target_ids) < 100:
                  target_ids = [str(i) for i in range(1101, 2500)] # 強制掃描常用區段
              
              final_stocks = []
              print(f"📡 啟動全市場掃描，預計處理 {len(target_ids)} 檔...")
              
              # 分批處理以提高成功率
              for i in range(0, len(target_ids), 20):
                  batch = target_ids[i:i+20]
                  tickers = yf.Tickers([f"{sid}.TW" for sid in batch])
                  
                  for sid in batch:
                      try:
                          info = tickers.tickers[f"{sid}.TW"].info
                          price = info.get('currentPrice') or info.get('regularMarketPrice') or 0
                          if price == 0: continue
                          
                          # 殖利率清洗 (解決截圖中的 511% 異常)
                          y_val = info.get('dividendYield', 0) or 0
                          total_y = float(y_val) * 100 if y_val < 0.2 else float(y_val)
                          
                          final_stocks.append({
                              "id": sid,
                              "name": name_map.get(sid, info.get('shortName', sid)), # 優先使用證交所中文名
                              "price": round(float(price), 2),
                              "pbr": round(float(info.get('priceToBook', 0)), 2),
                              "totalYield": round(total_y, 2),
                              "cashYield": round(total_y, 2),
                              "stockYield": 0.0,
                              "category": info.get('sector', '一般產業')
                          })
                      except: continue
                  time.sleep(0.2) # 稍微避開頻率限制
              
              return final_stocks

          res = fetch_data()
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(res, f, ensure_ascii=False, indent=2)
          print(f"✅ 成功產出 {len(res)} 筆資料")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正中文名稱與擴大抓取量" && git push)
