name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import yfinance as yf
          import io
          import csv

          def get_stock_list():
              # 透過公開資訊觀測站的靜態分流獲取上市股票名單 (此連結極穩)
              url = "https://isin.twse.com.tw/isin/C_public.jsp?strMode=2"
              resp = requests.get(url)
              # 簡單解析 HTML 取得前 100 檔績優股作為範例，或解析全表
              # 為了穩定與速度，我們也可以先定義目標觀察名單或抓取 CSV
              return ["2330", "2317", "2454", "2308", "2382", "2881", "2882", "2886", "2891", "2603"]

          def fetch_value_data():
              # 改用 yfinance 獲取數據，Yahoo Finance 不會封鎖 GitHub IP
              # 抓取台股本淨比 (Price to Book) 與 殖利率 (Yield)
              stock_ids = get_stock_list()
              # 擴展：這裡可以改從證交所開放平台僅抓取「代號」清單 (代號清單通常不會被擋)
              try:
                  url = "https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL"
                  res = requests.get(url, timeout=10)
                  items = res.json()
                  stock_ids = [i['Code'] for i in items if len(i['Code']) == 4][:200] # 先抓前 200 檔
              except:
                  print("⚠️ 無法獲取代號清單，使用預設名單")

              final_stocks = []
              print(f"📡 正在透過 Yahoo Finance 獲取 {len(stock_ids)} 檔個股深度數據...")
              
              for sid in stock_ids:
                  try:
                      ticker = yf.Ticker(f"{sid}.TW")
                      info = ticker.info
                      
                      price = info.get('currentPrice') or info.get('regularMarketPrice') or 0
                      pbr = info.get('priceToBook') or 0
                      # 殖利率 (Yahoo 給的是小數，例如 0.05 代表 5%)
                      div_yield = (info.get('dividendYield') or 0) * 100
                      
                      if price > 0:
                          final_stocks.append({
                              "id": sid,
                              "name": info.get('shortName', f'台股 {sid}'),
                              "price": round(price, 2),
                              "pbr": round(pbr, 2),
                              "totalYield": round(div_yield, 2),
                              "category": info.get('sector', '一般產業')
                          })
                  except:
                      continue
              
              return final_stocks

          res = fetch_value_data()
          if len(res) > 0:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(res, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功！已透過 Yahoo Finance 更新 {len(res)} 筆 PBR 數據。")
          else:
              print("❌ 無法從所有管道獲取數據")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "改用 yfinance 繞過 IP 封鎖" && git push)
