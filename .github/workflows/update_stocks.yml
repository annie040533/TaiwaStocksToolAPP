name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import csv
          import json
          import io

          def get_data():
              # 策略：改用靜態分流路徑，此路徑封鎖 IP 機率最低
              # 來源：個股日本益比、殖利率及淨值比 (Dataset 11764)
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
              
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
              }

              try:
                  print("📡 嘗試從 Open Data 分流路徑抓取...")
                  resp = requests.get(url, headers=headers, timeout=60)
                  resp.encoding = 'utf-8'

                  if resp.status_code != 200:
                      print(f"🛑 HTTP 錯誤: {resp.status_code}")
                      return []

                  # 使用內建 csv 模組手動解析，避免 Pandas 解析錯誤
                  f = io.StringIO(resp.text)
                  reader = csv.reader(f)
                  
                  stocks = []
                  header = None
                  
                  for row in reader:
                      # 自動尋找標題列
                      if "證券代號" in row:
                          header = [c.replace('"', '').strip() for c in row]
                          continue
                      
                      if header and len(row) >= len(header):
                          data_dict = dict(zip(header, row))
                          sid = data_dict.get('證券代號', '').replace('"', '').strip()
                          
                          if len(sid) == 4 and sid.isdigit():
                              try:
                                  def clean(v):
                                      s = str(v).replace('"', '').replace(',', '').strip()
                                      return float(s) if s not in ['', '-', 'None'] else 0.0

                                  # 此表包含 PBR 與 殖利率
                                  price = clean(data_dict.get('收盤價', 0))
                                  if price > 0:
                                      stocks.append({
                                          "id": sid,
                                          "name": data_dict.get('證券名稱', '').replace('"', '').strip(),
                                          "price": price,
                                          "pbr": clean(data_dict.get('本淨比', 0)),
                                          "totalYield": clean(data_dict.get('殖利率(%)', 0)),
                                          "category": "一般產業"
                                      })
                              except: continue
                  return stocks
              except Exception as e:
                  print(f"🔥 錯誤: {e}")
                  return []

          res = get_data()
          if len(res) > 300:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(res, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功！產出 {len(res)} 筆完整資料。")
          else:
              # 最終備用策略：如果真的完全被擋，則發出警報但不中斷 Workflow
              print("❌ 無法抓取資料，可能證交所正在全面封鎖 GitHub IP。")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正資料抓取策略" && git push)
