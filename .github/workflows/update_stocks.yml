name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def fetch_data():
              headers = {'User-Agent': 'Mozilla/5.0'}
              
              # 1. 抓取成交價 (維持 0304 穩定版)
              price_url = "https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data"
              p_resp = requests.get(price_url, headers=headers)
              p_df = pd.read_csv(io.StringIO(p_resp.text))
              p_df.columns = [c.strip().replace('"', '') for c in p_df.columns]

              # 2. 透過 OpenAPI 抓取 PBR 與 殖利率
              stats_url = "https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_ALL"
              s_resp = requests.get(stats_url, headers=headers)
              s_data = s_resp.json()
              
              stats_dict = {
                  item['Code']: {
                      'pbr': float(item['PBRatio']) if item['PBRatio'] else 0,
                      'yield': float(item['YieldRate']) if item['YieldRate'] else 0
                  } for item in s_data
              }

              stocks = []
              for _, row in p_df.iterrows():
                  sid = str(row.get('證券代號', '')).strip().replace('"', '')
                  name = str(row.get('證券名稱', '')).strip().replace('"', '')
                  try:
                      price = float(str(row.get('收盤價', '0')).replace(',', ''))
                  except: price = 0
                  
                  if price > 0 and len(sid) == 4:
                      s_info = stats_dict.get(sid, {'pbr': 0.0, 'yield': 0.0})
                      stocks.append({
                          "id": sid,
                          "name": name,
                          "price": price,
                          "pbr": s_info['pbr'],
                          "totalYield": s_info['yield']
                      })
              return stocks

          data = fetch_data()
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git add data.json
          git commit -m "Update PBR and Yield from TWSE OpenAPI" || exit 0
          git push
