name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import os
          from io import StringIO

          url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
          
          try:
              print("📡 嘗試連線證交所...")
              response = requests.get(url, timeout=30)
              response.encoding = 'cp950'
              
              if response.status_code != 200 or len(response.text) < 100:
                  raise Exception("證交所回傳資料異常")

              df = pd.read_csv(StringIO(response.text))
              df.columns = [c.strip() for c in df.columns]
              
              # 清洗數據
              stocks = []
              for _, r in df.iterrows():
                  sid = str(r.get('證券代號', '')).strip()
                  if len(sid) == 4 and sid.isdigit():
                      price = pd.to_numeric(r.get('收盤價', 0), errors='coerce')
                      pbr = pd.to_numeric(r.get('本淨比', 0), errors='coerce')
                      yield_rate = pd.to_numeric(r.get('殖利率(%)', 0), errors='coerce')
                      
                      if price > 0:
                          stocks.append({
                              "id": sid,
                              "name": str(r.get('證券名稱', '')).strip(),
                              "price": float(price),
                              "pbr": float(pbr),
                              "totalYield": float(yield_rate),
                              "industry": "上市股票"
                          })
              
              if len(stocks) > 0:
                  with open('data.json', 'w', encoding='utf-8') as f:
                      json.dump(stocks, f, ensure_ascii=False)
                  print(f"✅ 成功產出 {len(stocks)} 筆資料")
              else:
                  print("⚠️ 抓到 0 筆有效資料，跳過存檔以保護舊數據")

          except Exception as e:
              print(f"❌ 執行錯誤: {e}")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "自動更新股價數據" || exit 0
          git push
