name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5' # 台北時間週一至五自動更新
  workflow_dispatch: # 支援手動觸發

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import os
          from io import StringIO

          url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
          
          try:
              print("📡 正在同步證交所數據...")
              # 使用 GET 請求並設定 timeout 避免掛死
              response = requests.get(url, timeout=30)
              response.encoding = 'cp950' # 強制 Big5 編碼修正亂碼
              
              df = pd.read_csv(StringIO(response.text))
              
              # 欄位模糊校正 (確保抓到 證券代號, 證券名稱, 收盤價, 本淨比, 殖利率)
              df.columns = [c.strip() for c in df.columns]
              
              stocks = []
              for _, r in df.iterrows():
                  sid = str(r.get('證券代號', '')).strip()
                  # 只篩選 4 位數的一般股票
                  if len(sid) == 4 and sid.isdigit():
                      price = pd.to_numeric(r.get('收盤價', 0), errors='coerce')
                      pbr = pd.to_numeric(r.get('本淨比', 0), errors='coerce')
                      yield_rate = pd.to_numeric(r.get('殖利率(%)', 0), errors='coerce')
                      
                      # 排除缺一資料者 (成交價為 0 或 PBR 為 0)
                      if price > 0:
                          stocks.append({
                              "id": sid,
                              "name": str(r.get('證券名稱', '')).strip(),
                              "price": float(price),
                              "pbr": float(pbr),
                              "totalYield": float(yield_rate),
                              "industry": "上市股票" # 後續可根據代碼範圍細分產業
                          })
              
              # 預設按殖利率由高到低排序
              stocks.sort(key=lambda x: x['totalYield'], reverse=True)

              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(stocks, f, ensure_ascii=False)
              print(f"✅ 成功產出 {len(stocks)} 筆資料")

          except Exception as e:
              print(f"❌ 錯誤: {e}")
              if not os.path.exists('data.json'):
                  with open('data.json', 'w') as f: json.dump([], f)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update data.json" && git push)
