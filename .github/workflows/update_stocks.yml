name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io
          import time

          def fetch_data():
              # 換成這一個連結，這是證交所 Open Data 的原始 CSV 接口，通常不帶 Web 防護
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=csv"
              
              # 加強 Headers 偽裝，偽裝成是從官網來的請求
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0 Safari/537.36',
                  'Referer': 'https://www.twse.com.tw/zh/page/trading/exchange/BWIBYK.html',
                  'Accept': 'text/csv,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8'
              }
              
              stocks = []
              try:
                  print("📡 啟動低速請求模式...")
                  time.sleep(5)
                  
                  resp = requests.get(url, headers=headers, timeout=60)
                  
                  # 檢查是否又抓到 HTML
                  if "<html" in resp.text.lower():
                      print("❌ 警告：證交所回傳了 HTML 頁面而非 CSV 資料。嘗試備援方案...")
                      # 備援：換一個更原始的 Open Data 連結
                      url = "https://openapi.twse.com.tw/v1/exchangeReport/BWIBYK_ALL"
                      resp = requests.get(url, headers=headers)
                      # 這個備援連結回傳的是 JSON
                      data = resp.json()
                      for item in data:
                          sid = item.get('Code', '')
                          if len(sid) == 4 and sid.isdigit():
                              stocks.append({
                                  "id": sid,
                                  "name": item.get('Name', ''),
                                  "market": "市",
                                  "price": float(item.get('ClosingPrice', 0)) if item.get('ClosingPrice') else 0,
                                  "pbr": float(item.get('PBRatio', 0)) if item.get('PBRatio') else 0,
                                  "cashYield": float(item.get('YieldRate', 0)) if item.get('YieldRate') else 0,
                                  "stockYield": 0.0,
                                  "totalYield": float(item.get('YieldRate', 0)) if item.get('YieldRate') else 0
                              })
                      return stocks

                  # 若正常收到 CSV，則執行原本的解析
                  content = resp.content.decode('cp950', errors='ignore')
                  lines = content.splitlines()
                  header_idx = -1
                  for i, line in enumerate(lines):
                      if "證券代號" in line:
                          header_idx = i
                          break
                  
                  if header_idx != -1:
                      df = pd.read_csv(io.StringIO("\n".join(lines[header_idx:])))
                      df.columns = [c.strip().replace('"', '') for c in df.columns]
                      for _, row in df.iterrows():
                          sid = str(row.get('證券代號', '')).strip().replace('"', '')
                          if len(sid) == 4 and sid.isdigit():
                              try:
                                  yld = float(str(row.get('殖利率(%)', 0)).replace(',', ''))
                                  price = float(str(row.get('收盤價', 0)).replace(',', ''))
                                  stocks.append({
                                      "id": sid, "name": str(row.get('證券名稱', '')),
                                      "market": "市", "price": price, "pbr": float(row.get('本淨比', 0)),
                                      "cashYield": yld, "stockYield": 0.0, "totalYield": yld
                                  })
                              except: continue
                  
                  return stocks
              except Exception as e:
                  print(f"❌ 發生錯誤: {e}")
                  return []

          final_data = fetch_data()
          if len(final_data) > 300:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_data, f, ensure_ascii=False, indent=2)
              print(f"✅ 成功寫入 {len(final_data)} 筆資料！")
          else:
              print(f"🛑 資料量過低 ({len(final_data)})，不執行更新。")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新股價數據" && git push)
