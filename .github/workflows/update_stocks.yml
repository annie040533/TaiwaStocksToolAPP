name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import yfinance as yf
          import json
          import time

          # 強制中文化字典 (確保截圖中的英文全部消失)
          CN_MAP = {
              "2330": "台積電", "2317": "鴻海", "2454": "聯發科", "2382": "廣達", "2357": "華碩",
              "2379": "瑞昱", "2496": "卓越", "2461": "光群雷", "2387": "精元", "2393": "億光",
              "2603": "長榮", "2609": "陽明", "2881": "富邦金", "2882": "國泰金", "2303": "聯電",
              "2886": "兆豐金", "2884": "玉山金", "5880": "合庫金", "2891": "中信金", "2892": "第一金",
              "2308": "台達電", "2301": "光寶科", "2324": "仁寶", "2353": "宏碁", "2409": "友達"
          }

          def get_pchome_cat(sid):
              s = int(sid)
              if 1101 <= s <= 1199: return "水泥工業"
              if 1201 <= s <= 1299: return "食品工業"
              if 2301 <= s <= 2399: return "半導體/電腦設備"
              if 2401 <= s <= 2499: return "電子零組件/通信"
              if 2601 <= s <= 2699: return "航運業"
              if 2801 <= s <= 2899: return "金融保險"
              return "其他電子業"

          # 擴大掃描清單 (精選 600 檔)
          LIST_A = [str(i) for i in range(1101, 1300)]
          LIST_B = [str(i) for i in range(2301, 2500)]
          LIST_C = [str(i) for i in range(2601, 2650)]
          LIST_D = [str(i) for i in range(2801, 2900)]
          ALL_IDS = LIST_A + LIST_B + LIST_C + LIST_D

          final_data = []
          print(f"📡 啟動掃描: {len(ALL_IDS)} 檔標的...")

          for i in range(0, len(ALL_IDS), 50):
              batch = ALL_IDS[i:i+50]
              # 使用批次抓取減少被封鎖機率
              tickers = yf.Tickers([f"{s}.TW" for s in batch])
              for sid in batch:
                  try:
                      # 這裡加入 try 防止單一 404 導致整個程式崩潰
                      info = tickers.tickers[f"{sid}.TW"].info
                      price = info.get('currentPrice') or info.get('regularMarketPrice') or 0
                      if price < 5: continue
                      
                      raw_y = info.get('dividendYield', 0) or 0
                      # 殖利率格式統一
                      total_y = round(raw_y * 100, 2) if raw_y < 0.5 else round(raw_y, 2)

                      final_data.append({
                          "id": sid,
                          "name": CN_MAP.get(sid, info.get('shortName', sid).split(' ')[0]),
                          "price": float(price),
                          "totalYield": total_y,
                          "category": get_pchome_cat(sid)
                      })
                  except Exception:
                      continue # 遇到 404 直接跳過，不影響其他資料
              time.sleep(1)

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(final_data, f, ensure_ascii=False, indent=2)
          print(f"✅ 完成！成功產出 {len(final_data)} 筆資料")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add data.json
          git commit -m "修正404崩潰與補完資料" || exit 0
          git push
