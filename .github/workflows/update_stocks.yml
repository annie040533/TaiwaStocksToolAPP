name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import csv
          import json
          import io

          def get_data():
              # 使用政府資料開放平台指定的 Open Data 連結 (包含 PBR 與殖利率)
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
              }
              
              try:
                  print("📡 正在讀取證交所 Open Data...")
                  resp = requests.get(url, headers=headers, timeout=30)
                  resp.encoding = 'utf-8'
                  
                  if resp.status_code != 200:
                      print(f"❌ HTTP 錯誤: {resp.status_code}")
                      return []

                  # 改用原生 csv 模組手動解析，避免格式錯亂
                  f = io.StringIO(resp.text)
                  reader = csv.reader(f)
                  
                  stocks = []
                  header = None
                  
                  for row in reader:
                      # 關鍵：尋找包含「證券代號」的那一行作為真正的標題列
                      if "證券代號" in row:
                          header = [c.replace('"', '').strip() for c in row]
                          continue
                      
                      # 找到標題後才開始處理數據
                      if header and len(row) >= len(header):
                          data_dict = dict(zip(header, row))
                          sid = data_dict.get('證券代號', '').replace('"', '').strip()
                          
                          # 篩選 4 位數個股
                          if len(sid) == 4 and sid.isdigit():
                              try:
                                  def clean(val):
                                      s = str(val).replace('"', '').replace(',', '').strip()
                                      return float(s) if s not in ['', '-', 'None'] else 0.0

                                  price = clean(data_dict.get('收盤價', 0))
                                  pbr = clean(data_dict.get('本淨比', 0))
                                  yield_ratio = clean(data_dict.get('殖利率(%)', 0))
                                  
                                  if price > 0:
                                      stocks.append({
                                          "id": sid,
                                          "name": data_dict.get('證券名稱', '').replace('"', '').strip(),
                                          "price": price,
                                          "pbr": pbr,
                                          "totalYield": yield_ratio,
                                          "category": "一般產業"
                                      })
                              except: continue
                  return stocks
              except Exception as e:
                  print(f"🔥 發生錯誤: {e}")
                  return []

          final_res = get_data()
          if len(final_res) > 300:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_res, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功！產出 {len(final_res)} 筆含 PBR 數據。")
          else:
              print(f"🛑 抓取數量異常 ({len(final_res)})")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正 CSV 解析邏輯" && git push)
