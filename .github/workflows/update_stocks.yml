name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def fetch_data():
              headers = {'User-Agent': 'Mozilla/5.0'}
              
              # 1. 抓取成交價 (修正版: 處理 CSV 格式錯誤)
              price_url = "https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data"
              p_resp = requests.get(price_url, headers=headers)
              p_df = pd.read_csv(io.StringIO(p_resp.text))
              # 清理可能的多餘欄位
              p_df.columns = [c.strip().replace('"', '') for c in p_df.columns]

              # 2. 抓取 淨值比(PBR) 與 殖利率 (與玩股網同步的來源)
              # 這個 API 專門提供當日統計資料
              stats_url = "https://www.twse.com.tw/exchangeReport/BWIBYM_ALL?response=open_data"
              s_resp = requests.get(stats_url, headers=headers)
              # 處理 CSV 可能出現的說明文字行
              s_raw = s_resp.text.split('\n')
              s_clean = "\n".join([line for line in s_raw if len(line.split(',')) >= 7])
              s_df = pd.read_csv(io.StringIO(s_clean))
              s_df.columns = [c.strip().replace('"', '') for c in s_df.columns]
              
              stats_dict = {}
              for _, row in s_df.iterrows():
                  sid = str(row.get('證券代號', '')).strip().replace('"', '')
                  stats_dict[sid] = {
                      'pbr': float(str(row.get('股價淨值比', '0')).replace(',', '')),
                      'yield': float(str(row.get('殖利率(%)', '0')).replace(',', ''))
                  }

              stocks = []
              for _, row in p_df.iterrows():
                  sid = str(row.get('證券代號', '')).strip().replace('"', '')
                  name = str(row.get('證券名稱', '')).strip().replace('"', '')
                  try:
                      price = float(str(row.get('收盤價', '0')).replace(',', ''))
                  except: price = 0
                  
                  if price > 0 and len(sid) == 4:
                      s_info = stats_dict.get(sid, {'pbr': 0.0, 'yield': 0.0})
                      stocks.append({
                          "id": sid,
                          "name": name,
                          "price": price,
                          "pbr": s_info['pbr'],
                          "totalYield": s_info['yield']
                      })
              return stocks

          data = fetch_data()
          if data:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git add data.json
          git commit -m "Fix: CSV Parser and PBR Data" || exit 0
          git push
