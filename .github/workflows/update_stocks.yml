name: Update Stock Data
on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import io
          import json

          def get_data():
              # 使用 CSV 備用介面，這通常比 JSON OpenAPI 更不容易被 GitHub Actions 環境阻擋
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
              }
              
              try:
                  print("📡 嘗試從備用 CSV 連結抓取資料...")
                  resp = requests.get(url, headers=headers, timeout=30)
                  if resp.status_code != 200:
                      return []

                  # 解析 CSV (證交所 Open Data 格式)
                  df = pd.read_csv(io.StringIO(resp.text))
                  # 修正欄位名稱中的引號與空格
                  df.columns = [c.replace('"', '').strip() for c in df.columns]
                  
                  stocks = []
                  for _, row in df.iterrows():
                      sid = str(row.get('證券代號', '')).replace('"', '').strip()
                      if len(sid) == 4 and sid.isdigit():
                          try:
                              # 轉換數值並處理可能的千分位
                              p = float(str(row.get('收盤價', 0)).replace(',', ''))
                              y = float(str(row.get('殖利率(%)', 0)).replace(',', ''))
                              b = float(str(row.get('本淨比', 0)).replace(',', ''))
                              
                              if p > 0:
                                  stocks.append({
                                      "id": sid,
                                      "name": str(row.get('證券名稱', '')).replace('"', '').strip(),
                                      "price": p,
                                      "pbr": b,
                                      "totalYield": y,
                                      "category": "一般產業" # CSV 沒提供產業，由前端分類
                                  })
                          except: continue
                  return stocks
              except Exception as e:
                  print(f"🔥 錯誤: {e}")
                  return []

          final_data = get_data()
          if len(final_data) > 300:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_data, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功！產出 {len(final_data)} 筆資料。")
          else:
              print("🛑 資料獲取失敗，請檢查證交所連結是否變動。")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "改用 CSV 備用源以解決解析錯誤" && git push)
