name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import datetime

          def get_data():
              # 使用 FinMind API：個股本益比與殖利率數據 (包含 PBR)
              # 這個 API 來源穩定且對 GitHub Actions 友善
              url = "https://api.finmindtrade.com/api/v4/data"
              
              # 自動獲取最近一個工作日的日期
              target_date = (datetime.datetime.now() - datetime.timedelta(days=0)).strftime('%Y-%m-%d')
              
              params = {
                  "dataset": "TaiwanStockPestRatio",
                  "date": target_date
              }
              
              try:
                  print(f"📡 正在透過 FinMind API 獲取 {target_date} 數據...")
                  resp = requests.get(url, params=params, timeout=30)
                  data = resp.json()
                  
                  if data.get('msg') != 'success' or not data.get('data'):
                      print("⚠️ 今日數據尚未更新，嘗試抓取前一日...")
                      params['date'] = (datetime.datetime.now() - datetime.timedelta(days=1)).strftime('%Y-%m-%d')
                      resp = requests.get(url, params=params, timeout=30)
                      data = resp.json()

                  stocks = []
                  for item in data.get('data', []):
                      sid = item.get('stock_id')
                      # 只抓取 4 位數的個股
                      if len(sid) == 4 and sid.isdigit():
                          stocks.append({
                              "id": sid,
                              "name": f"個股 {sid}", # FinMind 此接口不含名稱，需由前端代碼或資料庫補齊
                              "price": float(item.get('dividend_yield', 0)), # 借用暫存，稍後前端校正
                              "pbr": float(item.get('pb', 0)),
                              "totalYield": float(item.get('dividend_yield', 0)),
                              "category": "一般產業"
                          })
                  return stocks
              except Exception as e:
                  print(f"🔥 FinMind API 發生錯誤: {e}")
                  return []

          res = get_data()
          if len(res) > 300:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(res, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功！透過 FinMind 獲取 {len(res)} 筆完整資料。")
          else:
              print("❌ 資料抓取失敗，請確認 API 狀態。")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "更換為 FinMind API 穩定源" && git push)
