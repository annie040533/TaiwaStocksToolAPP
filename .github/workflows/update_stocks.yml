name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        # 核心修正：補上 html5lib 與 beautifulsoup4
        run: pip install requests pandas lxml yfinance html5lib beautifulsoup4

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import time
          import random
          import io

          def fetch_goodinfo(url):
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'Referer': 'https://goodinfo.tw/tw/index.asp'
              }
              try:
                  print(f"📡 嘗試讀取 Goodinfo 表格...")
                  time.sleep(random.uniform(5, 8))
                  resp = requests.get(url, headers=headers, timeout=30)
                  resp.encoding = 'utf-8'
                  
                  # 使用 StringIO 包裝 HTML 並指定解析器
                  dfs = pd.read_html(io.StringIO(resp.text), flavor='bs4')
                  for df in dfs:
                      # 檢查關鍵字是否存在於 columns 或內容中
                      col_text = str(df.columns.tolist())
                      if '代號' in col_text or '名稱' in col_text:
                          return df
              except Exception as e:
                  print(f"⚠️ 讀取失敗: {e}")
              return None

          stocks = {}
          # 目標：低 PBR 排行榜 (資料較全面)
          pbr_url = "https://goodinfo.tw/tw/StockList.asp?MARKET_CAT=%E7%86%B1%E9%96%80%E6%8E%92%E8%A1%8C&INDUSTRY_CAT=PBR%E6%9C%80%E4%BD%8E%40%40%E8%82%A1%E5%83%B9%E6%B7%A8%E5%80%BC%E6%AF%94%28PBR%29%40%40PBR%E6%9C%80%E4%BD%8E&SHEET=%E4%BA%A4%E6%98%93%E7%8B%80%E6%B3%81&SHEET2=%E6%97%A5&RPT_TIME=%E6%9C%80%E6%96%B0%E8%B3%87%E6%96%99&RANK_RANGE=300"
          
          df_pbr = fetch_goodinfo(pbr_url)
          if df_pbr is not None:
              if isinstance(df_pbr.columns, pd.MultiIndex):
                  df_pbr.columns = df_pbr.columns.get_level_values(-1)
              
              for _, r in df_pbr.iterrows():
                  sid = str(r.get('代號', ''))
                  if len(sid) == 4 and sid.isdigit():
                      try:
                          stocks[sid] = {
                              "id": sid, "name": str(r.get('名稱', '')),
                              "price": float(r.get('收盤價', 0)),
                              "pbr": float(r.get('PBR', 0)),
                              "cashYield": 0.0, "stockYield": 0.0, "totalYield": 0.0,
                              "market": "市"
                          }
                      except: continue

          final_list = list(stocks.values())
          
          # 🚨 緊急保底：如果 Goodinfo 沒抓到，至少保留你上次成功的 Yahoo Finance 10 筆
          if not final_list:
              print("🚨 Goodinfo 失敗，嘗試讀取既有 data.json 作為基礎...")
              try:
                  with open('data.json', 'r', encoding='utf-8') as f:
                      final_list = json.load(f)
              except: pass

          if final_list:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_list, f, ensure_ascii=False, indent=2)
              print(f"🚀 任務完成！共存入 {len(final_list)} 筆個股資料")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 只有在 data.json 有變動時才 commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新股價數據" && git push)
