name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch and Process Data
        # 使用 | 符號可以確保 Python 程式碼不會出現紅色波浪底線
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import os
          from io import StringIO

          url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
          
          try:
              print("📡 正在同步證交所數據...")
              response = requests.get(url, timeout=30)
              # 強制編碼修正，避免亂碼導致抓不到資料
              csv_content = response.content.decode('cp950')
              
              df = pd.read_csv(StringIO(csv_content))
              
              # 欄位模糊對應，解決證交所欄位名稱變動問題
              cols = {
                  'id': ['代號', '代碼'],
                  'name': ['名稱'],
                  'price': ['收盤價'],
                  'pbr': ['本淨比'],
                  'yield': ['殖利率']
              }
              
              id_c = next((c for c in df.columns if any(k in c for k in cols['id'])), None)
              name_c = next((c for c in df.columns if any(k in c for k in cols['name'])), None)
              price_c = next((c for c in df.columns if any(k in c for k in cols['price'])), None)
              pbr_c = next((c for c in df.columns if any(k in c for k in cols['pbr'])), None)
              yield_c = next((c for c in df.columns if any(k in c for k in cols['yield'])), None)

              if not all([id_c, name_c, price_c, pbr_c, yield_c]):
                  raise Exception("找不到必要欄位")

              # 資料型態轉換
              df[price_c] = pd.to_numeric(df[price_c], errors='coerce')
              df[pbr_c] = pd.to_numeric(df[pbr_c], errors='coerce')
              df[yield_c] = pd.to_numeric(df[yield_c], errors='coerce')
              df = df.dropna(subset=[price_c, pbr_c, yield_c])

              stocks = []
              for _, r in df.iterrows():
                  sid = str(r[id_c]).strip()
                  if len(sid) == 4 and sid.isdigit():
                      stocks.append({
                          "id": sid,
                          "name": str(r[name_c]).strip(),
                          "price": float(r[price_c]),
                          "pbr": float(r[pbr_c]),
                          "totalYield": float(r[yield_c]),
                          "industry": "上市股票"
                      })
              
              # 依照殖利率由高到低排序
              stocks.sort(key=lambda x: x['totalYield'], reverse=True)

              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(stocks, f, ensure_ascii=False)
              print(f"成功更新 {len(stocks)} 筆資料")

          except Exception as e:
              print(f"ERROR: {e}")
              if not os.path.exists('data.json'):
                  with open('data.json', 'w', encoding='utf-8') as f:
                      json.dump([], f)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新股價數據" && git push)
