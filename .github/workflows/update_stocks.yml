name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import yfinance as yf

          def fetch_value_data():
              try:
                  # 嘗試獲取台股清單
                  url = "https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL"
                  items = requests.get(url, timeout=10).json()
                  # 這裡限制前 200 檔以確保執行速度，您可以自行調整數量
                  stock_ids = [i['Code'] for i in items if len(i['Code']) == 4][:200]
              except:
                  stock_ids = ["2330", "2317", "2454", "2308", "2382", "2881", "1476", "1477"]

              final_stocks = []
              print("📡 正在清洗數據...")
              
              for sid in stock_ids:
                  try:
                      ticker = yf.Ticker(f"{sid}.TW")
                      info = ticker.info
                      
                      price = info.get('currentPrice') or info.get('regularMarketPrice') or 0
                      pbr = info.get('priceToBook') or 0
                      raw_yield = info.get('dividendYield') or 0
                      
                      # 殖利率單位換算 (0.05 -> 5.0)
                      total_yield = raw_yield if raw_yield > 1 else raw_yield * 100
                      
                      if total_yield > 30: total_yield = 0 # 過濾異常值

                      if price > 0:
                          final_stocks.append({
                              "id": sid,
                              "name": info.get('shortName', sid),
                              "price": round(float(price), 2),
                              "pbr": round(float(pbr), 2),
                              "totalYield": round(float(total_yield), 2),
                              "category": info.get('sector', 'Other')
                          })
                  except:
                      continue
              return final_stocks

          res = fetch_value_data()
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(res, f, ensure_ascii=False, indent=2)
          print(f"✅ 成功產出 {len(res)} 筆資料")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正數據抓取與縮排" && git push)
