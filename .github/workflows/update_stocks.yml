name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def fetch_data():
              headers = {'User-Agent': 'Mozilla/5.0'}
              
              # 1. 抓取成交價 (0304 穩定版)
              price_url = "https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data"
              p_df = pd.read_csv(io.StringIO(requests.get(price_url, headers=headers).text))
              p_df.columns = [c.strip().replace('"', '') for c in p_df.columns]

              # 2. 抓取 PBR、殖利率 (OpenAPI)
              stats_url = "https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_ALL"
              s_data = requests.get(stats_url, headers=headers).json()
              stats_dict = {
                  item.get('Code', ''): {
                      'pbr': item.get('PBRatio', '0'),
                      'yield': item.get('YieldRate', '0')
                  } for item in s_data
              }

              # 3. 抓取官方 33 類產業分類 (關鍵修正)
              cat_url = "https://openapi.twse.com.tw/v1/opendata/t187ap03_L"
              cat_data = requests.get(cat_url, headers=headers).json()
              # 這裡要確保欄位名稱正確：'公司代號' 與 '產業別'
              cat_dict = {str(item.get('公司代號', '')).strip(): item.get('產業別', '其他') for item in cat_data}

              stocks = []
              for _, row in p_df.iterrows():
                  sid = str(row.get('證券代號', '')).strip().replace('"', '')
                  name = str(row.get('證券名稱', '')).strip().replace('"', '')
                  
                  try:
                      price = float(str(row.get('收盤價', '0')).replace(',', ''))
                  except: price = 0
                  
                  if price > 0 and len(sid) == 4:
                      s_info = stats_dict.get(sid, {'pbr': '0', 'yield': '0'})
                      # 抓取產業別，如果 API 沒抓到，就留空讓前端 getCategory 處理
                      final_cat = cat_dict.get(sid, "")
                      
                      stocks.append({
                          "id": sid,
                          "name": name,
                          "price": price,
                          "pbr": float(s_info['pbr']) if s_info['pbr'] and s_info['pbr'] != '-' else 0,
                          "totalYield": float(s_info['yield']) if s_info['yield'] and s_info['yield'] != '-' else 0,
                          "category": final_cat
                      })
              return stocks

          data = fetch_data()
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git add data.json
          git commit -m "Fix: Restore missing category names" || exit 0
          git push
