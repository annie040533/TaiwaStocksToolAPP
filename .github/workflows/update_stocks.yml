name: Update Stock Data
on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def get_stock_data():
              # 使用證交所每日個股行情 (包含收盤、殖利率、PBR)
              # 這是 CSV 格式，最不容易被 API 防火牆阻擋
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
              }
              
              try:
                  print("📡 正在從證交所下載 Open Data CSV...")
                  resp = requests.get(url, headers=headers, timeout=30)
                  if resp.status_code != 200:
                      print(f"❌ 錯誤碼: {resp.status_code}")
                      return []
                  
                  # 處理 CSV 格式
                  df = pd.read_csv(io.StringIO(resp.text))
                  df.columns = [c.strip().replace('"', '') for c in df.columns]
                  
                  stocks = []
                  for _, row in df.iterrows():
                      sid = str(row.get('證券代號', '')).strip().replace('"', '')
                      
                      # 篩選標準個股 (4位數)
                      if len(sid) == 4 and sid.isdigit():
                          try:
                              # 清洗並轉換數值，若有千分位符號則移除
                              def clean(val):
                                  s = str(val).replace(',', '').replace('"', '').strip()
                                  return float(s) if s not in ['', '-', 'None', 'NaN'] else 0.0

                              price = clean(row.get('收盤價', 0))
                              y_ratio = clean(row.get('殖利率(%)', 0))
                              p_ratio = clean(row.get('本淨比', 0))
                              
                              # 【核心要求】：三者缺一不可 (數值必須 > 0)
                              if price > 0 and y_ratio > 0 and p_ratio > 0:
                                  stocks.append({
                                      "id": sid,
                                      "name": str(row.get('證券名稱', '')).strip().replace('"', ''),
                                      "market": "市",
                                      "price": price,
                                      "pbr": p_ratio,
                                      "cashYield": y_ratio,
                                      "stockYield": 0.0,
                                      "totalYield": y_ratio,
                                      "category": "一般產業" # 預設分類
                                  })
                          except: continue
                  
                  print(f"✅ 成功清洗出 {len(stocks)} 筆完整個股資料")
                  return stocks
              except Exception as e:
                  print(f"🔥 發生致命錯誤: {e}")
                  return []

          final_results = get_stock_data()
          if len(final_results) > 100:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_results, f, ensure_ascii=False, indent=2)
              print("🚀 data.json 已更新")
          else:
              print("🛑 資料獲取異常，取消寫入以保護舊資料。")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正資料欄位全為0的問題" && git push)
