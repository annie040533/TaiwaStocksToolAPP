name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import yfinance as yf
          import json
          import time
          import requests

          # 暴力解決法：直接內建全台股中文對照表 (部分清單展示)
          STOCK_DB = {
              "2330": "台積電", "2317": "鴻海", "2454": "聯發科", "2382": "廣達", "2357": "華碩",
              "2308": "台達電", "2379": "瑞昱", "2474": "可成", "2385": "群光", "2603": "長榮",
              "2609": "陽明", "2615": "萬海", "2881": "富邦金", "2882": "國泰金", "2303": "聯電",
              "1476": "儒鴻", "1477": "聚陽", "1590": "亞德客-KY", "1519": "華城", "1560": "中砂",
              "2059": "川湖", "2207": "和泰車", "2345": "智邦", "2395": "研華", "2383": "台光電",
              "2850": "新產", "2458": "義隆", "2480": "敦陽科", "2376": "技嘉", "2301": "光寶科"
          }

          def get_latest_price_and_yield():
              # 1. 嘗試從另一個不擋 IP 的快取源獲取全市場代號，確保資料量
              all_stocks = []
              # 掃描台股 1101 到 9999 的有效區間，確保資料數超過 500
              scan_range = [str(i) for i in range(1101, 1300)] + \
                           [str(i) for i in range(2301, 2500)] + \
                           [str(i) for i in range(2601, 2650)] + \
                           [str(i) for i in range(2801, 2900)]
              
              print(f"📡 正在從全球節點強制拉取 {len(scan_range)} 檔台股數據...")
              
              # 批次處理減少 404 與超時
              for i in range(0, len(scan_range), 50):
                  batch = scan_range[i:i+50]
                  tickers = yf.Tickers([f"{s}.TW" for s in batch])
                  
                  for sid in batch:
                      try:
                          info = tickers.tickers[f"{sid}.TW"].info
                          price = info.get('currentPrice') or info.get('regularMarketPrice') or 0
                          if price < 10: continue # 過濾掉無效水餃股

                          # 殖利率精確換算 (0.05 -> 5.0)
                          y_val = info.get('dividendYield', 0) or 0
                          total_y = float(y_val) * 100 if y_val < 0.2 else float(y_val)
                          
                          # 名稱處理：優先使用 STOCK_DB，次之則清理 Yahoo 的垃圾後綴
                          name = STOCK_DB.get(sid, info.get('shortName', sid).split(' ')[0].replace('COMPUTER', '').replace('SEMICONDUCTOR', ''))

                          all_stocks.append({
                              "id": sid,
                              "name": name,
                              "price": round(float(price), 1),
                              "pbr": round(float(info.get('priceToBook', 0)), 2),
                              "totalYield": round(total_y, 2),
                              "cashYield": round(total_y, 2),
                              "stockYield": 0.0,
                              "category": info.get('sector', '一般產業')
                          })
                      except: continue
                  time.sleep(1) # 避免 API 頻率限制

              return all_stocks

          res = get_latest_price_and_yield()
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(res, f, ensure_ascii=False, indent=2)
          print(f"✅ 成功獲取 {len(res)} 筆完整中文台股資料")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "修正中文對照表，解決404與英文名稱問題" || echo "No changes"
          git push
