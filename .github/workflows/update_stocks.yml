name: Update Stock Data
on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import time

          def get_data():
              # 使用證交所官網查詢介面 (最穩定，含 PBR 與 殖利率)
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=json&_={}".format(int(time.time()))
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'Referer': 'https://www.twse.com.tw/zh/page/trading/exchange/BWIBYK_ALL.html'
              }
              
              try:
                  print("📡 正在嘗試連線至證交所官方 API...")
                  resp = requests.get(url, headers=headers, timeout=30)
                  data = resp.json()
                  
                  if "data" not in data:
                      print("❌ 證交所回傳格式異常")
                      return []

                  stocks = []
                  # 證交所 JSON 欄位順序：0.代號, 1.名稱, 2.殖利率, 3.股利年度, 4.本益比, 5.本淨比, 6.最後價
                  for row in data["data"]:
                      sid = str(row[0]).strip()
                      if len(sid) == 4 and sid.isdigit():
                          try:
                              # 清洗數據
                              def clean(v):
                                  s = str(v).replace(',', '').strip()
                                  return float(s) if s not in ['', '-', 'N/A'] else 0.0

                              price = clean(row[8]) # 這裡需注意證交所欄位索引，通常收盤價在第 8 或最後
                              if price == 0: price = clean(row[7]) # 保險機制

                              stocks.append({
                                  "id": sid,
                                  "name": str(row[1]).strip(),
                                  "price": price,
                                  "pbr": clean(row[5]),
                                  "totalYield": clean(row[2]),
                                  "category": "載入中..." # 前端會自動處理分類
                              })
                          except: continue
                  return stocks
              except Exception as e:
                  print(f"🔥 錯誤: {e}")
                  return []

          res = get_data()
          if len(res) > 300:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(res, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功更新 {len(res)} 檔個股 PBR 資料！")
          else:
              print("🛑 無法獲取有效資料")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正 API 抓取邏輯" && git push)
