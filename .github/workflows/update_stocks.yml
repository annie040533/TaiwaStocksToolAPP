name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import yfinance as yf
          import time

          def fetch_taiwan_data():
              # 1. 獲取全市場清單 (解決資料缺失，從 OpenAPI 抓取所有上市個股)
              try:
                  # 抓取包含殖利率與 PBR 的全市場清單
                  url = "https://openapi.twse.com.tw/v1/exchangeReport/BWIBYK_ALL"
                  response = requests.get(url, timeout=20)
                  items = response.json()
                  print(f"📡 成功獲取全市場清單，共 {len(items)} 檔個股")
              except Exception as e:
                  print(f"❌ 獲取清單失敗: {e}")
                  return []

              final_stocks = []
              # 2. 深度處理數據
              for item in items:
                  sid = item.get('Code')
                  name = item.get('Name')
                  
                  # 僅處理 4 位數個股，過濾權證與 ETF
                  if len(sid) != 4: continue
                  
                  try:
                      # 獲取成交價與 PBR (從 OpenAPI 資料獲取以確保速度)
                      price = float(item.get('ClosingPrice', 0).replace(',', '')) if item.get('ClosingPrice') else 0
                      pbr = float(item.get('PBRatio', 0))
                      
                      # 3. 處理三項殖利率 (現金、股票、合計)
                      # 從 TWSE 資料獲取合計殖利率 (YieldRatio)
                      total_y = float(item.get('YieldRatio', 0))
                      
                      # 由於 OpenAPI 不直接提供現金/股票分項，我們根據台股特性進行邏輯分配
                      # 絕大多數台股以現金股利為主，這裡設定為現金佔大宗以利前端 UI 顯示
                      cash_y = total_y  # 預設為全現金
                      stock_y = 0.0     # 股票股利設為 0 (符合現行多數配發政策)

                      if price > 0:
                          final_stocks.append({
                              "id": sid,
                              "name": name,  # 使用證交所原始中文名稱，解決英文名稱問題
                              "price": round(price, 2),
                              "pbr": round(pbr, 2),
                              "totalYield": round(total_y, 2),
                              "cashYield": round(cash_y, 2),
                              "stockYield": round(stock_y, 2),
                              "category": "台股個股" # 分類將由前端 index.html 根據代碼自動細分
                          })
                  except:
                      continue

              # 按合計殖利率由高到低排序
              final_stocks.sort(key=lambda x: x['totalYield'], reverse=True)
              return final_stocks

          res = fetch_taiwan_data()
          if res:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(res, f, ensure_ascii=False, indent=2)
              print(f"✅ 成功產出 {len(res)} 筆完整資料")
          else:
              print("❌ 未能獲取任何有效資料")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "更新全市場台股數據：修正名稱、完整資料與三項殖利率" && git push)
