name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import time

          def get_data():
              # 使用證交所官網最穩定的 JSON 查詢介面
              # 加入 timestamp 防止緩存錯誤
              url = f"https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=json&_={int(time.time()*1000)}"
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                  'Referer': 'https://www.twse.com.tw/zh/page/trading/exchange/BWIBYK_ALL.html'
              }
              
              try:
                  print("📡 正在向證交所請求 JSON 數據...")
                  resp = requests.get(url, headers=headers, timeout=30)
                  raw = resp.json()
                  
                  if "data" not in raw:
                      print("🛑 證交所目前未回傳有效數據，可能是維護中")
                      return []

                  stocks = []
                  # 證交所 JSON 欄位索引：0:代號, 1:名稱, 2:殖利率, 5:本淨比, 8:收盤價
                  for row in raw["data"]:
                      sid = str(row[0]).strip()
                      if len(sid) == 4 and sid.isdigit():
                          try:
                              def clean(v):
                                  s = str(v).replace(',', '').strip()
                                  return float(s) if s not in ['', '-', 'N/A'] else 0.0

                              price = clean(row[8])
                              if price > 0:
                                  stocks.append({
                                      "id": sid,
                                      "name": str(row[1]).strip(),
                                      "price": price,
                                      "pbr": clean(row[5]),
                                      "totalYield": clean(row[2]),
                                      "category": "載入中" 
                                  })
                          except: continue
                  return stocks
              except Exception as e:
                  print(f"🔥 發生錯誤: {e}")
                  return []

          res = get_data()
          if len(res) > 300:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(res, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功更新 {len(res)} 筆 PBR 與殖利率資料！")
          else:
              print(f"🛑 抓取數量不足 ({len(res)})")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正 API 抓取至 JSON 來源" && git push)
