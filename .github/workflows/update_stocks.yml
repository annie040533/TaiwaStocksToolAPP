name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def fetch_twse_opendata():
              # 參考 ARON HACK 推薦的 Open Data 連結：每日行情 (含所有個股)
              url = "https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data"
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
              }
              
              try:
                  print("📡 正在從證交所 Open Data 獲取最新行情...")
                  resp = requests.get(url, headers=headers, timeout=30)
                  
                  # 使用 pandas 直接讀取 CSV 內容
                  # 證交所 Open Data 是標準 CSV 格式，不需要像 HTML 那樣手動解析
                  df = pd.read_csv(io.StringIO(resp.text))
                  
                  # 清理欄位標題中的空格或引號
                  df.columns = [c.strip().replace('"', '') for c in df.columns]
                  
                  stocks = []
                  for _, row in df.iterrows():
                      sid = str(row.get('證券代號', '')).strip().replace('"', '')
                      # 只抓取標準 4 位數個股，排除權證、ETF (代碼較長或含字母)
                      if len(sid) == 4 and sid.isdigit():
                          try:
                              # 數值轉換，處理 '-' 或千分位
                              def clean_num(val):
                                  s = str(val).replace(',', '').replace('"', '').strip()
                                  return float(s) if s not in ['', '-', 'None'] else 0.0

                              price = clean_num(row.get('收盤價', 0))
                              if price > 0:
                                  stocks.append({
                                      "id": sid,
                                      "name": str(row.get('證券名稱', '')).strip().replace('"', ''),
                                      "market": "市",
                                      "price": price,
                                      "pbr": 0.0, # 每日行情表不含 PBR，若需 PBR 需串接另一個 API
                                      "cashYield": 0.0,
                                      "stockYield": 0.0,
                                      "totalYield": 0.0
                                  })
                          except: continue
                  return stocks
              except Exception as e:
                  print(f"❌ 錯誤: {e}")
                  return []

          data = fetch_twse_opendata()
          if len(data) > 500:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功！已產出 {len(data)} 筆個股資料。")
          else:
              print(f"🛑 抓取資料過少 ({len(data)})，不執行寫入。")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新股價數據" && git push)
