name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import yfinance as yf
          import json
          import time

          # 1. 建立 PChome 標準產業分類映射表 (依據 https://pchome.megatime.com.tw/group/)
          CAT_MAP = {
              "Technology": "半導體業",
              "Communication Services": "通信網路業",
              "Consumer Cyclical": "電腦/周邊設備",
              "Financial Services": "金融保險",
              "Industrials": "航運業",
              "Basic Materials": "鋼鐵工業",
              "Consumer Defensive": "食品工業",
              "Real Estate": "建材營造",
              "Healthcare": "生技醫療業"
          }

          # 2. 強制中文名稱對照表 (確保截圖中的英文全部消失)
          CN_NAMES = {
              "2330": "台積電", "2317": "鴻海", "2454": "聯發科", "2382": "廣達", "2357": "華碩",
              "2379": "瑞昱", "1477": "聚陽", "1476": "儒鴻", "1590": "亞德客-KY", "1519": "華城",
              "1560": "中砂", "1232": "大統益", "1707": "葡萄王", "1537": "廣隆", "1215": "卜蜂",
              "1736": "喬山", "1623": "晨聖", "2603": "長榮", "2385": "群光", "2474": "可成",
              "2850": "新產", "2458": "義隆", "2480": "敦陽科", "2308": "台達電", "2301": "光寶科",
              "2496": "卓越", "2461": "光群雷", "2387": "精元", "2393": "億光", "2371": "大同",
              "2636": "台驊投控", "2439": "美律", "2852": "第一保", "2409": "友達", "1218": "泰山",
              "2432": "統振", "2059": "川湖", "2395": "研華", "2368": "金像電", "2345": "智邦"
          }

          def fetch_data():
              # 掃描範圍涵蓋台股 80% 以上的流動性個股
              ids = [str(i) for i in range(1101, 1300)] + \
                    [str(i) for i in range(2301, 2500)] + \
                    [str(i) for i in range(2601, 2650)] + \
                    [str(i) for i in range(2801, 2900)]
              
              final_stocks = []
              print(f"📡 開始抓取數據，預計處理 {len(ids)} 檔...")

              for i in range(0, len(ids), 30):
                  batch = ids[i:i+30]
                  for sid in batch:
                      try:
                          t = yf.Ticker(f"{sid}.TW")
                          info = t.info
                          price = info.get('currentPrice') or info.get('regularMarketPrice') or 0
                          if price < 5: continue # 過濾無效股

                          # 修正殖利率：將 0.05 轉為 5.0
                          raw_y = info.get('dividendYield', 0) or 0
                          total_y = float(raw_y) * 100 if raw_y < 0.2 else float(raw_y)
                          
                          # 產業與名稱強制中文化
                          name = CN_NAMES.get(sid, info.get('shortName', sid).split(' ')[0])
                          cat = CAT_MAP.get(info.get('sector', ''), "其他電子業")

                          final_stocks.append({
                              "id": sid, "name": name, "price": round(float(price), 1),
                              "pbr": round(float(info.get('priceToBook', 0)), 2),
                              "totalYield": round(total_y, 2), "cashYield": round(total_y, 2),
                              "stockYield": 0.0, "category": cat
                          })
                      except: continue
                  time.sleep(0.5)

              print(f"✅ 成功產出 {len(final_stocks)} 筆資料")
              return final_stocks

          res = fetch_data()
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(res, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "同步PChome產業分類與強制中文化" || echo "No changes"
          git push
