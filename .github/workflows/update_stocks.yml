name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io
          import time

          def fetch_data():
              # 0304 版最穩定來源
              url = "https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data"
              try:
                  resp = requests.get(url)
                  resp.encoding = 'utf-8'
                  df = pd.read_csv(io.StringIO(resp.text))
                  
                  stocks = []
                  # 抓取前 600 檔確保穩定性與速度
                  for _, row in df.head(600).iterrows():
                      sid = str(row.get('證券代號', '')).strip().replace('"', '')
                      name = str(row.get('證券名稱', '')).strip().replace('"', '')
                      try:
                          price = float(str(row.get('收盤價', '0')).replace(',', ''))
                      except: price = 0
                      
                      if price > 0 and len(sid) == 4:
                          # 預設模擬數據 (實務上 PBR/Yield 需從玩股網或 Yahoo 獲取，此處先保證顯示)
                          stocks.append({
                              "id": sid,
                              "name": name,
                              "price": price,
                              "totalYield": 6.5, # 預設測試值
                              "pbr": 1.15        # 預設測試值
                          })
                  return stocks
              except: return []

          data = fetch_data()
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name \"github-actions[bot]\"
          git add data.json
          git commit -m \"Update Data\" || exit 0
          git push
