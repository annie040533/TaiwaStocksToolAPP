name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        # 增加 yfinance 庫，這是目前抓取全球/台股最穩定的保底手段
        run: pip install requests pandas yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import pandas as pd
          import yfinance as yf
          import time

          def fetch_fallback():
              """當官方 API 全掛時，改用 Yahoo Finance 抓取權值股或熱門股"""
              print("🚀 啟動 Yahoo Finance 保底抓取機制...")
              # 這裡定義一份你想優先追蹤的股票清單 (例如前 50 大或熱門股)
              sample_ids = ['2330','2317','2454','2308','2382','3231','2881','2882','2412','2886']
              stocks = []
              for sid in sample_ids:
                  try:
                      ticker = yf.Ticker(f"{sid}.TW")
                      info = ticker.fast_info
                      stocks.append({
                          "id": sid,
                          "name": f"個股 {sid}", # yfinance 抓中文名較慢，先用代碼
                          "market": "市",
                          "price": round(info['last_price'], 2),
                          "pbr": 0.0,
                          "cashYield": 0.0,
                          "stockYield": 0.0,
                          "totalYield": 0.0
                      })
                      time.sleep(1) # 緩衝
                  except: continue
              return stocks

          def fetch_data():
              # 策略 1: 嘗試 OpenAPI
              headers = {'User-Agent': 'Mozilla/5.0'}
              try:
                  print("📡 嘗試連線 OpenAPI...")
                  r = requests.get("https://openapi.twse.com.tw/v1/exchangeReport/BWIBYK_ALL", headers=headers, timeout=10)
                  if r.status_code == 200 and len(r.json()) > 100:
                      data = r.json()
                      return [{
                          "id": i['Code'], "name": i['Name'], "market": "市",
                          "price": float(i['ClosingPrice']) if i['ClosingPrice'] else 0,
                          "pbr": float(i['PBRatio']) if i['PBRatio'] else 0,
                          "totalYield": float(i['YieldRate']) if i['YieldRate'] else 0,
                          "cashYield": float(i['YieldRate']), "stockYield": 0.0
                      } for i in data if len(i['Code']) == 4]
              except:
                  print("⚠️ 官方 API 失敗")

              # 策略 2: 嘗試抓取證交所 CSV 的鏡像備份或直接進入 Fallback
              return fetch_fallback()

          final_data = fetch_data()
          if final_data:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_data, f, ensure_ascii=False, indent=2)
              print(f"✅ 成功！獲取到 {len(final_data)} 筆資料")
          else:
              print("❌ 全部失敗")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新股價數據" && git push)
