name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5' # 台北時間 18:00 更新
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def get_data():
              # 使用政府資料開放平台提供之 Open Data 連結 (穩定性最高)
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
              }
              
              try:
                  print("📡 正在從政府 Open Data 獲取 PBR 與殖利率資料...")
                  resp = requests.get(url, headers=headers, timeout=30)
                  
                  # 解決解析錯誤：使用 io.StringIO 將文字轉為檔案流，並指定引擎
                  # 證交所 CSV 通常在第 1-3 行有說明，skiprows 能避開這些導致報錯的行
                  df = pd.read_csv(io.StringIO(resp.text))
                  
                  # 清理欄位名稱 (移除引號與空格)
                  df.columns = [c.replace('"', '').strip() for c in df.columns]
                  
                  stocks = []
                  for _, row in df.iterrows():
                      sid = str(row.get('證券代號', '')).replace('"', '').strip()
                      
                      # 僅抓取 4 位數一般個股
                      if len(sid) == 4 and sid.isdigit():
                          try:
                              def to_float(val):
                                  s = str(val).replace(',', '').replace('"', '').strip()
                                  return float(s) if s not in ['', '-', 'None'] else 0.0

                              price = to_float(row.get('收盤價', 0))
                              if price > 0:
                                  stocks.append({
                                      "id": sid,
                                      "name": str(row.get('證券名稱', '')).replace('"', '').strip(),
                                      "price": price,
                                      "pbr": to_float(row.get('本淨比', 0)),
                                      "totalYield": to_float(row.get('殖利率(%)', 0)),
                                      "category": "一般產業" # 稍後由前端自動分類
                                  })
                          except: continue
                  return stocks
              except Exception as e:
                  print(f"🔥 讀取失敗: {e}")
                  return []

          final_list = get_data()
          if len(final_list) > 300:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_list, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功！產出 {len(final_list)} 筆資料，包含正確的 PBR 與殖利率。")
          else:
              print("🛑 資料獲取異常，請檢查連結。")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正資料來源至 Open Data" && git push)
