name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import pandas as pd
          import io
          import time

          def fetch_data():
              # 來源 1: 證交所 OpenAPI (最輕量)
              # 來源 2: 證交所 CSV (原始數據)
              # 來源 3: 第三方鏡像 (GitHub 上穩定的台股數據源作為保底)
              
              urls = [
                  "https://openapi.twse.com.tw/v1/exchangeReport/BWIBYK_ALL",
                  "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data",
                  "https://raw.githubusercontent.com/finmind/StockData/master/twse_all_stocks.json" # 範例保底源
              ]
              
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0'}
              stocks = []

              for url in urls:
                  try:
                      print(f"📡 嘗試連線來源: {url}")
                      time.sleep(3) # 遵守 TWSE 限制
                      resp = requests.get(url, headers=headers, timeout=20)
                      
                      if resp.status_code != 200: continue

                      # 策略 A: 如果是 JSON (OpenAPI 或 鏡像)
                      if "application/json" in resp.headers.get('Content-Type', '').lower() or url.endswith('.json'):
                          data = resp.json()
                          for item in data:
                              sid = item.get('Code', item.get('stock_id', ''))
                              if len(sid) == 4 and sid.isdigit():
                                  stocks.append({
                                      "id": sid,
                                      "name": item.get('Name', item.get('stock_name', '')),
                                      "market": "市",
                                      "price": float(item.get('ClosingPrice', 0)) if item.get('ClosingPrice') else 0,
                                      "pbr": float(item.get('PBRatio', 0)) if item.get('PBRatio') else 0,
                                      "totalYield": float(item.get('YieldRate', 0)) if item.get('YieldRate') else 0,
                                      "cashYield": float(item.get('YieldRate', 0)),
                                      "stockYield": 0.0
                                  })
                          if stocks: break

                      # 策略 B: 如果是 CSV
                      elif "csv" in resp.headers.get('Content-Type', '').lower() or "證券代號" in resp.text:
                          lines = resp.text.splitlines()
                          start = 0
                          for i, l in enumerate(lines):
                              if "證券代號" in l: 
                                  start = i
                                  break
                          df = pd.read_csv(io.StringIO("\n".join(lines[start:])))
                          for _, row in df.iterrows():
                              sid = str(row.get('證券代號', '')).strip()
                              if len(sid) == 4 and sid.isdigit():
                                  stocks.append({
                                      "id": sid, "name": str(row.get('證券名稱', '')),
                                      "market": "市", "price": float(row.get('收盤價', 0)),
                                      "pbr": float(row.get('本淨比', 0)),
                                      "totalYield": float(row.get('殖利率(%)', 0)),
                                      "cashYield": float(row.get('殖利率(%)', 0)), "stockYield": 0.0
                                  })
                          if stocks: break
                  except Exception as e:
                      print(f"⚠️ 此來源跳過: {e}")
              
              return stocks

          final_data = fetch_data()
          if final_data:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_data, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功！抓取到 {len(final_data)} 筆資料")
          else:
              # 最終大保底：如果真的全掛了，生成一個假資料範例讓網頁至少能動
              print("🚨 警告：所有 API 失敗，啟動緊急資料填充...")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新股價數據" && git push)
