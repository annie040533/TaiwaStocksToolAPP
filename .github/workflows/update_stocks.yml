- name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def fetch_full_data():
              # 使用證交所最完整的個股統計表 (包含 PBR, 殖利率)
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
              try:
                  resp = requests.get(url, timeout=30)
                  df = pd.read_csv(io.StringIO(resp.text))
                  df.columns = [c.strip().replace('"', '') for c in df.columns]
                  
                  stocks = []
                  for _, row in df.iterrows():
                      try:
                          # 1. 基礎資料清洗
                          sid = str(row['證券代號']).strip()
                          name = str(row['證券名稱']).strip()
                          
                          # 2. 數值轉換 (若為 '-' 或空值則會變成 NaN)
                          price = pd.to_numeric(row['收盤價'], errors='coerce')
                          pbr = pd.to_numeric(row['本淨比'], errors='coerce')
                          # BWIBYK 的殖利率欄位通常是合計值
                          total_yield = pd.to_numeric(row['殖利率(%)'], errors='coerce')
                          
                          # 3. 排除缺失資料 (缺一不可)
                          if pd.isna(price) or pd.isna(pbr) or pd.isna(total_yield) or price <= 0:
                              continue
                          
                          # 4. 產業類別 (BWIBYK 沒產業，我們根據代碼區間做基本分類，或從另一個 API 補)
                          # 註：這裡先用佔位符，網頁端會提供更細的分類
                          industry = "一般產業" 
                          
                          stocks.append({
                              "id": sid,
                              "name": name,
                              "market": "市",
                              "price": float(price),
                              "pbr": float(pbr),
                              "cashYield": float(total_yield), # 簡化邏輯：假設為現金為主
                              "stockYield": 0.0,
                              "totalYield": float(total_yield),
                              "category": industry
                          })
                      except: continue
                  return stocks
              except Exception as e:
                  print(f"Error: {e}")
                  return []

          data = fetch_full_data()
          if data:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功！產出 {len(data)} 筆完整資料")
          EOF
