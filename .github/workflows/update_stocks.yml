name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          from io import StringIO

          def fetch_data():
              all_stocks = []
              
              # 1. 抓取上市資料 (TWSE)
              try:
                  t_url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
                  t_res = requests.get(t_url, timeout=30)
                  t_res.encoding = 'cp950'
                  df_t = pd.read_csv(StringIO(t_res.text))
                  df_t.columns = [c.strip() for c in df_t.columns]
                  for _, r in df_t.iterrows():
                      # 篩選 4 位數代碼，且確保 價格、PBR、殖利率 都不為空
                      sid = str(r.get('證券代號', '')).strip()
                      price = pd.to_numeric(r.get('收盤價', 0), errors='coerce')
                      pbr = pd.to_numeric(r.get('本淨比', 0), errors='coerce')
                      y_total = pd.to_numeric(r.get('殖利率(%)', 0), errors='coerce')
                      
                      if len(sid) == 4 and price > 0 and pbr > 0 and not pd.isna(y_total):
                          all_stocks.append({
                              "id": sid, "name": str(r.get('證券名稱', '')).strip(),
                              "market": "市", "price": float(price), "pbr": float(pbr),
                              "cashYield": float(y_total), "stockYield": 0.0, "totalYield": float(y_total)
                          })
              except Exception as e: print(f"TWSE Error: {e}")

              # 2. 抓取上櫃資料 (TPEx)
              try:
                  o_url = "https://www.tpex.org.tw/web/stock/aftertrading/peratio_analysis/pera_result.php?l=zh-tw&o=csv"
                  o_res = requests.get(o_url, timeout=30)
                  df_o = pd.read_csv(StringIO(o_res.text), skiprows=3)
                  df_o.columns = [c.strip() for c in df_o.columns]
                  for _, r in df_o.iterrows():
                      sid = str(r.get('股票代號', '')).strip()
                      price = pd.to_numeric(r.get('收盤價', 0), errors='coerce')
                      pbr = pd.to_numeric(r.get('股價淨值比', 0), errors='coerce')
                      y_total = pd.to_numeric(r.get('殖利率(%)', 0), errors='coerce')
                      
                      if len(sid) == 4 and price > 0 and pbr > 0 and not pd.isna(y_total):
                          all_stocks.append({
                              "id": sid, "name": str(r.get('名稱', '')).strip(),
                              "market": "櫃", "price": float(price), "pbr": float(pbr),
                              "cashYield": float(y_total), "stockYield": 0.0, "totalYield": float(y_total)
                          })
              except Exception as e: print(f"TPEx Error: {e}")
              
              return all_stocks

          data = fetch_data()
          if data:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False)
              print(f"✅ 成功產出 {len(data)} 筆資料")
          else:
              print("❌ 抓取失敗，資料夾為空")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新股價數據" && git push)
