name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json

          def get_data():
              # 直接抓取證交所的統計資料連結
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
              stocks = []
              try:
                  print("📡 啟動連線...")
                  r = requests.get(url, timeout=30)
                  # 處理可能的編碼問題
                  lines = r.text.split('\n')
                  print(f"取得原始數據，共 {len(lines)} 行")

                  for line in lines:
                      parts = line.replace('"', '').split(',')
                      # 證交所資料格式：代號(0), 名稱(1), 殖利率(2), 本淨比(5), 收盤價(8)
                      if len(parts) >= 9:
                          sid = parts[0].strip()
                          if len(sid) == 4 and sid.isdigit():
                              try:
                                  stocks.append({
                                      "id": sid,
                                      "name": parts[1].strip(),
                                      "market": "市",
                                      "price": float(parts[8]) if parts[8] != '-' else 0,
                                      "pbr": float(parts[5]) if parts[5] != '-' else 0,
                                      "cashYield": float(parts[2]) if parts[2] != '-' else 0,
                                      "stockYield": 0.0,
                                      "totalYield": float(parts[2]) if parts[2] != '-' else 0
                                  })
                              except: continue
                  print(f"✅ 解析成功：{len(stocks)} 筆個股")
              except Exception as e:
                  print(f"❌ 錯誤原因: {e}")
              return stocks

          final_list = get_data()
          if len(final_list) > 500:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_list, f, ensure_ascii=False, indent=2)
              print("🚀 data.json 已寫入！")
          else:
              print("🛑 資料量不足，請檢查 API 是否被擋。")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "自動更新股價數據" || exit 0
          git push
