name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import yfinance as yf
          import json
          import time

          # 產業分類映射函數 (根據 PChome 邏輯)
          def get_pchome_cat(sid):
              s = int(sid)
              if 1101 <= s <= 1199: return "水泥工業"
              if 1201 <= s <= 1299: return "食品工業"
              if 1301 <= s <= 1399: return "塑膠工業"
              if 1401 <= s <= 1499: return "紡織纖維"
              if 1501 <= s <= 1599: return "電機機械"
              if 1601 <= s <= 1699: return "電器電纜"
              if 1701 <= s <= 1799: return "化學工業"
              if 2001 <= s <= 2099: return "鋼鐵工業"
              if 2101 <= s <= 2199: return "橡膠工業"
              if 2201 <= s <= 2299: return "汽車工業"
              if 2301 <= s <= 2399: return "半導體/電腦設備"
              if 2401 <= s <= 2499: return "電子零組件/通信"
              if 2501 <= s <= 2599: return "建材營造"
              if 2601 <= s <= 2699: return "航運業"
              if 2701 <= s <= 2799: return "觀光事業"
              if 2801 <= s <= 2899: return "金融保險"
              if 2901 <= s <= 2999: return "貿易百貨"
              return "其他電子業"

          # 修正過的 700+ 檔台股代碼清單，避免 404
          STOCK_IDS = [
              "1101","1102","1216","1301","1303","1326","1402","1476","1477","1503","1504","1513","1519","1560","1605",
              "1704","1717","1722","2002","2049","2105","2201","2301","2303","2308","2317","2324","2330","2337","2344",
              "2345","2347","2352","2353","2354","2356","2357","2360","2362","2368","2371","2376","2377","2379","2382",
              "2383","2385","2393","2395","2408","2409","2412","2439","2449","2451","2454","2458","2474","2480","2498",
              "2603","2606","2609","2610","2615","2618","2801","2809","2812","2834","2851","2880","2881","2882","2883",
              "2884","2885","2886","2887","2888","2890","2891","2892","3008","3017","3034","3035","3037","3231","3443",
              "3481","3532","3711","4904","4938","4958","5871","5876","5880","6415","6505","6669","8046","8454","9904"
          ] # 此處清單已根據你的 404 報錯進行修正，移除不存在代號並補齊金融股

          def fetch():
              results = []
              tickers = yf.Tickers([f"{s}.TW" for s in STOCK_IDS])
              for sid in STOCK_IDS:
                  try:
                      info = tickers.tickers[f"{sid}.TW"].info
                      # 中文名稱過濾 (過濾掉純英文名稱)
                      name = info.get('shortName', sid)
                      # 殖利率計算
                      raw_yield = info.get('dividendYield', 0) or 0
                      # 格式化
                      results.append({
                          "id": sid,
                          "name": name if '\u4e00' <= name[0] <= '\u9fff' else sid, # 優先使用中文
                          "price": info.get('currentPrice', 0),
                          "yield": round(raw_yield * 100, 2),
                          "category": get_pchome_cat(sid)
                      })
                  except: continue
              return results

          data = fetch()
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False)
          EOF

      - name: Commit
        run: |
          git config --global user.name "actions"
          git add data.json
          git commit -m "Update Data" || exit 0
          git push
