name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import csv
          import io

          def get_data():
              # 使用政府資料開放平臺的數據源 (此連結較不會阻擋 GitHub Actions)
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
              }
              
              try:
                  print("📡 正在從政府 Open Data 管道抓取 PBR 與殖利率...")
                  resp = requests.get(url, headers=headers, timeout=60)
                  resp.encoding = 'utf-8'
                  
                  if resp.status_code != 200:
                      print(f"🛑 HTTP 錯誤: {resp.status_code}")
                      return []

                  # 使用 csv 模組手動解析，避免格式錯亂
                  f = io.StringIO(resp.text)
                  reader = csv.reader(f)
                  
                  stocks = []
                  header = None
                  
                  for row in reader:
                      # 跳過空行或說明行，直到找到「證券代號」標題
                      if "證券代號" in row:
                          header = [c.replace('"', '').strip() for c in row]
                          continue
                      
                      if header and len(row) >= len(header):
                          data_dict = dict(zip(header, row))
                          sid = data_dict.get('證券代號', '').replace('"', '').strip()
                          
                          if len(sid) == 4 and sid.isdigit():
                              try:
                                  def clean(v):
                                      s = str(v).replace('"', '').replace(',', '').strip()
                                      return float(s) if s not in ['', '-', 'None'] else 0.0

                                  price = clean(data_dict.get('收盤價', 0))
                                  if price > 0:
                                      stocks.append({
                                          "id": sid,
                                          "name": data_dict.get('證券名稱', '').replace('"', '').strip(),
                                          "price": price,
                                          "pbr": clean(data_dict.get('本淨比', 0)),
                                          "totalYield": clean(data_dict.get('殖利率(%)', 0))
                                      })
                              except: continue
                  return stocks
              except Exception as e:
                  print(f"🔥 擷取失敗: {e}")
                  return []

          res = get_data()
          if len(res) > 300:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(res, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功更新 {len(res)} 筆完整資料！")
          else:
              print(f"🛑 抓取數量不足 ({len(res)})，請檢查 API 狀態")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正 PBR 資料抓取" && git push)
