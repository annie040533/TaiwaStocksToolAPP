name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import time

          def get_data():
              # 來源 A: 證交所 OpenAPI (最標準，更新最快)
              # 來源 B: 證交所官網 JSON 接口 (備援)
              urls = [
                  "https://openapi.twse.com.tw/v1/exchangeReport/BWIBYK_ALL",
                  "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=json"
              ]
              
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'Accept': 'application/json'
              }

              for url in urls:
                  try:
                      print(f"📡 嘗試連線至: {url}")
                      resp = requests.get(url, headers=headers, timeout=30)
                      
                      if resp.status_code != 200:
                          continue
                          
                      raw_data = resp.json()
                      # OpenAPI 回傳是 List, 官網 JSON 回傳是 Dict
                      items = raw_data if isinstance(raw_data, list) else raw_data.get('data', [])
                      
                      if not items:
                          continue

                      stocks = []
                      for row in items:
                          # 兼容兩種格式：字典(OpenAPI) 或 列表(官網)
                          is_d = isinstance(row, dict)
                          sid = row.get('Code') if is_d else row[0]
                          name = row.get('Name') if is_d else row[1]
                          yield_ratio = row.get('YieldRatio') if is_d else row[2]
                          pbr = row.get('PBRatio') if is_d else row[5]
                          # 取得價格 (官網 JSON 在 index 8, OpenAPI 在 ClosingPrice)
                          price = row.get('ClosingPrice') if is_d else row[8]

                          if len(str(sid)) == 4:
                              try:
                                  def to_f(v):
                                      s = str(v).replace(',', '').strip()
                                      return float(s) if s not in ['', '-', 'N/A'] else 0.0
                                  
                                  stocks.append({
                                      "id": str(sid),
                                      "name": str(name),
                                      "price": to_f(price),
                                      "pbr": to_f(pbr),
                                      "totalYield": to_f(yield_ratio),
                                      "category": "一般產業"
                                  })
                              except: continue
                      
                      if len(stocks) > 500:
                          return stocks
                  except Exception as e:
                      print(f"⚠️ 來源異常: {e}")
                      continue
              return []

          final_list = get_data()
          if final_list:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_list, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功更新！獲得 {len(final_list)} 筆資料。")
          else:
              print("🛑 嘗試所有 API 均失敗，可能正處於證交所維護時段。")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "更換至更穩定的 OpenAPI V1 接口" && git push)
