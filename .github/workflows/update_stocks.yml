- name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import io
          import pandas as pd

          def fetch_twse():
              # 使用證交所 Open Data 連結，此連結較不易觸發 403 禁止訪問
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
              }
              
              try:
                  print("📡 正在存取證交所 Open Data...")
                  resp = requests.get(url, headers=headers, timeout=30)
                  if resp.status_code != 200:
                      print(f"❌ 連線失敗，狀態碼: {resp.status_code}")
                      return []

                  # 使用 pandas 自動處理 CSV 欄位對齊，避開手動 split 的偏移問題
                  # 證交所 Open Data 通常編碼為 utf-8 或 cp950
                  df = pd.read_csv(io.StringIO(resp.text))
                  
                  # 清理欄位名稱中的空白
                  df.columns = [c.strip() for c in df.columns]
                  print(f"📊 偵測到欄位: {list(df.columns)}")

                  stocks = []
                  for _, row in df.iterrows():
                      sid = str(row.get('證券代號', '')).strip().replace('"', '')
                      # 僅抓取 4 位數的普通股
                      if len(sid) == 4 and sid.isdigit():
                          try:
                              # 轉換數值，若為 '-' 則轉為 0
                              def clean_num(val):
                                  if pd.isna(val) or str(val).strip() == '-': return 0.0
                                  return float(str(val).replace(',', ''))

                              price = clean_num(row.get('收盤價', 0))
                              yield_rate = clean_num(row.get('殖利率(%)', 0))
                              pbr = clean_num(row.get('本淨比', 0))

                              if price > 0:
                                  stocks.append({
                                      "id": sid,
                                      "name": str(row.get('證券名稱', '')).strip(),
                                      "market": "市",
                                      "price": price,
                                      "pbr": pbr,
                                      "cashYield": yield_rate,
                                      "stockYield": 0.0,
                                      "totalYield": yield_rate
                                  })
                          except: continue
                  return stocks
              except Exception as e:
                  print(f"❌ 發生異常: {e}")
                  return []

          # 執行抓取
          stock_data = fetch_twse()

          # 防禦性檢查：確保資料量正常才寫入檔案
          if len(stock_data) > 500:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(stock_data, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功！已寫入 {len(stock_data)} 筆資料至 data.json")
          else:
              print(f"🛑 抓取數量不足 ({len(stock_data)} 筆)，為保護原始資料，本次不進行更新。")
          EOF
