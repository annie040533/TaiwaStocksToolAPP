name: Update Stock Data
on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json

          def fetch_data():
              # 串接證交所 OpenAPI：包含收盤價、殖利率、本淨比 (PBR) 與產業分類
              url = "https://openapi.twse.com.tw/v1/exchangeReport/BWIBYK_ALL"
              try:
                  resp = requests.get(url, timeout=30)
                  raw = resp.json()
                  stocks = []
                  for item in raw:
                      sid = item.get('Code', '').strip()
                      # 僅抓取 4 位數個股，排除 ETF
                      if len(sid) == 4 and sid.isdigit():
                          try:
                              p = float(item.get('ClosingPrice', 0))
                              y = float(item.get('YieldRatio', 0)) # 殖利率
                              b = float(item.get('PBratio', 0))    # PBR 股價淨值比
                              
                              if p > 0:
                                  stocks.append({
                                      "id": sid,
                                      "name": item.get('Name', '').strip(),
                                      "price": p,
                                      "pbr": b,
                                      "totalYield": y,
                                      "category": item.get('Industry', '其他')
                                  })
                          except: continue
                  return stocks
              except Exception as e:
                  print(f"Error: {e}")
                  return []

          data = fetch_data()
          if len(data) > 300:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print(f"✅ 成功產出 {len(data)} 筆包含 PBR 的資料。")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正 PBR 欄位與摺疊邏輯" && git push)
