name: Update Stock Data
on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def get_data():
              # 使用證交所 OpenAPI 獲取個股日本益比、殖利率及淨值比 (最穩定)
              url = "https://openapi.twse.com.tw/v1/exchangeReport/BWIBYK_ALL"
              try:
                  resp = requests.get(url, timeout=30)
                  raw_data = resp.json()
                  
                  stocks = []
                  for item in raw_data:
                      sid = item.get('Code', '').strip()
                      # 只抓取 4 位數個股
                      if len(sid) == 4 and sid.isdigit():
                          try:
                              # 關鍵數值清洗，若為空或無意義字串則排除
                              price = float(item.get('ClosingPrice', 0))
                              yield_val = float(item.get('YieldRatio', 0))
                              pbr = float(item.get('PBratio', 0))
                              
                              # 排除資料不全者 (依照您的要求：缺一不可)
                              if price > 0 and yield_val > 0 and pbr > 0:
                                  stocks.append({
                                      "id": sid,
                                      "name": item.get('Name', '').strip(),
                                      "market": "市",
                                      "price": price,
                                      "pbr": pbr,
                                      "cashYield": yield_val,
                                      "stockYield": 0.0,
                                      "totalYield": yield_val,
                                      "category": item.get('Industry', '其他')
                                  })
                          except: continue
                  return stocks
              except Exception as e:
                  print(f"Error: {e}")
                  return []

          final_data = get_data()
          if final_data:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_data, f, ensure_ascii=False, indent=2)
              print(f"🚀 成功產出 {len(final_data)} 筆完整資料")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "修正資料抓取邏輯" && git push)
