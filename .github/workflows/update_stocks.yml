name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def fetch_data():
              # 使用證交所 Open Data (CSV)，避開 JSON Char 0 錯誤
              twse_url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
              stocks = []
              try:
                  print("📡 正在獲取證交所 Open Data...")
                  resp = requests.get(twse_url, timeout=30)
                  # 處理可能的編碼問題
                  df = pd.read_csv(io.StringIO(resp.text))
                  df.columns = [c.strip() for c in df.columns]
                  
                  for _, row in df.iterrows():
                      sid = str(row['證券代號']).strip()
                      # 過濾出 4 位數股票，排除 ETF 與權證
                      if len(sid) == 4 and sid.isdigit():
                          # 根據你的需求：收盤價、PBR、合計殖利率
                          price = pd.to_numeric(row['收盤價'], errors='coerce')
                          pbr = pd.to_numeric(row['本淨比'], errors='coerce')
                          yield_rate = pd.to_numeric(row['殖利率(%)'], errors='coerce')
                          
                          if price > 0 and not pd.isna(yield_rate):
                              stocks.append({
                                  "id": sid,
                                  "name": str(row['證券名稱']).strip(),
                                  "market": "市",
                                  "price": float(price),
                                  "pbr": float(pbr) if not pd.isna(pbr) else 0,
                                  "cashYield": float(yield_rate),
                                  "stockYield": 0.0,
                                  "totalYield": float(yield_rate)
                              })
                  print(f"✅ 上市處理完成: {len(stocks)} 筆")
              except Exception as e:
                  print(f"❌ 錯誤: {e}")
              return stocks

          data = fetch_data()
          if len(data) > 0:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print("🚀 data.json 產出成功！")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新股價數據" && git push)
