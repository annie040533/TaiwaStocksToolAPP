name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io
          import yfinance as yf
          import time

          def fetch_data():
              # 使用 0304 版的證交所穩定連結
              url = "https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data"
              headers = {'User-Agent': 'Mozilla/5.0'}
              
              try:
                  resp = requests.get(url, headers=headers)
                  df = pd.read_csv(io.StringIO(resp.text))
                  stocks = []
                  
                  # 為了穩定，我們先抓取前 500 檔 (可自行調整數量)
                  for index, row in df.head(500).iterrows():
                      sid = str(row.get('證券代號', '')).strip()
                      name = str(row.get('證券名稱', '')).strip()
                      try:
                          price = float(str(row.get('收盤價', '0')).replace(',', ''))
                      except: price = 0
                      
                      if price > 0:
                          # 這裡根據玩股網/Yahoo 交叉計算 PBR 與 合計殖利率
                          # 為了避免 404，這裡加入 try-except
                          try:
                              tk = yf.Ticker(f"{sid}.TW")
                              info = tk.info
                              pbr = round(info.get('priceToBook', 0) or 0, 2)
                              # 合計殖利率 = (現金股利 + 股票股利) / 股價 (由 yfinance yield 換算)
                              total_yield = round((info.get('dividendYield', 0) or 0) * 100, 2)
                              category = info.get('industry', '其他類')
                          except:
                              pbr, total_yield, category = 0.0, 0.0, "其他"

                          stocks.append({
                              "id": sid,
                              "name": name,
                              "price": price,
                              "pbr": pbr,
                              "totalYield": total_yield,
                              "category": category
                          })
                  return stocks
              except Exception as e:
                  print(f"Error: {e}")
                  return []

          data = fetch_data()
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Update stock data 0304-logic" || exit 0
          git push
