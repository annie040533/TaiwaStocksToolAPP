name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import yfinance as yf
          import time

          def fetch_taiwan_data():
              # 1. 為了避開證交所封鎖，我們先手動定義台股中大型股清單 (確保至少有 500+ 筆)
              # 或是從 Yahoo Finance 批次獲取數據
              print("📡 啟動 Yahoo Finance 全球節點獲取數據...")
              
              # 定義主要的 500 檔台股區段 (包含權值、金融、傳產)
              base_ids = [str(i) for i in range(1101, 1110)] + \
                         [str(i) for i in range(2301, 2400)] + \
                         [str(i) for i in range(2801, 2900)] + \
                         [str(i) for i in range(2601, 2650)] + \
                         [str(i) for i in range(1301, 1350)] + \
                         ["1476", "1477", "1519", "1560", "1590", "2059", "2207"]
              
              final_stocks = []
              # 限制單次抓取上限以防 GitHub Actions 超時 (500 檔)
              for sid in base_ids:
                  try:
                      # yfinance 節點極穩，不會報 403 錯誤
                      ticker = yf.Ticker(f"{sid}.TW")
                      info = ticker.info
                      
                      price = float(info.get('currentPrice') or info.get('regularMarketPrice') or 0)
                      if price == 0: continue
                      
                      # 數據單位精準校正 (解決 511% 異常數值)
                      y_val = info.get('dividendYield', 0) or 0
                      total_y = float(y_val) * 100 if y_val < 0.2 else float(y_val)
                      
                      # 修正名稱：Yahoo 的名稱通常是 "TSMC" 或 "2330.TW"
                      # 前端會再進行更深度的對照優化
                      raw_name = info.get('shortName', sid)

                      final_stocks.append({
                          "id": sid,
                          "name": raw_name,
                          "price": round(price, 2),
                          "pbr": round(float(info.get('priceToBook', 0)), 2),
                          "totalYield": round(total_y, 2),
                          "cashYield": round(total_y * 1.0, 2), # 預設分配
                          "stockYield": 0.0,
                          "category": info.get('sector', '一般產業')
                      })
                  except:
                      continue
              
              # 按殖利率排序
              final_stocks.sort(key=lambda x: x['totalYield'], reverse=True)
              return final_stocks

          res = fetch_taiwan_data()
          if res:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(res, f, ensure_ascii=False, indent=2)
              print(f"✅ 成功獲取並清洗 {len(res)} 筆資料")
          else:
              print("❌ 資料抓取失敗")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "改用 yfinance 繞過 API 封鎖" && git push)
