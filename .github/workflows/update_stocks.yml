name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import json
          import yfinance as yf
          import time

          def fetch_taiwan_value_data():
              # 1. 獲取台股清單 (從證交所 OpenAPI 獲取代碼，避開官網 HTML 封鎖)
              try:
                  url = "https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL"
                  items = requests.get(url, timeout=15).json()
                  # 抓取前 200 檔股票代號
                  stock_ids = [i['Code'] for i in items if len(i['Code']) == 4][:200]
              except Exception as e:
                  print(f"無法獲取清單: {e}")
                  stock_ids = ["2330", "2317", "2454", "1476", "1477", "1560", "2308", "1519", "1590", "2059", "2207"]

              final_stocks = []
              print(f"📡 正在處理 {len(stock_ids)} 檔台股深度數據...")
              
              for sid in stock_ids:
                  try:
                      ticker = yf.Ticker(f"{sid}.TW")
                      info = ticker.info
                      
                      # 獲取價格與本淨比
                      price = float(info.get('currentPrice') or info.get('regularMarketPrice') or 0)
                      pbr = float(info.get('priceToBook') or 0)
                      
                      # 2. 殖利率精確清洗 (解決 511% 等錯誤)
                      raw_yield = info.get('dividendYield', 0)
                      if raw_yield is None: raw_yield = 0
                      
                      # Yahoo 數據換算邏輯：若小於 0.2 則視為小數 (0.05 -> 5%)，若大於 0.2 則可能是原始百分比
                      total_yield = float(raw_yield) * 100 if raw_yield < 0.2 else float(raw_yield)
                      
                      # 3. 模擬三項殖利率 (因免費 API 限制，以合計為基準進行合理分配)
                      # 現實中現金股利通常佔大宗，這裡設定 9:1 分配以符合顯示需求
                      cash_y = total_yield * 1.0 
                      stock_y = 0.0 # 預設股票股利為 0，除非有特殊標註
                      
                      # 過濾異常數據 (殖利率 > 25% 通常是 Yahoo 數據維護錯誤)
                      if total_yield > 25: total_yield = 0

                      if price > 0:
                          final_stocks.append({
                              "id": sid,
                              "name": info.get('shortName', sid), # 名稱中文化會在前端 index.html 處理
                              "price": round(price, 2),
                              "pbr": round(pbr, 2),
                              "totalYield": round(total_yield, 2),
                              "cashYield": round(cash_y, 2),
                              "stockYield": round(stock_y, 2),
                              "category": info.get('sector', 'Other')
                          })
                      
                      # 稍微延遲避免被 Yahoo 暫時封鎖
                      time.sleep(0.1)
                  except Exception:
                      continue
                      
              return final_stocks

          res = fetch_taiwan_value_data()
          if res:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(res, f, ensure_ascii=False, indent=2)
              print(f"✅ 成功產出 {len(res)} 筆完整台股資料")
          else:
              print("❌ 未抓取到有效資料")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "更新台股殖利率與 PBR 數據" && git push)
