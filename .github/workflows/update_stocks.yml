name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def fetch_data():
              # 0304 版穩定連結：證交所每日行情
              url = "https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data"
              headers = {'User-Agent': 'Mozilla/5.0'}
              
              try:
                  resp = requests.get(url, headers=headers)
                  resp.encoding = 'utf-8'
                  df = pd.read_csv(io.StringIO(resp.text))
                  
                  # 讀取證交所另一份包含「產業別」的清單做交叉比對
                  ind_url = "https://www.twse.com.tw/api/downloadExData?format=csv&get0=all&tableName=STKALL"
                  ind_resp = requests.get(ind_url, headers=headers)
                  # 簡單邏輯：從主表抓取基本資料
                  
                  stocks = []
                  for _, row in df.iterrows():
                      sid = str(row.get('證券代號', '')).strip().replace('"', '')
                      name = str(row.get('證券名稱', '')).strip().replace('"', '')
                      try:
                          price = float(str(row.get('收盤價', '0')).replace(',', ''))
                      except: price = 0
                      
                      if price > 0 and len(sid) == 4: # 只抓取 4 碼個股
                          stocks.append({
                              "id": sid,
                              "name": name,
                              "price": price,
                              "category": "一般產業", # 預設值，前端會再根據代碼區間細分
                              "totalYield": 5.2, # 預設模擬值，若需實時請參考 Excel 串接
                              "pbr": 1.25
                          })
                  return stocks
              except Exception as e:
                  print(f"Error: {e}")
                  return []

          data = fetch_data()
          if data:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git add data.json
          git commit -m "Fix: Restore data source and layout" || exit 0
          git push
