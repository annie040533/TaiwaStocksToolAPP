name: Update Stock Data
on:
  schedule:
    - cron: '0 1,5,10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def fetch_data():
              url = "https://www.twse.com.tw/exchangeReport/BWIBYK_ALL?response=open_data"
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/91.0.4472.124'}
              stocks = []
              try:
                  print("📡 啟動連線...")
                  resp = requests.get(url, headers=headers, timeout=30)
                  # 核心修正：手動尋找數據起始行，避開解析錯誤
                  lines = resp.text.split('\n')
                  start_line = 0
                  for i, line in enumerate(lines):
                      if "證券代號" in line:
                          start_line = i
                          break
                  
                  clean_csv = "\n".join(lines[start_line:])
                  df = pd.read_csv(io.StringIO(clean_csv), on_bad_lines='skip')
                  df.columns = [str(c).strip().replace('"', '') for c in df.columns]

                  for _, row in df.iterrows():
                      sid = str(row.get('證券代號', '')).strip().replace('"', '')
                      if len(sid) == 4 and sid.isdigit():
                          try:
                              def clean_val(v):
                                  s = str(v).strip().replace(',', '').replace('"', '')
                                  return float(s) if s not in ['', '-', 'None'] else 0.0

                              price = clean_val(row.get('收盤價', 0))
                              yld = clean_val(row.get('殖利率(%)', 0))
                              pbr = clean_val(row.get('本淨比', 0))
                              
                              if price > 0:
                                  stocks.append({
                                      "id": sid, "name": str(row.get('證券名稱', '')).strip().replace('"', ''),
                                      "market": "市", "price": price, "pbr": pbr,
                                      "cashYield": yld, "stockYield": 0.0, "totalYield": yld
                                  })
                          except: continue
                  print(f"✅ 解析成功：{len(stocks)} 筆個股")
              except Exception as e:
                  print(f"❌ 錯誤原因: {e}")
              return stocks

          final_data = fetch_data()
          if len(final_data) > 500:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(final_data, f, ensure_ascii=False, indent=2)
              print("🚀 data.json 已產出")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新股價數據" && git push)
