name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas yfinance

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import yfinance as yf
          import time

          def get_data():
              # 1. 抓取證交所基本行情 (確保中文名稱與正確股價)
              url = "https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data"
              res = requests.get(url)
              df = pd.read_csv(io.StringIO(res.text))
              
              stocks = []
              # 篩選前 600 檔避免過多請求，並優先處理權值股
              for _, row in df.head(800).iterrows():
                  sid = str(row['證券代號']).strip()
                  name = str(row['證券名稱']).strip()
                  price = float(row['收盤價']) if row['收盤價'] != 'nan' else 0
                  
                  if price == 0: continue
                  
                  try:
                      # 2. 透過 yfinance 獲取殖利率與 PBR (交叉比對玩股網邏輯)
                      ticker = yf.Ticker(f"{sid}.TW")
                      info = ticker.info
                      
                      cash_div = info.get('dividendRate', 0) or 0
                      # 這裡模擬合計殖利率計算: (現金股利 + 預估股票股利) / 股價
                      # 實務上從 API 獲取 yield 值
                      total_yield = round((info.get('dividendYield', 0) or 0) * 100, 2)
                      pbr = round(info.get('priceToBook', 0) or 0, 2)
                      
                      # 產業別 (手動修正邏輯，對應玩股網分類)
                      category = info.get('industry', '其他')
                      
                      stocks.append({
                          "id": sid,
                          "name": name,
                          "price": price,
                          "category": category,
                          "totalYield": total_yield,
                          "pbr": pbr
                      })
                  except:
                      continue
                  time.sleep(0.1) # 避免被封鎖
              return stocks

          import io
          final_data = get_data()
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(final_data, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git add data.json
          git commit -m "Update stock data with PBR and Total Yield" || exit 0
          git push
