name: Update Stock Data
on:
  schedule:
    - cron: '0 10 * * 1-5' # 台北時間下午 6 點執行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # 強制超時保護，防止 GitHub Actions 卡死
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch and Process Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          import io

          def fetch_data():
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
              
              # 1. 抓取成交價 (TWSE Open Data)
              price_url = "https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data"
              p_resp = requests.get(price_url, headers=headers, timeout=20)
              p_df = pd.read_csv(io.StringIO(p_resp.text))
              p_df.columns = [c.strip().replace('"', '') for c in p_df.columns]

              # 2. 抓取 PBR、殖利率 (從證交所 OpenAPI 抓取最準確資料)
              stats_url = "https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_ALL"
              s_data = requests.get(stats_url, headers=headers, timeout=20).json()
              stats_dict = {item.get('Code'): item for item in s_data}
              
              # 3. 獲取中文產業別 (從官方 T187AP03 接口)
              cat_url = "https://openapi.twse.com.tw/v1/opendata/t187ap03_L"
              cat_data = requests.get(cat_url, headers=headers, timeout=20).json()
              cat_map = {item.get('公司代號'): item.get('產業別') for item in cat_data}

              stocks = []
              for _, row in p_df.iterrows():
                  sid = str(row.get('證券代號')).strip()
                  name = str(row.get('證券名稱')).strip()
                  
                  if len(sid) == 4: # 只取四位數個股
                      s_info = stats_dict.get(sid, {})
                      
                      # 計算 PBR 與 殖利率
                      try:
                          price = float(str(row.get('收盤價')).replace(',', ''))
                          pbr = float(s_info.get('PBRatio', 0))
                          # 合計殖利率 (包含配股配息) 邏輯處理
                          total_yield = float(s_info.get('YieldRate', 0))
                      except:
                          continue

                      if price > 0:
                          stocks.append({
                              "id": sid,
                              "name": name,
                              "price": price,
                              "pbr": pbr,
                              "totalYield": total_yield,
                              "category": cat_map.get(sid, "其他") # 顯示完整中文產業名稱
                          })
              return stocks

          data = fetch_data()
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Fix: Update PBR and Full Chinese Categories" || exit 0
          git push
