<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股深度價值雷達</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans">

<div id="app" v-cloak class="p-4 max-w-7xl mx-auto">
    <header class="mb-8 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">台股深度價值雷達</h1>
            <p class="text-slate-400 font-bold text-sm">數據每週自動校準更新</p>
        </div>
        <div class="flex gap-4 w-full md:w-auto mt-6 md:mt-0">
            <input v-model="search" type="text" placeholder="搜尋代碼或名稱..." class="px-5 py-3 rounded-2xl border-none bg-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none flex-grow">
            <select v-model="selectedCat" class="bg-slate-800 text-white rounded-2xl px-6 py-3 font-bold text-sm cursor-pointer hover:bg-slate-700 transition-colors shadow-lg shadow-slate-200">
                <option value="">所有產業</option>
                <option v-for="c in categories" :value="c">{{ c }}</option>
            </select>
        </div>
    </header>

    <div v-for="pg in nestedData" :key="pg.range" class="mb-12">
        <div @click="togglePrice(pg.range)" class="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm cursor-pointer border-l-8 border-indigo-600 hover:bg-slate-50 transition-all mb-6">
            <div class="flex items-center gap-4">
                <h2 class="text-2xl font-black text-slate-800">{{ pg.range }}</h2>
                <span class="bg-indigo-100 text-indigo-600 text-xs px-3 py-1 rounded-full font-black">{{ pg.totalCount }} 檔</span>
            </div>
            <i :class="isPriceCollapsed(pg.range) ? 'fa-chevron-down' : 'fa-chevron-up'" class="fa-solid text-slate-300"></i>
        </div>

        <div v-show="!isPriceCollapsed(pg.range)" class="ml-4 space-y-12">
            <div v-for="yg in pg.yieldGroups" :key="yg.label" v-show="yg.items.length > 0">
                <div class="flex items-center gap-3 mb-6 border-b-2 border-slate-100 pb-2">
                    <div :class="yg.color" class="w-4 h-4 rounded-full shadow-sm"></div>
                    <h3 class="font-black text-slate-600 text-lg">{{ yg.label }}</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <div v-for="s in yg.items" :key="s.id" class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-slate-100 hover:shadow-2xl hover:-translate-y-1 transition-all">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <span class="text-[10px] bg-slate-100 text-slate-500 px-3 py-1 rounded-full font-black mb-2 inline-block uppercase">{{ s.category }}</span>
                                <h4 class="text-xl font-black text-slate-800">{{ s.id }} {{ s.name }}</h4>
                            </div>
                            <div class="text-2xl font-black text-slate-900 tracking-tighter">${{ s.price }}</div>
                        </div>

                        <div class="grid grid-cols-3 gap-3 text-center bg-slate-50 p-4 rounded-3xl border border-slate-100">
                            <div>
                                <p class="text-[9px] text-slate-400 font-bold mb-1">現金</p>
                                <p class="font-black text-slate-700">{{ s.cashYield }}%</p>
                            </div>
                            <div>
                                <p class="text-[9px] text-slate-400 font-bold mb-1">股票</p>
                                <p class="font-black text-slate-700">{{ s.stockYield }}%</p>
                            </div>
                            <div class="bg-white rounded-2xl shadow-sm p-1 border border-indigo-50">
                                <p class="text-[9px] text-indigo-500 font-bold mb-1">合計</p>
                                <p class="font-black text-indigo-600">{{ s.totalYield }}%</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                stocks: [], search: '', selectedCat: '', collapsedPrices: [],
                catMap: {
                    'Technology': '資訊科技', 'Financial Services': '金融保險', 'Industrials': '航運/工業',
                    'Consumer Cyclical': '消費性電子', 'Communication Services': '通訊網路', 'Healthcare': '醫療保健',
                    'Real Estate': '房地產', 'Consumer Defensive': '民生必需', 'Basic Materials': '基礎材料'
                }
            }
        },
        computed: {
            categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
            filtered() {
                return this.stocks.filter(s => 
                    (s.id.includes(this.search) || s.name.includes(this.search)) && 
                    (this.selectedCat === '' || s.category === this.selectedCat)
                );
            },
            nestedData() {
                const ranges = [
                    { label: "股價 300+ 元區間", min: 300, max: 99999 },
                    { label: "股價 100 - 300 元區間", min: 100, max: 300 },
                    { label: "股價 0 - 100 元區間", min: 0, max: 100 }
                ];
                return ranges.map(r => {
                    const inRange = this.filtered.filter(s => s.price >= r.min && s.price < r.max);
                    const sort = (arr) => arr.sort((a, b) => b.totalYield - a.totalYield);
                    return {
                        range: r.label, totalCount: inRange.length,
                        yieldGroups: [
                            { label: "合計殖利率 10% 以上", color: "bg-red-500", items: sort(inRange.filter(s => s.totalYield >= 10)) },
                            { label: "合計殖利率 5 - 10%", color: "bg-emerald-500", items: sort(inRange.filter(s => s.totalYield >= 5 && s.totalYield < 10)) },
                            { label: "合計殖利率 0 - 5%", color: "bg-slate-300", items: sort(inRange.filter(s => s.totalYield < 5)) }
                        ]
                    };
                });
            }
        },
        methods: {
            async load() {
                const res = await fetch('./data.json?v=' + Date.now());
                const data = await res.json();
                this.stocks = data.map(s => ({
                    ...s,
                    category: this.catMap[s.category] || s.category || '一般產業'
                }));
            },
            togglePrice(r) { 
                this.collapsedPrices.includes(r) ? this.collapsedPrices = this.collapsedPrices.filter(x => x !== r) : this.collapsedPrices.push(r); 
            },
            isPriceCollapsed(r) { return this.collapsedPrices.includes(r); }
        },
        mounted() { this.load(); }
    }).mount('#app');
</script>
</body>
</html>
