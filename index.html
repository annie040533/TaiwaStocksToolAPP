<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台股價值選股雷達</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

<div id="app" v-cloak class="container mx-auto px-4 py-8 max-w-5xl">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-extrabold text-slate-800 flex items-center">
                <i class="fa-solid fa-bolt text-blue-600 mr-2"></i>台股價值選股雷達
            </h1>
            <p class="text-slate-400 text-sm mt-1">數據源：GitHub 自動同步 (防 ban 穩定版)</p>
        </div>
        <div class="flex items-center gap-2">
            <div class="bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200">
                <span v-if="loading" class="text-blue-500 font-bold animate-pulse">同步中...</span>
                <span v-else class="text-green-600 font-bold">已載入 {{ stocks.length }} 筆資料</span>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="relative md:col-span-2">
            <i class="fa-solid fa-search absolute left-4 top-4 text-slate-300"></i>
            <input v-model="search" type="text" placeholder="搜尋代碼或名稱 (如: 2330)..." 
                class="w-full pl-12 pr-4 py-3 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-lg">
        </div>
        <select v-model="priceRange" class="bg-white px-4 py-3 rounded-2xl border-none shadow-sm outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-600">
            <option value="all">所有價格區間</option>
            <option value="0-20">0 - 20 元</option>
            <option value="20-50">20 - 50 元</option>
            <option value="50-100">50 - 100 元</option>
            <option value="100-300">100 - 300 元</option>
            <option value="300+">300 元以上</option>
        </select>
        <button @click="sortByYield" class="bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition active:scale-95">
            <i class="fa-solid fa-arrow-down-wide-short mr-2"></i>按殖利率排序
        </button>
    </div>

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-800 text-white text-sm uppercase tracking-wider">
                <tr>
                    <th class="px-6 py-5">代碼 / 名稱</th>
                    <th class="px-6 py-5">收盤價</th>
                    <th class="px-6 py-5 text-center">本淨比</th>
                    <th class="px-6 py-5 text-right text-orange-400">合計殖利率</th>
                    <th class="px-6 py-5 text-center">線圖</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50 text-slate-700">
                <tr v-for="s in filteredStocks" :key="s.id" class="hover:bg-blue-50/50 transition">
                    <td class="px-6 py-5">
                        <div class="font-black text-lg text-slate-900">{{ s.name }}</div>
                        <div class="text-xs font-mono text-slate-400">{{ s.id }} · {{ s.industry }}</div>
                    </td>
                    <td class="px-6 py-5 font-bold text-slate-600">NT$ {{ s.price }}</td>
                    <td class="px-6 py-5 text-center">
                        <span :class="s.pbr < 1.2 ? 'bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold' : 'text-slate-400'">
                            {{ s.pbr }}
                        </span>
                    </td>
                    <td class="px-6 py-5 text-right font-black text-2xl text-orange-500">{{ s.totalYield }}%</td>
                    <td class="px-6 py-5 text-center">
                        <a :href="'https://www.wantgoo.com/stock/'+s.id+'/technical-chart'" target="_blank" class="text-slate-300 hover:text-blue-500 transition">
                            <i class="fa-solid fa-chart-line fa-xl"></i>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div v-if="!loading && filteredStocks.length === 0" class="p-20 text-center text-slate-400">
            <i class="fa-solid fa-box-open fa-3x mb-4 opacity-20"></i>
            <p>查無資料，請確認 GitHub Actions 是否已執行成功產出 data.json</p>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                stocks: [],
                loading: true,
                search: '',
                priceRange: 'all'
            }
        },
        computed: {
            filteredStocks() {
                let list = this.stocks.filter(s => s.id.includes(this.search) || s.name.includes(this.search));
                
                // 價格區間過濾
                if (this.priceRange !== 'all') {
                    const [min, max] = this.priceRange.includes('+') ? [300, 999999] : this.priceRange.split('-').map(Number);
                    list = list.filter(s => s.price >= min && s.price < max);
                }
                
                // 預設按殖利率排序 (10%以上 > 5-10% > 0-5%)
                return list.sort((a, b) => b.totalYield - a.totalYield);
            }
        },
        methods: {
            sortByYield() {
                this.stocks.sort((a, b) => b.totalYield - a.totalYield);
            },
            async fetchData() {
                try {
                    // 加入亂數 v= 防止瀏覽器快取舊資料
                    const res = await fetch('./data.json?v=' + Date.now());
                    this.stocks = await res.json();
                } catch (e) {
                    console.error("資料載入失敗，請確認 data.json 是否存在");
                } finally {
                    this.loading = false;
                }
            }
        },
        mounted() {
            this.fetchData();
        }
    }).mount('#app');
</script>
</body>
</html>
