<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股深度價值雷達 - 專業版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen pb-20">

<div id="app" v-cloak class="p-6 max-w-7xl mx-auto">
    <header class="mb-10 flex flex-col md:flex-row justify-between items-center bg-white p-8 rounded-3xl shadow-md border-b-4 border-indigo-500">
        <div>
            <h1 class="text-4xl font-black text-gray-800">台股深度價值雷達</h1>
            <p class="text-gray-400 font-bold">同步 PChome 產業分類 | 自動中文化</p>
        </div>
        <div class="flex gap-4 mt-6 md:mt-0">
            <input v-model="search" type="text" placeholder="搜尋代碼..." class="px-6 py-3 rounded-2xl border-2 border-gray-100 focus:border-indigo-500 outline-none w-64 font-bold">
            <select v-model="selectedCat" class="bg-indigo-600 text-white rounded-2xl px-6 py-3 font-bold">
                <option value="">所有產業 (PChome 分類)</option>
                <option v-for="c in categories" :value="c">{{ c }}</option>
            </select>
        </div>
    </header>

    <div v-for="pg in nestedData" :key="pg.range" class="mb-14">
        <div @click="togglePrice(pg.range)" class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm cursor-pointer border-l-8 border-indigo-600 mb-6 hover:bg-gray-50">
            <h2 class="text-2xl font-black text-gray-700">{{ pg.range }} <span class="text-sm text-gray-400 ml-2">({{ pg.totalCount }} 檔)</span></h2>
            <i :class="isPriceCollapsed(pg.range) ? 'fa-chevron-down' : 'fa-chevron-up'" class="fa-solid text-gray-300"></i>
        </div>

        <div v-show="!isPriceCollapsed(pg.range)" class="space-y-12 ml-4">
            <div v-for="yg in pg.yieldGroups" :key="yg.label" v-show="yg.items.length > 0">
                <div class="flex items-center gap-3 mb-6">
                    <div :class="yg.color" class="w-4 h-4 rounded-full"></div>
                    <h3 class="font-black text-gray-500 uppercase tracking-widest">{{ yg.label }}</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div v-for="s in yg.items" :key="s.id" class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 hover:shadow-xl transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full font-bold">{{ s.category }}</span>
                                <h4 class="text-lg font-black text-gray-800 mt-2">{{ s.id }} {{ s.name }}</h4>
                            </div>
                            <div class="text-xl font-black text-gray-900">${{ s.price }}</div>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 flex justify-between items-center">
                            <span class="text-xs font-bold text-gray-400">合計殖利率</span>
                            <span class="text-xl font-black text-indigo-600">{{ s.totalYield }}%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return { stocks: [], search: '', selectedCat: '', collapsedPrices: [] }
        },
        computed: {
            categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
            filtered() {
                return this.stocks.filter(s => (s.id.includes(this.search) || s.name.includes(this.search)) && (this.selectedCat === '' || s.category === this.selectedCat));
            },
            nestedData() {
                const ranges = [
                    { label: "股價 300+ 元以上", min: 300, max: 99999 },
                    { label: "股價 100 - 300 元", min: 100, max: 300 },
                    { label: "股價 50 - 100 元", min: 50, max: 100 },
                    { label: "股價 0 - 50 元", min: 0, max: 50 }
                ];
                return ranges.map(r => {
                    const inRange = this.filtered.filter(s => s.price >= r.min && s.price < r.max);
                    return {
                        range: r.label, totalCount: inRange.length,
                        yieldGroups: [
                            { label: "殖利率 > 7%", color: "bg-red-500", items: inRange.filter(s => s.totalYield >= 7).sort((a,b)=>b.totalYield-a.totalYield) },
                            { label: "殖利率 4 - 7%", color: "bg-green-500", items: inRange.filter(s => s.totalYield >= 4 && s.totalYield < 7).sort((a,b)=>b.totalYield-a.totalYield) },
                            { label: "殖利率 < 4%", color: "bg-gray-300", items: inRange.filter(s => s.totalYield < 4).sort((a,b)=>b.totalYield-a.totalYield) }
                        ]
                    };
                });
            }
        },
        methods: {
            async load() {
                const res = await fetch('./data.json?v=' + Date.now());
                this.stocks = await res.json();
            },
            togglePrice(r) { this.collapsedPrices.includes(r) ? this.collapsedPrices = this.collapsedPrices.filter(x => x !== r) : this.collapsedPrices.push(r); },
            isPriceCollapsed(r) { return this.collapsedPrices.includes(r); }
        },
        mounted() { this.load(); }
    }).mount('#app');
</script>
</body>
</html>
