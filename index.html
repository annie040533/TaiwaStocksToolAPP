<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股產業選股雷達</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

<div id="app" v-cloak class="pb-20">
    <header class="bg-indigo-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic"><i class="fa-solid fa-gem mr-2 text-yellow-400"></i>台股價值雷達</h1>
            <button @click="fetchData" class="text-sm bg-indigo-700 px-3 py-1 rounded-full hover:bg-indigo-600">
                <i class="fa-solid fa-sync" :class="{'fa-spin': loading}"></i> 重新載入
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div class="bg-white rounded-2xl shadow-sm p-4 mb-6 grid grid-cols-1 md:grid-cols-2 gap-4 border border-indigo-50">
            <div class="relative">
                <i class="fa-solid fa-search absolute left-3 top-3.5 text-slate-400"></i>
                <input v-model="search" type="text" placeholder="輸入股票代號或名稱..." 
                    class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <select v-model="selectedIndustry" class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="">全部產業類別</option>
                <option v-for="ind in industries" :value="ind">{{ ind }}</option>
            </select>
        </div>

        <div v-if="loading" class="text-center py-20">
            <div class="inline-block animate-bounce bg-indigo-500 text-white p-4 rounded-full shadow-lg">
                <i class="fa-solid fa-satellite-dish fa-2xl"></i>
            </div>
            <p class="mt-4 text-slate-500 font-bold">正在掃描全台股市場...</p>
        </div>

        <div v-else class="space-y-6">
            <div v-for="group in groupedStocks" :key="group.label" v-show="group.items.length > 0">
                <h2 class="text-sm font-black text-slate-400 mb-3 px-2 flex items-center">
                    <span class="bg-slate-200 h-px flex-grow mr-3"></span>
                    價格區間：{{ group.label }} ({{ group.items.length }})
                    <span class="bg-slate-200 h-px flex-grow ml-3"></span>
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div v-for="s in group.items" :key="s.id" class="bg-white rounded-2xl shadow-sm hover:shadow-md transition border border-slate-100 overflow-hidden">
                        <div class="p-4 flex justify-between items-start">
                            <div>
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-bold bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded">{{ s.industry }}</span>
                                    <span class="text-xs text-slate-400">{{ s.market === '市' ? '上市' : '上櫃' }}</span>
                                </div>
                                <h3 class="text-xl font-bold text-slate-800 mt-1">{{ s.name }} <span class="text-slate-400 text-sm font-mono">{{ s.id }}</span></h3>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black text-indigo-600">${{ s.price }}</div>
                                <div class="text-xs font-bold" :class="s.pbr < 1 ? 'text-green-500' : 'text-slate-400'">PBR: {{ s.pbr }}</div>
                            </div>
                        </div>
                        
                        <div class="bg-slate-50 p-4 flex justify-around items-center border-t border-slate-50">
                            <div class="text-center">
                                <p class="text-[10px] text-slate-400 uppercase">合計殖利率</p>
                                <p class="text-lg font-black text-rose-500">{{ s.totalYield }}%</p>
                            </div>
                            <a :href="'https://www.wantgoo.com/stock/' + s.id + '/technical-chart'" target="_blank" 
                                class="bg-white px-4 py-2 rounded-lg shadow-sm text-xs font-bold text-slate-600 hover:text-indigo-600">
                                <i class="fa-solid fa-chart-line mr-1"></i> 技術線型
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                loading: true,
                search: '',
                selectedIndustry: '',
                stocks: [],
                gasUrl: 'https://script.google.com/macros/s/AKfycby2YH7S9L9KeGa61gLCKNWsbOT27PKPiJvlkhcseGs1ELUZKGxHhrbDh8Xh6E8ho5mG/exec' // 請在此處填入網址
            }
        },
        computed: {
            industries() {
                return [...new Set(this.stocks.map(s => s.industry))];
            },
            groupedStocks() {
                const filtered = this.stocks.filter(s => {
                    const matchText = s.id.includes(this.search) || s.name.includes(this.search);
                    const matchInd = !this.selectedIndustry || s.industry === this.selectedIndustry;
                    return matchText && matchInd;
                });

                const groups = [
                    { label: "0 - 20 元", min: 0, max: 20 },
                    { label: "20 - 50 元", min: 20, max: 50 },
                    { label: "50 - 100 元", min: 50, max: 100 },
                    { label: "100 - 300 元", min: 100, max: 300 },
                    { label: "300 元以上", min: 300, max: 99999 }
                ];

                return groups.map(g => {
                    const items = filtered.filter(s => s.price >= g.min && s.price < g.max)
                        .sort((a, b) => b.totalYield - a.totalYield); // 二次排序：殖利率高到低
                    return { label: g.label, items };
                });
            }
        },
        methods: {
            async fetchData() {
                this.loading = true;
                try {
                    const res = await fetch(this.gasUrl, { redirect: 'follow' });
                    this.stocks = await res.json();
                } catch (e) {
                    alert("獲取資料失敗，請確認 GAS 權限設定！");
                } finally {
                    this.loading = false;
                }
            }
        },
        mounted() { this.fetchData(); }
    }).mount('#app');
</script>
</body>
</html>
