<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股價值雷達 - 專業版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen pb-20">

<div id="app" v-cloak class="p-4 max-w-6xl mx-auto">
    <header class="mb-8 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-black text-slate-800">台股價值選股</h1>
            <p class="text-slate-400 font-bold">自動追蹤最新合計殖利率與 PBR</p>
        </div>
        <select v-model="selectedCat" class="border rounded-lg px-4 py-2 text-sm outline-none">
            <option value="">所有產業</option>
            <option v-for="c in categories" :value="c">{{ c }}</option>
        </select>
    </header>

    <div v-for="group in yieldGroups" :key="group.label" class="mb-10">
        <div class="flex items-center gap-3 mb-6 border-b-2 border-slate-200 pb-2">
            <div :class="group.color" class="h-6 w-1 rounded-full"></div>
            <h2 class="text-xl font-black text-slate-700">{{ group.label }}</h2>
            <span class="bg-slate-200 text-slate-500 text-xs px-2 py-0.5 rounded-full font-bold">{{ group.items.length }} 檔</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div v-for="s in group.items" :key="s.id" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded font-black">{{ s.category }}</span>
                        <h3 class="text-lg font-black text-slate-800 mt-1">{{ s.id }} {{ s.chineseName }}</h3>
                    </div>
                    <div class="text-xl font-black text-slate-900">${{ s.price }}</div>
                </div>

                <div class="grid grid-cols-3 gap-2 mb-4 text-center">
                    <div class="bg-emerald-50 p-2 rounded-xl">
                        <p class="text-[9px] text-emerald-600 font-bold uppercase">現金</p>
                        <p class="font-black text-emerald-700 text-sm">{{ s.cashYield }}%</p>
                    </div>
                    <div class="bg-blue-50 p-2 rounded-xl">
                        <p class="text-[9px] text-blue-600 font-bold uppercase">股票</p>
                        <p class="font-black text-blue-700 text-sm">{{ s.stockYield }}%</p>
                    </div>
                    <div class="bg-slate-900 p-2 rounded-xl">
                        <p class="text-[9px] text-slate-400 font-bold uppercase">合計</p>
                        <p class="font-black text-white text-sm">{{ s.totalYield }}%</p>
                    </div>
                </div>

                <div class="flex justify-between items-center text-[11px] font-bold text-slate-400 px-1">
                    <span>本淨比 (PBR)</span>
                    <span class="text-slate-700">{{ s.pbr }}</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                stocks: [],
                selectedCat: '',
                // 英文產業對照
                catMap: {
                    'Technology': '資訊科技', 'Financial Services': '金融保險',
                    'Communication Services': '通訊網路', 'Consumer Cyclical': '消費性電子',
                    'Industrials': '航運/工業', 'Healthcare': '醫療保健'
                },
                // 個股名稱對照
                nameMap: {
                    '2330': '台積電', '1476': '儒鴻', '1477': '聚陽',
                    '1519': '華城', '1560': '中砂', '2308': '台達電',
                    '1590': '亞德客-KY', '2059': '川湖', '2207': '和泰車'
                }
            }
        },
        computed: {
            categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
            // 按合計殖利率區間分組
            yieldGroups() {
                const fs = this.stocks.filter(s => this.selectedCat === '' || s.category === this.selectedCat);
                const sort = (arr) => arr.sort((a, b) => b.totalYield - a.totalYield);
                return [
                    { label: "合計殖利率 10% 以上", color: "bg-red-500", items: sort(fs.filter(s => s.totalYield >= 10)) },
                    { label: "合計殖利率 5 - 10%", color: "bg-emerald-500", items: sort(fs.filter(s => s.totalYield >= 5 && s.totalYield < 10)) },
                    { label: "合計殖利率 0 - 5%", color: "bg-slate-300", items: sort(fs.filter(s => s.totalYield < 5)) }
                ];
            }
        },
        methods: {
            async load() {
                const res = await fetch('./data.json?v=' + Date.now());
                const data = await res.json();
                this.stocks = data.map(s => ({
                    ...s,
                    chineseName: this.nameMap[s.id] || s.name.split(' ')[0],
                    category: this.catMap[s.category] || '一般產業'
                }));
            }
        },
        mounted() { this.load(); }
    }).mount('#app');
</script>
</body>
</html>
