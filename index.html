<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雷達 - 摺疊分類版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

<div id="app" v-cloak>
    <header class="bg-[#2d336b] text-white py-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 max-w-6xl flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">台股雷達</h1>
            <select v-model="selectedCat" class="bg-white/10 text-white text-xs px-2 py-1.5 rounded-lg border border-white/20 outline-none">
                <option value="" class="text-slate-800">所有產業</option>
                <option v-for="c in categories" :value="c" class="text-slate-800">{{ c }}</option>
            </select>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-6xl mt-8">
        <input v-model="search" type="text" placeholder="搜尋代碼或名稱..." class="w-full px-6 py-4 rounded-2xl shadow-sm border-none focus:ring-2 focus:ring-indigo-500 outline-none text-lg text-slate-700 mb-8">

        <div v-if="!loading" class="space-y-4">
            <div v-for="group in categorizedData" :key="group.label">
                <div @click="toggleGroup(group.label)" class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-slate-100 cursor-pointer hover:bg-slate-50 transition">
                    <div class="flex items-center gap-3">
                        <div class="h-6 w-1 bg-indigo-600 rounded-full"></div>
                        <h2 class="text-lg font-bold text-slate-800">{{ group.label }}</h2>
                        <span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded">{{ group.items.length }} 檔</span>
                    </div>
                    <i :class="isCollapsed(group.label) ? 'fa-chevron-down text-blue-500' : 'fa-chevron-up text-slate-300'" class="fa-solid"></i>
                </div>

                <div v-show="!isCollapsed(group.label)" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 py-4">
                    <div v-for="s in group.items" :key="s.id" class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 hover:shadow-lg transition">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[9px] bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded font-black">{{ s.category }}</span>
                                <h3 class="text-lg font-black text-slate-800 mt-1">{{ s.id }} {{ s.name }}</h3>
                            </div>
                            <div class="text-xl font-black text-slate-900">${{ s.price }}</div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl flex justify-around border border-slate-100">
                            <div class="text-center">
                                <p class="text-[10px] text-slate-400 font-bold mb-1">殖利率</p>
                                <p :class="s.totalYield >= 5 ? 'text-emerald-600' : 'text-slate-700'" class="font-black text-lg">{{ s.totalYield }}%</p>
                            </div>
                            <div class="w-px h-8 bg-slate-200"></div>
                            <div class="text-center">
                                <p class="text-[10px] text-slate-400 font-bold mb-1">本淨比</p>
                                <p class="font-black text-slate-700 text-lg">{{ s.pbr }}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div v-else class="text-center py-20 text-slate-300 font-bold italic">數據載入中...</div>
    </main>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                stocks: [],
                loading: true,
                search: '',
                selectedCat: '',
                collapsedGroups: ['股價 50 - 100 元區間', '股價 20 - 50 元區間', '股價 0 - 20 元區間']
            }
        },
        computed: {
            categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
            filtered() {
                return this.stocks.filter(s => {
                    const matchSearch = s.name.includes(this.search) || s.id.includes(this.search);
                    const matchCat = this.selectedCat === '' || s.category === this.selectedCat;
                    return matchSearch && matchCat;
                });
            },
            categorizedData() {
                const fs = this.filtered;
                const sortFunc = (arr) => arr.sort((a, b) => b.totalYield - a.totalYield);
                return [
                    { label: "股價 300+ 元區間", items: sortFunc(fs.filter(s => s.price >= 300)) },
                    { label: "股價 100 - 300 元區間", items: sortFunc(fs.filter(s => s.price >= 100 && s.price < 300)) },
                    { label: "股價 50 - 100 元區間", items: sortFunc(fs.filter(s => s.price >= 50 && s.price < 100)) },
                    { label: "股價 20 - 50 元區間", items: sortFunc(fs.filter(s => s.price >= 20 && s.price < 50)) },
                    { label: "股價 0 - 20 元區間", items: sortFunc(fs.filter(s => s.price < 20)) }
                ];
            }
        },
        methods: {
            async loadData() {
                const res = await fetch('./data.json?v=' + Date.now());
                const data = await res.json();
                this.stocks = data.map(s => {
                    let cat = "一般產業";
                    if (s.id.startsWith('23')) cat = "半導體";
                    else if (s.id.startsWith('28')) cat = "金融業";
                    else if (s.id.startsWith('26')) cat = "航運業";
                    return { ...s, category: cat };
                });
                this.loading = false;
            },
            toggleGroup(label) {
                const i = this.collapsedGroups.indexOf(label);
                if (i > -1) this.collapsedGroups.splice(i, 1);
                else this.collapsedGroups.push(label);
            },
            isCollapsed(label) { return this.collapsedGroups.includes(label); }
        },
        mounted() { this.loadData(); }
    }).mount('#app');
</script>
</body>
</html>
