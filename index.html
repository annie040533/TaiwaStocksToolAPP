<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股價值選股雷達 - 實時全量版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

<div id="app" class="container mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">
                <i class="fa-solid fa-chart-line text-blue-600 mr-2"></i>台股價值選股雷達
            </h1>
            <p class="text-slate-500 mt-2">即時全量數據 (Google Proxy 加速版)</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <span class="text-sm text-slate-400">數據狀態：</span>
            <span v-if="loading" class="text-orange-500 font-medium anim-pulse">
                <i class="fa-solid fa-spinner fa-spin"></i> 正在從 Google 獲取全台股資料...
            </span>
            <span v-else class="text-green-600 font-medium">
                <i class="fa-solid fa-check-circle"></i> 已連線 (共 {{ stocks.length }} 筆)
            </span>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="relative">
            <i class="fa-solid fa-search absolute left-3 top-3 text-slate-400"></i>
            <input v-model="searchQuery" type="text" placeholder="輸入代碼或名稱..." 
                class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <select v-model="filterPbr" class="bg-white px-4 py-2 rounded-lg border border-slate-200 outline-none">
            <option value="all">本淨比 (PBR) - 全部</option>
            <option value="low">低本淨比 (< 1.2)</option>
            <option value="mid">中本淨比 (1.2 - 2.0)</option>
        </select>
        <select v-model="filterYield" class="bg-white px-4 py-2 rounded-lg border border-slate-200 outline-none">
            <option value="all">現金殖利率 - 全部</option>
            <option value="high">高殖利率 (> 5%)</option>
            <option value="veryHigh">超高殖利率 (> 7%)</option>
        </select>
    </div>

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="px-6 py-4">股票代碼</th>
                        <th class="px-6 py-4">名稱</th>
                        <th class="px-6 py-4">收盤價</th>
                        <th class="px-6 py-4">本淨比 (PBR)</th>
                        <th class="px-6 py-4 text-orange-400">殖利率 (%)</th>
                        <th class="px-6 py-4">產業</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr v-for="stock in filteredStocks" :key="stock.id" class="hover:bg-blue-50 transition-colors">
                        <td class="px-6 py-4 font-mono font-bold text-slate-600">{{ stock.id }}</td>
                        <td class="px-6 py-4 font-medium text-slate-800">{{ stock.name }}</td>
                        <td class="px-6 py-4">NT$ {{ stock.price }}</td>
                        <td class="px-6 py-4">
                            <span :class="stock.pbr < 1.2 ? 'text-green-600 font-bold' : 'text-slate-600'">
                                {{ stock.pbr }}
                            </span>
                        </td>
                        <td class="px-6 py-4 font-bold text-orange-600">{{ stock.totalYield }}%</td>
                        <td class="px-6 py-4 text-sm text-slate-500">{{ stock.industry }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div v-if="filteredStocks.length === 0 && !loading" class="p-20 text-center">
            <i class="fa-solid fa-folder-open text-slate-200 text-6xl mb-4"></i>
            <p class="text-slate-400 text-xl">找不到符合條件的股票</p>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                stocks: [],
                loading: true,
                searchQuery: '',
                filterPbr: 'all',
                filterYield: 'all',
                // 請在此處替換為你部署後的 GAS URL
                gasUrl: 'https://script.google.com/macros/s/AKfycby_Ns81GrWow33MTs_LsApbc1oZpKSfxCtM1ZIw5bBKKCk3_P28RPoAbGdJf8Le5ZkILw/exec' 
            }
        },
        computed: {
            filteredStocks() {
                return this.stocks.filter(s => {
                    const matchSearch = s.id.includes(this.searchQuery) || s.name.includes(this.searchQuery);
                    const matchPbr = this.filterPbr === 'all' || 
                        (this.filterPbr === 'low' && s.pbr < 1.2) ||
                        (this.filterPbr === 'mid' && s.pbr >= 1.2 && s.pbr <= 2.0);
                    const matchYield = this.filterYield === 'all' ||
                        (this.filterYield === 'high' && s.totalYield > 5) ||
                        (this.filterYield === 'veryHigh' && s.totalYield > 7);
                    
                    return matchSearch && matchPbr && matchYield;
                });
            }
        },
        methods: {
            async fetchStocks() {
                try {
                    const response = await fetch(this.gasUrl);
                    const data = await response.json();
                    
                    if (data.error) throw new Error(data.error);
                    
                    // 資料已在 GAS 端完成排序，直接賦值
                    this.stocks = data;
                } catch (error) {
                    console.error('抓取失敗:', error);
                    alert('數據抓取失敗，請確認 GAS 網址是否正確並已設定為「所有人」存取。');
                } finally {
                    this.loading = false;
                }
            }
        },
        mounted() {
            this.fetchStocks();
        }
    }).mount('#app');
</script>

<style>
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
    .anim-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
</style>

</body>
</html>
