<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股價值選股雷達</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        .collapse-enter-active, .collapse-leave-active { transition: all 0.3s ease; max-height: 1000px; }
        .collapse-enter-from, .collapse-leave-to { max-height: 0; opacity: 0; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

<div id="app" v-cloak>
    <header class="bg-[#2d336b] text-white p-6 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">
                    <i class="fa-solid fa-bolt text-yellow-400 mr-2"></i>台股雷達
                </h1>
                <button @click="fetchData" class="text-xs bg-white/20 px-4 py-2 rounded-lg hover:bg-white/30 transition">
                    重載數據
                </button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-4 top-3.5 text-white/50"></i>
                    <input v-model="search" type="text" placeholder="輸入代號或名稱搜尋..." 
                           class="w-full bg-white/10 border border-white/20 rounded-xl py-2.5 pl-11 pr-4 focus:ring-2 ring-yellow-400 focus:outline-none">
                </div>
                <select v-model="selectedCat" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 font-bold focus:outline-none">
                    <option value="" class="text-black">所有產業類別 (依玩股網比對)</option>
                    <option v-for="c in categories" :value="c" class="text-black">{{ c }}</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div v-for="pg in nestedData" :key="pg.range" class="mb-6">
            <div @click="pg.open = !pg.open" 
                 class="bg-white p-5 rounded-2xl shadow-sm border-l-[10px] border-[#2d336b] cursor-pointer flex justify-between items-center hover:bg-gray-50 transition">
                <span class="text-xl font-black text-slate-800">{{ pg.range }} <span class="text-sm font-bold text-slate-400 ml-2">{{ pg.count }} 檔</span></span>
                <i class="fa-solid" :class="pg.open ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </div>

            <div v-if="pg.open" class="mt-4 pl-2 md:pl-6 border-l-2 border-dashed border-slate-200">
                <div v-for="yg in pg.yieldGroups" :key="yg.label" v-show="yg.items.length > 0" class="mb-4">
                    <div @click="yg.open = !yg.open" class="bg-slate-100 p-3 rounded-xl cursor-pointer flex items-center gap-3 mb-3">
                        <div :class="yg.color" class="w-3 h-3 rounded-full shadow-sm"></div>
                        <span class="font-black text-slate-600">{{ yg.label }}</span>
                        <i class="fa-solid fa-caret-down text-slate-400"></i>
                    </div>

                    <div v-if="yg.open" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div v-for="s in yg.items" :key="s.id" class="bg-white p-5 rounded-[2.5rem] shadow-md border border-slate-50 relative">
                            <div class="absolute top-0 left-0 bg-indigo-600 text-white px-4 py-1.5 rounded-br-2xl text-[10px] font-black">
                                {{ s.category }}
                            </div>
                            <div class="text-right text-2xl font-black text-slate-900 mb-1">${{ s.price }}</div>
                            <div class="mb-4">
                                <span class="text-slate-400 text-xs font-bold tracking-widest">{{ s.id }}</span>
                                <h3 class="text-xl font-black text-slate-800">{{ s.name }}</h3>
                            </div>
                            
                            <div class="flex gap-2 mb-4">
                                <div class="flex-1 bg-rose-50 p-3 rounded-2xl border border-rose-100">
                                    <div class="text-[10px] font-bold text-rose-500 uppercase">合計殖利率</div>
                                    <div class="text-lg font-black text-rose-600">{{ s.totalYield }}%</div>
                                </div>
                                <div class="flex-1 bg-blue-50 p-3 rounded-2xl border border-blue-100">
                                    <div class="text-[10px] font-bold text-blue-500 uppercase">淨值比 (PBR)</div>
                                    <div class="text-lg font-black text-blue-600">{{ s.pbr }}</div>
                                </div>
                            </div>
                            
                            <a :href="'https://www.wantgoo.com/stock/' + s.id" target="_blank" 
                               class="block w-full py-2 bg-slate-50 rounded-xl text-center text-xs font-bold text-slate-400 hover:bg-indigo-50 hover:text-indigo-600 transition">
                                <i class="fa-solid fa-chart-line mr-1"></i> 查看詳細技術線圖
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() { return { stocks: [], search: '', selectedCat: '', loading: true } },
        computed: {
            categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
            nestedData() {
                const filtered = this.stocks.filter(s => 
                    (s.name.includes(this.search) || s.id.includes(this.search)) &&
                    (this.selectedCat === '' || s.category === this.selectedCat)
                );
                
                const ranges = [
                    { label: "股價 300+ 元以上", min: 300, max: 99999 },
                    { label: "股價 100 - 300 元", min: 100, max: 300 },
                    { label: "股價 50 - 100 元", min: 50, max: 100 },
                    { label: "股價 20 - 50 元", min: 20, max: 50 },
                    { label: "股價 0 - 20 元", min: 0, max: 20 }
                ];

                return ranges.map(r => {
                    const inRange = filtered.filter(s => s.price >= r.min && s.price < r.max);
                    return {
                        range: r.label,
                        count: inRange.length,
                        open: (inRange.length > 0 && r.min >= 100), // 預設展開高價股
                        yieldGroups: [
                            { label: "合計殖利率 10% 以上", color: "bg-rose-500", open: true, items: inRange.filter(s => s.totalYield >= 10).sort((a,b)=>b.totalYield-a.totalYield) },
                            { label: "合計殖利率 5 - 10%", color: "bg-orange-400", open: true, items: inRange.filter(s => s.totalYield >= 5 && s.totalYield < 10).sort((a,b)=>b.totalYield-a.totalYield) },
                            { label: "合計殖利率 0 - 5%", color: "bg-slate-300", open: false, items: inRange.filter(s => s.totalYield < 5).sort((a,b)=>b.totalYield-a.totalYield) }
                        ]
                    };
                });
            }
        },
        methods: {
            async fetchData() {
                const res = await fetch('./data.json?v=' + Date.now());
                this.stocks = await res.json();
            }
        },
        mounted() { this.fetchData(); }
    }).mount('#app');
</script>
</body>
</html>
