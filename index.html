<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股價值選股雷達 - 最終修復版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .anim-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

<div id="app" class="container mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">
                <i class="fa-solid fa-chart-line text-blue-600 mr-2"></i>台股價值選股雷達
            </h1>
            <p class="text-slate-500 mt-2">即時數據源：Google Apps Script (已排除緩存限制)</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <span v-if="loading" class="text-orange-500 font-medium anim-pulse">
                <i class="fa-solid fa-spinner fa-spin"></i> 正在連線數據源...
            </span>
            <span v-else class="text-green-600 font-medium">
                <i class="fa-solid fa-check-circle"></i> 資料載入完成 ({{ stocks.length }} 筆)
            </span>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="relative">
            <i class="fa-solid fa-search absolute left-3 top-3 text-slate-400"></i>
            <input v-model="searchQuery" type="text" placeholder="搜尋代碼或名稱..." 
                class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <select v-model="filterPbr" class="bg-white px-4 py-2 rounded-lg border border-slate-200">
            <option value="all">本淨比 - 全部</option>
            <option value="low">低本淨比 (< 1.2)</option>
        </select>
        <select v-model="filterYield" class="bg-white px-4 py-2 rounded-lg border border-slate-200">
            <option value="all">殖利率 - 全部</option>
            <option value="high">高殖利率 (> 5%)</option>
        </select>
    </div>

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <table class="w-full text-left">
            <thead class="bg-slate-800 text-white">
                <tr>
                    <th class="px-6 py-4">代碼</th>
                    <th class="px-6 py-4">名稱</th>
                    <th class="px-6 py-4">收盤價</th>
                    <th class="px-6 py-4">本淨比</th>
                    <th class="px-6 py-4 text-orange-400">殖利率 (%)</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr v-for="stock in filteredStocks" :key="stock.id" class="hover:bg-blue-50 transition-colors">
                    <td class="px-6 py-4 font-mono font-bold text-slate-600">{{ stock.id }}</td>
                    <td class="px-6 py-4 font-medium text-slate-800">{{ stock.name }}</td>
                    <td class="px-6 py-4 text-slate-700">NT$ {{ stock.price }}</td>
                    <td class="px-6 py-4 text-slate-600">{{ stock.pbr }}</td>
                    <td class="px-6 py-4 font-bold text-orange-600">{{ stock.totalYield }}%</td>
                </tr>
            </tbody>
        </table>
        
        <div v-if="loading" class="p-20 text-center">
            <i class="fa-solid fa-circle-notch fa-spin text-blue-500 text-4xl"></i>
            <p class="mt-4 text-slate-500">正在處理全台股大數據，請稍候...</p>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                stocks: [],
                loading: true,
                searchQuery: '',
                filterPbr: 'all',
                filterYield: 'all',
                // --- 請在此處替換你的最新 /exec 網址 ---
                gasUrl: 'https://script.google.com/macros/s/AKfycbzh1fjSPdMr-MRqz1T6kR3rFWPleCmCNkiwTxZmtfggq6kHThuIAMcstcj2ONx9M5Fo7w/exec'
            }
        },
        computed: {
            filteredStocks() {
                return this.stocks.filter(s => {
                    const matchSearch = s.id.includes(this.searchQuery) || s.name.includes(this.searchQuery);
                    const matchPbr = this.filterPbr === 'all' || (this.filterPbr === 'low' && s.pbr < 1.2);
                    const matchYield = this.filterYield === 'all' || (this.filterYield === 'high' && s.totalYield > 5);
                    return matchSearch && matchPbr && matchYield;
                });
            }
        },
        methods: {
            async fetchStocks() {
                if (this.gasUrl.includes('你的')) return;
                
                try {
                    // 強制加入隨機參數避免緩存，並強制跟隨跳轉
                    const cacheBuster = `?t=${new Date().getTime()}`;
                    const response = await fetch(this.gasUrl + cacheBuster, {
                        method: 'GET',
                        redirect: 'follow' 
                    });
                    
                    if (!response.ok) throw new Error('伺服器回應錯誤');
                    
                    const data = await response.json();
                    
                    // 檢查數據是否為正確的數組格式
                    if (Array.isArray(data)) {
                        this.stocks = data;
                    } else {
                        throw new Error('數據格式非 JSON 陣列，可能是抓到了 HTML 登入頁面');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('抓取失敗：' + error.message + '\n\n請確認 GAS 已「新增部署」並設為「所有人」。');
                } finally {
                    this.loading = false;
                }
            }
        },
        mounted() {
            this.fetchStocks();
        }
    }).mount('#app');
</script>
</body>
</html>
