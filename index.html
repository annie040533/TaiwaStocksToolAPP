<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股價值選股雷達</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        .collapse-content { transition: max-height 0.3s ease-out; overflow: hidden; }
        .card-shadow { box-shadow: 0 2px 15px -3px rgba(0,0,0,0.07); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

<div id="app" v-cloak class="max-w-6xl mx-auto">
    <div class="bg-[#2d336b] text-white p-6 rounded-t-3xl card-shadow">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black italic tracking-tighter"><i class="fa-solid fa-bolt text-yellow-400 mr-2"></i>台股雷達</h1>
            <button @click="fetchData" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl text-sm font-bold transition">
                <i class="fa-solid fa-rotate mr-1"></i> 重載數據
            </button>
        </div>
        
        <div class="flex flex-col md:flex-row gap-4">
            <div class="relative flex-1">
                <i class="fa-solid fa-search absolute left-4 top-3.5 text-white/50"></i>
                <input v-model="search" type="text" placeholder="搜尋股票代碼或名稱..." 
                       class="w-full bg-white/10 border border-white/20 rounded-xl py-2.5 pl-11 pr-4 focus:outline-none focus:ring-2 ring-yellow-400">
            </div>
            <select v-model="selectedCat" class="bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 font-bold focus:outline-none">
                <option value="" class="text-black">所有產業類別</option>
                <option v-for="c in categories" :value="c" class="text-black">{{ c }}</option>
            </select>
        </div>
    </div>

    <div v-for="(pg, pIdx) in nestedData" :key="pg.range" class="mt-4">
        <div @click="pg.open = !pg.open" class="bg-white p-4 rounded-xl card-shadow mb-2 cursor-pointer flex justify-between items-center border-l-8 border-indigo-500">
            <span class="text-lg font-black text-slate-700">{{ pg.range }} <span class="text-sm font-normal text-slate-400 ml-2">({{ pg.count }} 檔)</span></span>
            <i class="fa-solid" :class="pg.open ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
        </div>

        <div v-show="pg.open" class="pl-4 space-y-4 mb-6">
            <div v-for="yg in pg.yieldGroups" :key="yg.label" v-show="yg.items.length > 0">
                <div @click="yg.open = !yg.open" class="bg-slate-200/50 p-3 rounded-lg cursor-pointer flex justify-between items-center">
                    <span class="font-bold text-slate-600"><i class="fa-solid fa-layer-group mr-2"></i>{{ yg.label }}</span>
                    <span class="text-xs bg-white px-2 py-1 rounded-full font-bold text-slate-500">{{ yg.items.length }}</span>
                </div>

                <div v-show="yg.open" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4">
                    <div v-for="s in yg.items" :key="s.id" class="bg-white p-5 rounded-[2rem] card-shadow border border-slate-100 relative overflow-hidden">
                        <div class="absolute top-0 left-0 bg-indigo-100 text-indigo-600 px-4 py-1 rounded-br-2xl text-[10px] font-black uppercase">
                            {{ s.category }}
                        </div>
                        
                        <div class="text-right text-2xl font-black text-slate-900 mb-2">
                            ${{ s.price }}
                        </div>

                        <div class="mb-4">
                            <span class="text-slate-400 text-xs font-bold">{{ s.id }}</span>
                            <h3 class="text-xl font-black text-slate-800">{{ s.name }}</h3>
                        </div>

                        <div class="flex gap-2">
                            <div class="flex-1 bg-yellow-50 p-3 rounded-2xl border border-yellow-100">
                                <div class="text-[10px] font-bold text-yellow-600">合計殖利率</div>
                                <div class="text-lg font-black text-yellow-700">{{ s.totalYield }}%</div>
                            </div>
                            <div class="flex-1 bg-blue-50 p-3 rounded-2xl border border-blue-100">
                                <div class="text-[10px] font-bold text-blue-600">淨值比 (PBR)</div>
                                <div class="text-lg font-black text-blue-700">{{ s.pbr }}</div>
                            </div>
                        </div>

                        <a :href="'https://www.wantgoo.com/stock/' + s.id" target="_blank" 
                           class="block mt-4 text-center text-xs font-bold text-slate-400 hover:text-indigo-600 transition">
                            查看詳細技術線圖 <i class="fa-solid fa-arrow-up-right-from-square ml-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() { return { stocks: [], selectedCat: '', search: '', loading: true } },
        computed: {
            categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
            nestedData() {
                const fs = this.stocks.filter(s => 
                    (s.name.includes(this.search) || s.id.includes(this.search)) &&
                    (this.selectedCat === '' || s.category === this.selectedCat)
                );
                
                const priceRanges = [
                    { label: "股價 300+ 元以上", min: 300, max: 99999, open: true },
                    { label: "股價 100 - 300 元", min: 100, max: 300, open: true },
                    { label: "股價 50 - 100 元", min: 50, max: 100, open: false },
                    { label: "股價 20 - 50 元", min: 20, max: 50, open: false },
                    { label: "股價 0 - 20 元", min: 0, max: 20, open: false }
                ];

                return priceRanges.map(r => {
                    const inPrice = fs.filter(s => s.price >= r.min && s.price < r.max);
                    const sortF = (arr) => arr.sort((a,b) => b.totalYield - a.totalYield);
                    
                    return {
                        ...r,
                        count: inPrice.length,
                        yieldGroups: [
                            { label: "合計殖利率 10% 以上", open: true, items: sortF(inPrice.filter(s => s.totalYield >= 10)) },
                            { label: "合計殖利率 5 - 10%", open: true, items: sortF(inPrice.filter(s => s.totalYield >= 5 && s.totalYield < 10)) },
                            { label: "合計殖利率 0 - 5%", open: false, items: sortF(inPrice.filter(s => s.totalYield < 5)) }
                        ]
                    };
                });
            }
        },
        methods: {
            async fetchData() {
                this.loading = true;
                const res = await fetch('./data.json?t=' + new Date().getTime());
                this.stocks = await res.json();
                this.loading = false;
            }
        },
        mounted() { this.fetchData(); }
    }).mount('#app');
</script>
</body>
</html>
