<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股價值全效雷達 - 摺疊搜尋版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        .group-enter-active, .group-leave-active { transition: all 0.3s ease; }
        .group-enter-from, .group-leave-to { opacity: 0; transform: translateY(-10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

<div id="app" v-cloak class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-2xl font-black text-slate-800 flex items-center">
                <i class="fa-solid fa-satellite-dish text-blue-600 mr-3"></i>台股價值雷達
            </h1>
            <div class="text-slate-400 text-sm font-medium bg-slate-100 px-4 py-1 rounded-full">
                有效標的：{{ filteredCount }} / {{ stocks.length }} 檔
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="relative">
                <i class="fa-solid fa-search absolute left-4 top-4 text-slate-400"></i>
                <input v-model="searchQuery" type="text" placeholder="輸入代碼或名稱搜尋..." 
                    class="w-full pl-12 pr-4 py-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500 transition shadow-inner">
            </div>
            
            <div class="relative">
                <i class="fa-solid fa-layer-group absolute left-4 top-4 text-slate-400"></i>
                <select v-model="selectedCategory" 
                    class="w-full pl-12 pr-4 py-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500 appearance-none shadow-inner">
                    <option value="">所有產業類別</option>
                    <option v-for="cat in categories" :key="cat" :value="cat">{{ cat }}</option>
                </select>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <div v-for="group in priceGroups" :key="group.label" class="mb-6">
            <div @click="group.isOpen = !group.isOpen" 
                class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition mb-4 select-none">
                <div class="flex items-center">
                    <div :class="['w-2 h-8 rounded-full mr-4', group.color]"></div>
                    <h2 class="text-xl font-bold text-slate-700">
                        {{ group.label }} 
                        <span class="text-slate-400 text-sm ml-2 font-normal">({{ group.stocks.length }} 檔)</span>
                    </h2>
                </div>
                <i :class="['fa-solid transition-transform duration-300', group.isOpen ? 'fa-chevron-up' : 'fa-chevron-down text-blue-500']"></i>
            </div>

            <div v-show="group.isOpen" class="mb-10">
                <div v-for="level in yieldLevels" :key="level.label" class="mb-8">
                    <div v-if="filterByYield(group.stocks, level.min, level.max).length > 0">
                        <div class="flex items-center mb-4 ml-2">
                            <span class="text-xs font-black text-slate-400 tracking-widest uppercase">{{ level.label }}</span>
                            <div class="flex-grow h-px bg-slate-200 ml-4"></div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div v-for="s in filterByYield(group.stocks, level.min, level.max)" :key="s.id" 
                                class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm hover:shadow-md hover:border-blue-300 transition group">
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <div class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-tighter">{{ s.category }}</div>
                                        <div class="text-lg font-black text-slate-800">{{ s.name }}</div>
                                        <div class="text-xs text-slate-400">{{ s.id }}</div>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-xl font-black text-blue-600">${{ s.price }}</div>
                                        <div class="text-[10px] text-slate-400">PBR: {{ s.pbr }}</div>
                                    </div>
                                </div>

                                <div class="bg-slate-50 rounded-xl p-3 flex justify-between items-center mb-4">
                                    <div class="text-center flex-1">
                                        <div class="text-[9px] text-slate-400">殖利率</div>
                                        <div class="text-sm font-black text-slate-700">{{ s.totalYield }}%</div>
                                    </div>
                                    <div class="w-px h-6 bg-slate-200"></div>
                                    <div class="text-center flex-1">
                                        <div class="text-[9px] text-slate-400">本淨比</div>
                                        <div class="text-sm font-black text-slate-700">{{ s.pbr }}</div>
                                    </div>
                                </div>

                                <a :href="'https://vchart.yuanta.com.tw/vchart/stock/chart.aspx?code='+s.id" target="_blank"
                                    class="block w-full text-center py-2 bg-slate-800 text-white rounded-lg text-xs font-bold hover:bg-blue-600 transition">
                                    <i class="fa-solid fa-chart-line mr-2"></i>技術分析
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;
createApp({
    data() {
        return {
            stocks: [],
            searchQuery: '',
            selectedCategory: '',
            yieldLevels: [
                { label: '🔥 高殖利率 (10%以上)', min: 10, max: 100 },
                { label: '💰 優質殖利率 (5-10%)', min: 5, max: 10 },
                { label: '📊 一般殖利率 (0-5%)', min: 0.1, max: 5 }
            ],
            // 價格分組與摺疊狀態管理
            priceGroups: [
                { label: '💎 高價股 (300元以上)', range: [300, 99999], isOpen: true, stocks: [], color: 'bg-purple-600' },
                { label: '📈 中高價股 (100-300元)', range: [100, 300], isOpen: true, stocks: [], color: 'bg-blue-600' },
                { label: '📊 中價股 (50-100元)', range: [50, 100], isOpen: true, stocks: [], color: 'bg-emerald-500' },
                { label: '🪙 普及股 (20-50元)', range: [20, 50], isOpen: false, stocks: [], color: 'bg-orange-500' },
                { label: '🌱 低價股 (20元以下)', range: [0, 20], isOpen: false, stocks: [], color: 'bg-slate-400' }
            ]
        }
    },
    computed: {
        // 取得所有唯一的產業類別
        categories() {
            const cats = this.stocks.map(s => s.category);
            return [...new Set(cats)].filter(c => c && c !== 'undefined').sort();
        },
        // 過濾後的總數量
        filteredCount() {
            return this.filteredStocks.length;
        },
        // 核心過濾邏輯
        filteredStocks() {
            return this.stocks.filter(s => {
                const matchSearch = s.id.includes(this.searchQuery) || s.name.includes(this.searchQuery);
                const matchCat = this.selectedCategory === '' || s.category === this.selectedCategory;
                // 排除資料不全的個股 (PBR或殖利率為0)
                const isComplete = s.price > 0 && s.pbr > 0 && s.totalYield > 0;
                return matchSearch && matchCat && isComplete;
            });
        }
    },
    watch: {
        // 當過濾結果改變時，重新分配各組的標的
        filteredStocks: {
            immediate: true,
            handler(newVal) {
                this.priceGroups.forEach(group => {
                    group.stocks = newVal.filter(s => s.price >= group.range[0] && s.price < group.range[1]);
                });
            }
        }
    },
    methods: {
        // 依殖利率範圍過濾並排序 (由高到低)
        filterByYield(stocks, min, max) {
            return stocks
                .filter(s => s.totalYield >= min && s.totalYield < max)
                .sort((a, b) => b.totalYield - a.totalYield);
        }
    },
    async mounted() {
        try {
            const res = await fetch('./data.json');
            const data = await res.json();
            
            // 資料清洗與初步標籤分配 (若 data.json 已含 category 則會沿用)
            this.stocks = data.map(s => {
                // 如果代號長度大於4通常是ETF，根據需求可過濾或保留
                let category = s.category || '一般產業';
                if (!s.category) {
                    if (s.id.startsWith('23')) category = '半導體業';
                    else if (s.id.startsWith('28')) category = '金融業';
                    else if (s.id.startsWith('26')) category = '航運業';
                }
                return { ...s, category };
            });
        } catch (e) {
            console.error("無法讀取 data.json，請確認 Workflow 已執行成功。");
        }
    }
}).mount('#app');
</script>

</body>
</html>
