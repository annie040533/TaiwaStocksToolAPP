<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股深度價值雷達</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen pb-20">

<div id="app" v-cloak class="p-4 max-w-7xl mx-auto">
    <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-4">
        <h1 class="text-3xl font-black text-slate-800">台股深度價值雷達</h1>
        <div class="flex gap-4 w-full md:w-auto">
            <input v-model="search" type="text" placeholder="搜尋代碼..." class="px-4 py-2 rounded-lg border focus:ring-2 focus:ring-indigo-500 outline-none flex-grow">
            <select v-model="selectedCat" class="border rounded-lg px-4 py-2 text-sm bg-white">
                <option value="">所有產業</option>
                <option v-for="c in categories" :value="c">{{ c }}</option>
            </select>
        </div>
    </header>

    <div v-for="pg in nestedData" :key="pg.range" class="mb-8">
        <div @click="togglePrice(pg.range)" class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm cursor-pointer border-l-4 border-indigo-600">
            <h2 class="text-xl font-bold">{{ pg.range }} <span class="text-sm text-slate-400 ml-2">{{ pg.totalCount }} 檔</span></h2>
            <i :class="isPriceCollapsed(pg.range) ? 'fa-chevron-down' : 'fa-chevron-up'" class="fa-solid text-slate-300"></i>
        </div>

        <div v-show="!isPriceCollapsed(pg.range)" class="mt-4 space-y-8 pl-4">
            <div v-for="yg in pg.yieldGroups" :key="yg.label" v-show="yg.items.length > 0">
                <div class="flex items-center gap-2 mb-4">
                    <div :class="yg.color" class="w-2 h-2 rounded-full"></div>
                    <h3 class="font-bold text-slate-500">{{ yg.label }}</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div v-for="s in yg.items" :key="s.id" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <span class="text-[9px] text-indigo-500 font-bold">{{ s.category }}</span>
                                <h4 class="text-lg font-black text-slate-800">{{ s.id }} {{ s.name }}</h4>
                            </div>
                            <div class="text-xl font-black text-slate-900">${{ s.price }}</div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-center bg-slate-50 p-2 rounded-xl">
                            <div><p class="text-[8px] text-slate-400">現金</p><p class="font-bold text-sm">{{ s.cashYield }}%</p></div>
                            <div><p class="text-[8px] text-slate-400">股票</p><p class="font-bold text-sm">{{ s.stockYield }}%</p></div>
                            <div class="bg-indigo-600 rounded-lg"><p class="text-[8px] text-white/70">合計</p><p class="font-bold text-sm text-white">{{ s.totalYield }}%</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                stocks: [], search: '', selectedCat: '',
                collapsedPrices: [],
                catMap: { 'Technology': '資訊科技', 'Financial Services': '金融保險', 'Industrials': '航運/工業', 'Consumer Cyclical': '消費性電子' }
            }
        },
        computed: {
            categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
            filtered() {
                return this.stocks.filter(s => (s.id.includes(this.search) || s.name.includes(this.search)) && (this.selectedCat === '' || s.category === this.selectedCat));
            },
            nestedData() {
                const ranges = [
                    { label: "股價 300+ 元", min: 300, max: 99999 },
                    { label: "股價 100 - 300 元", min: 100, max: 300 },
                    { label: "股價 0 - 100 元", min: 0, max: 100 }
                ];
                return ranges.map(r => {
                    const inRange = this.filtered.filter(s => s.price >= r.min && s.price < r.max);
                    const sort = (arr) => arr.sort((a, b) => b.totalYield - a.totalYield);
                    return {
                        range: r.label, totalCount: inRange.length,
                        yieldGroups: [
                            { label: "合計殖利率 10% 以上", color: "bg-red-500", items: sort(inRange.filter(s => s.totalYield >= 10)) },
                            { label: "合計殖利率 5 - 10%", color: "bg-emerald-500", items: sort(inRange.filter(s => s.totalYield >= 5 && s.totalYield < 10)) },
                            { label: "合計殖利率 0 - 5%", color: "bg-slate-300", items: sort(inRange.filter(s => s.totalYield < 5)) }
                        ]
                    };
                });
            }
        },
        methods: {
            async load() {
                const res = await fetch('./data.json?v=' + Date.now());
                const data = await res.json();
                this.stocks = data.map(s => ({
                    ...s,
                    name: s.name.replace('CO.,LTD.', '').replace('CORP', ''), // 再次強化清除英文後綴
                    category: this.catMap[s.category] || s.category || '一般產業'
                }));
            },
            togglePrice(r) { this.collapsedPrices.includes(r) ? this.collapsedPrices = this.collapsedPrices.filter(x => x !== r) : this.collapsedPrices.push(r); },
            isPriceCollapsed(r) { return this.collapsedPrices.includes(r); }
        },
        mounted() { this.load(); }
    }).mount('#app');
</script>
</body>
</html>
