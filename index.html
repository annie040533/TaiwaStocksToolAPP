<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股雷達 - 精簡摺疊版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 p-4">
    <div id="app" class="max-w-7xl mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 flex flex-wrap gap-4">
            <input v-model="search" class="flex-1 min-w-[200px] border-none bg-slate-100 p-3 rounded-xl" placeholder="搜尋代號或名稱...">
            <select v-model="selCat" class="border-none bg-slate-100 p-3 rounded-xl w-full md:w-64">
                <option value="">所有產業</option>
                <option v-for="c in categories" :value="c">{{c}}</option>
            </select>
        </div>

        <div v-for="(group, idx) in groups" :key="group.title" class="mb-4 overflow-hidden border border-slate-200 rounded-2xl bg-white shadow-sm">
            <div @click="group.isOpen = !group.isOpen" class="p-4 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition select-none">
                <div class="flex items-center">
                    <span class="bg-blue-600 text-white w-2 h-6 rounded-full mr-3"></span>
                    <h2 class="text-lg font-bold text-slate-800">{{ group.title }} <span class="text-slate-400 text-sm ml-2">({{ group.items.length }} 檔)</span></h2>
                </div>
                <i :class="['fa-solid transition-transform duration-300', group.isOpen ? 'fa-chevron-up' : 'fa-chevron-down text-blue-500']"></i>
            </div>

            <div v-show="group.isOpen" class="p-4 pt-0 border-t border-slate-50">
                <div v-for="level in ['高殖利率(10%↑)', '中殖利率(5-10%)', '一般(0-5%)']" :key="level" class="mt-4">
                    <div v-if="subFilter(group.items, level).length > 0">
                        <div class="text-xs font-black text-slate-400 mb-3 ml-1 uppercase tracking-widest border-b pb-1 inline-block">{{ level }}</div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-2">
                            <div v-for="s in subFilter(group.items, level)" :key="s.id" class="p-4 bg-slate-50 rounded-xl hover:shadow-md transition group border border-transparent hover:border-blue-200">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="text-[10px] font-bold text-slate-400 bg-white px-2 py-0.5 rounded shadow-sm">{{ s.category }}</span>
                                    <span class="text-blue-700 font-black text-lg">${{ s.price }}</span>
                                </div>
                                <div class="font-bold text-slate-800 text-md truncate">{{ s.name }}</div>
                                <div class="text-[10px] text-slate-400 mb-3">{{ s.id }}</div>
                                
                                <div class="grid grid-cols-2 gap-2 text-center">
                                    <div class="bg-white p-2 rounded-lg border border-slate-100">
                                        <div class="text-[9px] text-slate-400">殖利率</div>
                                        <div class="text-xs font-black text-blue-600">{{ s.totalYield }}%</div>
                                    </div>
                                    <div class="bg-white p-2 rounded-lg border border-slate-100">
                                        <div class="text-[9px] text-slate-400">PBR</div>
                                        <div class="text-xs font-black text-slate-700">{{ s.pbr }}</div>
                                    </div>
                                </div>
                                <a :href="'https://vchart.yuanta.com.tw/vchart/stock/chart.aspx?code='+s.id" target="_blank" class="block mt-3 text-center py-2 bg-slate-800 text-white rounded-lg text-[10px] hover:bg-blue-600 transition">技術分析</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    stocks: [], search: '', selCat: '',
                    groups: [
                        { title: '💎 高價股 (300+)', items: [], isOpen: true, range: [300, 99999] },
                        { title: '📈 中高價 (100-300)', items: [], isOpen: true, range: [100, 300] },
                        { title: '📊 中價股 (50-100)', items: [], isOpen: true, range: [50, 100] },
                        { title: '🪙 普及股 (20-50)', items: [], isOpen: false, range: [20, 50] },
                        { title: '🌱 低價股 (0-20)', items: [], isOpen: false, range: [0, 20] }
                    ]
                }
            },
            computed: {
                categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
                filtered() {
                    return this.stocks.filter(s => {
                        return (s.id.includes(this.search) || s.name.includes(this.search)) && (!this.selCat || s.category === this.selCat);
                    });
                }
            },
            watch: {
                filtered: {
                    immediate: true,
                    handler(newVal) {
                        this.groups.forEach(g => {
                            g.items = newVal.filter(s => s.price >= g.range[0] && s.price < g.range[1]);
                        });
                    }
                }
            },
            methods: {
                subFilter(items, level) {
                    let res = [];
                    if (level.includes('10%')) res = items.filter(i => i.totalYield >= 10);
                    else if (level.includes('5-10%')) res = items.filter(i => i.totalYield >= 5 && i.totalYield < 10);
                    else res = items.filter(i => i.totalYield < 5);
                    return res.sort((a, b) => b.totalYield - a.totalYield);
                }
            },
            async mounted() {
                const r = await fetch('./data.json');
                this.stocks = await r.json();
            }
        }).mount('#app');
    </script>
</body>
</html>
