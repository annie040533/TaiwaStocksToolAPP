<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股價值雷達 - 專業校正版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        .yield-badge { font-weight: 900; }
        .stock-row { border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body class="bg-gray-50 font-sans p-4">

<div id="app" v-cloak class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border-l-8 border-blue-600">
        <div>
            <h1 class="text-3xl font-black text-gray-800">台股深度價值雷達</h1>
            <p class="text-gray-400 font-bold">交叉比對校正版 | 數據同步更新</p>
        </div>
        <div class="mt-4 md:mt-0 flex gap-2">
            <select v-model="selectedCat" class="bg-gray-800 text-white px-4 py-2 rounded-lg font-bold">
                <option value="">所有產業分類</option>
                <option v-for="c in categories" :value="c">{{ c }}</option>
            </select>
        </div>
    </div>

    <div v-for="pg in nestedData" :key="pg.range" class="mb-10">
        <div class="bg-blue-600 text-white px-6 py-2 rounded-t-xl font-black text-xl flex justify-between">
            <span>{{ pg.range }}</span>
            <span class="text-blue-200 text-sm italic">{{ pg.count }} 檔符合</span>
        </div>

        <div class="bg-white rounded-b-xl shadow-md overflow-hidden p-4">
            <div v-for="yg in pg.groups" :key="yg.label" class="mb-6 last:mb-0">
                <div class="flex items-center gap-2 mb-3 border-b border-gray-100 pb-1">
                    <div :class="yg.color" class="w-3 h-3 rounded-full"></div>
                    <span class="font-black text-gray-600 text-sm uppercase tracking-widest">{{ yg.label }}</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div v-for="s in yg.items" :key="s.id" class="p-3 bg-gray-50 rounded-xl flex justify-between items-center border border-gray-100">
                        <div>
                            <div class="text-[10px] text-gray-400 font-bold">{{ s.category }}</div>
                            <div class="font-black text-gray-800">{{ s.id }} {{ s.name }}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs font-bold text-gray-400">${{ s.price }}</div>
                            <div class="text-lg font-black" :class="yg.textColor">{{ s.totalYield }}%</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() { return { stocks: [], selectedCat: '' } },
        computed: {
            categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
            nestedData() {
                const ranges = [
                    { label: "股價 300+ 元以上", min: 300, max: 99999 },
                    { label: "股價 100 - 300 元", min: 100, max: 300 },
                    { label: "股價 50 - 100 元", min: 50, max: 100 },
                    { label: "股價 0 - 50 元", min: 0, max: 50 }
                ];
                return ranges.map(r => {
                    const inRange = this.stocks.filter(s => s.price >= r.min && s.price < r.max && (this.selectedCat==='' || s.category===this.selectedCat));
                    const sortF = (arr) => arr.sort((a,b) => b.totalYield - a.totalYield);
                    return {
                        range: r.label,
                        count: inRange.length,
                        groups: [
                            { label: "10% 以上", color: "bg-red-500", textColor: "text-red-600", items: sortF(inRange.filter(s => s.totalYield >= 10)) },
                            { label: "5 - 10%", color: "bg-green-500", textColor: "text-green-600", items: sortF(inRange.filter(s => s.totalYield >= 5 && s.totalYield < 10)) },
                            { label: "0 - 5%", color: "bg-gray-300", textColor: "text-gray-500", items: sortF(inRange.filter(s => s.totalYield < 5)) }
                        ]
                    };
                });
            }
        },
        async mounted() {
            try {
                const res = await fetch('./data.json?v=' + Date.now());
                this.stocks = await res.json();
            } catch (e) { console.error("資料載入錯誤"); }
        }
    }).mount('#app');
</script>
</body>
</html>
