<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股價值全效雷達</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">

<div id="app" class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto mb-8 bg-white p-6 rounded-3xl shadow-sm border border-gray-200">
        <h1 class="text-3xl font-black mb-6 text-gray-800"><i class="fa-solid fa-chart-line text-blue-600 mr-2"></i>台股價值雷達</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="relative">
                <i class="fa-solid fa-search absolute left-4 top-4 text-gray-400"></i>
                <input v-model="searchQuery" type="text" placeholder="搜尋代號或名稱..." 
                    class="w-full pl-12 pr-4 py-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            
            <div class="relative">
                <i class="fa-solid fa-filter absolute left-4 top-4 text-gray-400"></i>
                <select v-model="selectedCategory" 
                    class="w-full pl-12 pr-4 py-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500 appearance-none">
                    <option value="">所有產業類別</option>
                    <option v-for="cat in categories" :key="cat" :value="cat">{{ cat }}</option>
                </select>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <div v-for="group in priceGroups" :key="group.label" class="mb-12">
            <h2 class="text-2xl font-bold mb-6 flex items-center text-gray-700">
                <span class="bg-blue-600 text-white px-3 py-1 rounded-lg mr-3 text-sm">{{ group.label }}</span>
                數量：{{ group.stocks.length }}
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div v-for="s in group.stocks" :key="s.id" 
                    class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition border border-gray-100">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div class="text-xs font-bold text-blue-500 uppercase tracking-wider">{{ s.id }}</div>
                                <div class="text-xl font-black text-gray-800">{{ s.name }}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black text-gray-900">${{ s.price }}</div>
                                <div class="text-xs text-gray-400">PBR: {{ s.pbr }}</div>
                            </div>
                        </div>

                        <div class="flex gap-2 mb-4">
                            <span class="px-2 py-1 bg-gray-100 text-gray-600 text-[10px] rounded-md font-bold">{{ s.category }}</span>
                        </div>

                        <div class="grid grid-cols-3 gap-2 bg-blue-50 p-3 rounded-xl mb-4">
                            <div class="text-center">
                                <div class="text-[10px] text-gray-400">現金</div>
                                <div class="font-bold text-gray-700 text-sm">{{ s.cashYield }}%</div>
                            </div>
                            <div class="text-center border-x border-blue-100">
                                <div class="text-[10px] text-gray-400">股票</div>
                                <div class="font-bold text-gray-700 text-sm">{{ s.stockYield }}%</div>
                            </div>
                            <div class="text-center">
                                <div class="text-[10px] text-gray-400">合計</div>
                                <div class="font-black text-blue-600 text-md">{{ s.totalYield }}%</div>
                            </div>
                        </div>

                        <a :href="'https://www.wantgoo.com/stock/'+s.id+'/technical-chart'" target="_blank"
                            class="block w-full text-center py-2 bg-gray-800 text-white rounded-lg text-sm font-bold hover:bg-blue-600 transition">
                            <i class="fa-solid fa-chart-area mr-2"></i>即時技術線圖
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;
createApp({
    data() {
        return {
            stocks: [],
            searchQuery: '',
            selectedCategory: '',
            categories: ['半導體業', '電腦及週邊設備業', '電子零組件業', '金融保險業', '航運業', '鋼鐵工業', '其他電子業']
        }
    },
    computed: {
        filteredStocks() {
            return this.stocks.filter(s => {
                const matchSearch = s.id.includes(this.searchQuery) || s.name.includes(this.searchQuery);
                const matchCat = this.selectedCategory === '' || s.category === this.selectedCategory;
                return matchSearch && matchCat;
            });
        },
        priceGroups() {
            const fs = this.filteredStocks;
            const sortYield = (arr) => {
                // 先分 10%+, 5-10%, 0-5% 三組，組內由大到小排
                return arr.sort((a, b) => b.totalYield - a.totalYield);
            };

            return [
                { label: '300元以上', stocks: sortYield(fs.filter(s => s.price >= 300)) },
                { label: '100-300元', stocks: sortYield(fs.filter(s => s.price >= 100 && s.price < 300)) },
                { label: '50-100元', stocks: sortYield(fs.filter(s => s.price >= 50 && s.price < 100)) },
                { label: '20-50元', stocks: sortYield(fs.filter(s => s.price >= 20 && s.price < 50)) },
                { label: '20元以下', stocks: sortYield(fs.filter(s => s.price < 20)) }
            ];
        }
    },
    async mounted() {
        const res = await fetch('./data.json');
        const data = await res.json();
        // 模擬注入更精確的產業類別 (實務上可從 TWSE 的其他 API 獲得)
        this.stocks = data.map(s => {
            if (s.id.startsWith('23')) s.category = '半導體業';
            else if (s.id.startsWith('28')) s.category = '金融保險業';
            else if (s.id.startsWith('26')) s.category = '航運業';
            else s.category = '其他電子業';
            return s;
        });
    }
}).mount('#app');
</script>
</body>
</html>
