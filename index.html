<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股全能搜尋雷達</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50">
    <div id="app" class="p-4 max-w-7xl mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-slate-200">
            <div class="flex flex-wrap gap-4 items-center">
                <div class="flex-1 min-w-[250px] relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                    <input v-model="search" type="text" placeholder="輸入代碼或名稱..." 
                        class="w-full pl-12 pr-4 py-3 bg-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 border-none">
                </div>
                <div class="w-full md:w-64 relative">
                    <select v-model="selCat" class="w-full px-4 py-3 bg-slate-100 rounded-xl appearance-none border-none focus:ring-2 focus:ring-blue-500">
                        <option value="">所有產業類別</option>
                        <option v-for="c in categories" :value="c">{{c}}</option>
                    </select>
                </div>
            </div>
        </div>

        <div v-for="group in groups" :key="group.title" v-show="group.items.length > 0" class="mb-10">
            <div class="flex items-center mb-6">
                <div class="h-8 w-1.5 bg-blue-600 rounded-full mr-3"></div>
                <h2 class="text-xl font-black text-slate-800">{{ group.title }} <span class="text-slate-400 text-sm ml-2">({{ group.items.length }} 檔)</span></h2>
            </div>

            <div v-for="sub in ['10%以上', '5-10%', '0-5%']" :key="sub" class="mb-6">
                <div v-if="subFilter(group.items, sub).length > 0">
                    <h3 class="text-sm font-bold text-slate-500 mb-3 ml-1"># 殖利率 {{ sub }}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div v-for="s in subFilter(group.items, sub)" :key="s.id" class="bg-white p-4 rounded-xl border border-slate-200 hover:border-blue-400 transition shadow-sm">
                            <div class="flex justify-between items-start">
                                <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded font-bold text-slate-500">{{ s.category }}</span>
                                <span class="text-blue-600 font-black text-lg">${{ s.price }}</span>
                            </div>
                            <div class="mt-1 font-bold text-slate-800">{{ s.name }} <span class="text-slate-400 font-normal text-xs">{{ s.id }}</span></div>
                            
                            <div class="grid grid-cols-2 gap-2 mt-3 text-center">
                                <div class="bg-blue-50 rounded-lg py-2">
                                    <div class="text-[9px] text-blue-400 uppercase">殖利率</div>
                                    <div class="text-sm font-black text-blue-700">{{ s.totalYield }}%</div>
                                </div>
                                <div class="bg-slate-50 rounded-lg py-2">
                                    <div class="text-[9px] text-slate-400 uppercase">PBR</div>
                                    <div class="text-sm font-bold text-slate-700">{{ s.pbr }}</div>
                                </div>
                            </div>
                            
                            <a :href="'https://vchart.yuanta.com.tw/vchart/stock/chart.aspx?code=' + s.id" target="_blank" 
                                class="block mt-3 text-center py-2 text-xs bg-slate-800 text-white rounded-lg hover:bg-blue-600 transition">
                                <i class="fa-solid fa-chart-line mr-1"></i> 技術線型
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    stocks: [],
                    search: '',
                    selCat: ''
                }
            },
            computed: {
                categories() {
                    return [...new Set(this.stocks.map(s => s.category))].sort();
                },
                filtered() {
                    return this.stocks.filter(s => {
                        const mSearch = s.id.includes(this.search) || s.name.includes(this.search);
                        const mCat = !this.selCat || s.category === this.selCat;
                        return mSearch && mCat;
                    });
                },
                groups() {
                    const f = this.filtered;
                    return [
                        { title: '💎 高價股 (300+)', items: f.filter(s => s.price >= 300) },
                        { title: '📈 中高價 (100-300)', items: f.filter(s => s.price >= 100 && s.price < 300) },
                        { title: '📊 中價股 (50-100)', items: f.filter(s => s.price >= 50 && s.price < 100) },
                        { title: '🪙 普及股 (20-50)', items: f.filter(s => s.price >= 20 && s.price < 50) },
                        { title: '🌱 低價股 (0-20)', items: f.filter(s => s.price < 20) }
                    ];
                }
            },
            methods: {
                subFilter(items, level) {
                    let res = [];
                    if (level === '10%以上') res = items.filter(i => i.totalYield >= 10);
                    else if (level === '5-10%') res = items.filter(i => i.totalYield >= 5 && i.totalYield < 10);
                    else res = items.filter(i => i.totalYield < 5);
                    return res.sort((a, b) => b.totalYield - a.totalYield);
                }
            },
            async mounted() {
                const r = await fetch('./data.json');
                this.stocks = await r.json();
            }
        }).mount('#app');
    </script>
</body>
</html>
