<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockRadar Pro | 股票資料統整</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .stock-card:active { transform: scale(0.98); }
        .gradient-bg { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

<div id="app" v-cloak>
    <header class="gradient-bg text-white p-6 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight"><i class="fa-solid fa-chart-line mr-2 text-cyan-400"></i>StockRadar Pro</h1>
            <div class="text-xs text-gray-400">數據更新：{{ new Date().toLocaleDateString() }}</div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4">
        <div class="bg-white rounded-2xl shadow-sm border p-4 mb-6 -mt-10 relative z-10 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
                <input v-model="search" type="text" placeholder="搜尋代號或名稱..." class="w-full pl-10 pr-4 py-2 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-cyan-500 transition">
            </div>
            <select v-model="selectedIndustry" class="bg-gray-100 px-4 py-2 rounded-xl outline-none focus:ring-2 focus:ring-cyan-500">
                <option value="">所有產業類別</option>
                <option v-for="ind in industries" :key="ind" :value="ind">{{ ind }}</option>
            </select>
        </div>

        <div v-if="loading" class="flex flex-col items-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-cyan-500 border-t-transparent"></div>
            <p class="mt-4 text-gray-500 font-medium">從 Goodinfo 獲取最新資料中...</p>
        </div>

        <div v-else class="space-y-4">
            <div v-for="stock in filteredStocks" :key="stock.id" class="bg-white rounded-2xl border p-4 shadow-sm hover:shadow-md transition stock-card">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <span class="text-xs font-bold text-cyan-600 bg-cyan-50 px-2 py-1 rounded">{{ stock.industry }}</span>
                        <div class="text-lg font-bold mt-1 text-slate-800">{{ stock.name }} <span class="text-gray-400 font-mono text-sm ml-1">{{ stock.id }}</span></div>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-black text-slate-900">${{ stock.price }}</div>
                        <div class="text-xs font-medium text-gray-500">PBR: {{ stock.pbr }}</div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 py-3 border-y border-dashed border-gray-100 mb-3">
                    <div class="text-center">
                        <div class="text-xs text-gray-400">現金</div>
                        <div class="font-bold text-emerald-600">{{ stock.cashYield }}%</div>
                    </div>
                    <div class="text-center border-x">
                        <div class="text-xs text-gray-400">股票</div>
                        <div class="font-bold text-blue-600">{{ stock.stockYield }}%</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xs text-gray-400">合計</div>
                        <div class="font-bold text-rose-600">{{ stock.totalYield }}%</div>
                    </div>
                </div>

                <div class="flex justify-between items-center">
                    <div class="text-xs text-gray-400">市場：{{ stock.market }}</div>
                    <a :href="'https://www.wantgoo.com/stock/' + stock.id + '/technical-chart'" target="_blank" class="text-xs font-bold text-cyan-600 hover:text-cyan-700">
                        查看技術線圖 <i class="fa-solid fa-arrow-up-right-from-square ml-1"></i>
                    </a>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxIF3zAyrMjiP1yRSzY07Hahxd64vmI2enBcL7fjvA7epaNIY0kg8NHOW94B-DLCqND/exec';

    const { createApp } = Vue;
    createApp({
        data() {
            return {
                loading: true,
                search: '',
                selectedIndustry: '',
                stocks: []
            }
        },
        computed: {
            industries() {
                return [...new Set(this.stocks.map(s => s.industry))].sort();
            },
            filteredStocks() {
                let filtered = this.stocks.filter(s => {
                    const matchSearch = s.id.includes(this.search) || s.name.includes(this.search);
                    const matchInd = this.selectedIndustry === '' || s.industry === this.selectedIndustry;
                    return matchSearch && matchInd;
                });

                // 排序邏輯：1. 成交價區間 -> 2. 殖利率區間
                return filtered.sort((a, b) => {
                    const getPriceRange = (p) => {
                        if (p < 20) return 0; if (p < 50) return 1; if (p < 100) return 2; if (p < 300) return 3; return 4;
                    };
                    const getYieldRange = (y) => {
                        if (y < 5) return 0; if (y < 10) return 1; return 2;
                    };

                    const rangeA = getPriceRange(a.price);
                    const rangeB = getPriceRange(b.price);
                    if (rangeA !== rangeB) return rangeA - rangeB;

                    const yieldA = getYieldRange(a.totalYield);
                    const yieldB = getYieldRange(b.totalYield);
                    return yieldB - yieldA; // 殖利率由高到低
                });
            }
        },
        mounted() {
            fetch(GAS_URL)
                .then(res => res.json())
                .then(data => {
                    this.stocks = data;
                    this.loading = false;
                });
        }
    }).mount('#app');
</script>
</body>
</html>
