<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股深度價值雷達 - 嚴格中文化版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

<div id="app" v-cloak class="p-6 max-w-7xl mx-auto">
    <header class="mb-10 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-3xl shadow-md">
        <h1 class="text-3xl font-black text-gray-800">台股深度價值雷達</h1>
        <div class="flex gap-4">
            <input v-model="search" type="text" placeholder="搜尋代碼..." class="px-4 py-2 border rounded-xl font-bold">
            <select v-model="selectedCat" class="bg-indigo-600 text-white rounded-xl px-4 py-2 font-bold">
                <option value="">所有產業</option>
                <option v-for="c in categories" :value="c">{{ c }}</option>
            </select>
        </div>
    </header>

    <div v-for="pg in nestedData" :key="pg.range" class="mb-12">
        <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-indigo-600 mb-6">
            <h2 class="text-2xl font-black text-gray-700">{{ pg.range }} ({{ pg.totalCount }} 檔)</h2>
        </div>

        <div class="space-y-12 pl-4">
            <div v-for="yg in pg.yieldGroups" :key="yg.label" v-show="yg.items.length > 0">
                <div class="flex items-center gap-3 mb-6">
                    <div :class="yg.color" class="w-4 h-4 rounded-full"></div>
                    <h3 class="font-black text-gray-500 uppercase">{{ yg.label }}</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div v-for="s in yg.items" :key="s.id" class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] bg-gray-100 text-gray-500 px-3 py-1 rounded-full font-bold">{{ s.category }}</span>
                                <h4 class="text-lg font-black text-gray-800 mt-2">{{ s.id }} {{ s.name }}</h4>
                            </div>
                            <div class="text-xl font-black text-gray-900">${{ s.price }}</div>
                        </div>
                        <div class="bg-indigo-50 p-4 rounded-2xl flex justify-between items-center">
                            <span class="text-xs font-bold text-indigo-400">合計殖利率</span>
                            <span class="text-xl font-black text-indigo-600">{{ s.totalYield }}%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return { stocks: [], search: '', selectedCat: '' }
        },
        computed: {
            categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
            filtered() {
                return this.stocks.filter(s => (s.id.includes(this.search) || s.name.includes(this.search)) && (this.selectedCat === '' || s.category === this.selectedCat));
            },
            nestedData() {
                const ranges = [
                    { label: "股價 300+ 元", min: 300, max: 99999 },
                    { label: "股價 100 - 300 元", min: 100, max: 300 },
                    { label: "股價 50 - 100 元", min: 50, max: 100 },
                    { label: "股價 0 - 50 元", min: 0, max: 50 }
                ];
                return ranges.map(r => {
                    const inRange = this.filtered.filter(s => s.price >= r.min && s.price < r.max);
                    return {
                        range: r.label, totalCount: inRange.length,
                        yieldGroups: [
                            { label: "殖利率 10% 以上", color: "bg-red-500", items: inRange.filter(s => s.totalYield >= 10).sort((a,b)=>b.totalYield-a.totalYield) },
                            { label: "殖利率 5 - 10%", color: "bg-green-500", items: inRange.filter(s => s.totalYield >= 5 && s.totalYield < 10).sort((a,b)=>b.totalYield-a.totalYield) },
                            { label: "殖利率 0 - 5%", color: "bg-gray-300", items: inRange.filter(s => s.totalYield < 5).sort((a,b)=>b.totalYield-a.totalYield) }
                        ]
                    };
                });
            }
        },
        methods: {
            async load() {
                const res = await fetch('./data.json?v=' + Date.now());
                this.stocks = await res.json();
            }
        },
        mounted() { this.load(); }
    }).mount('#app');
</script>
</body>
</html>
