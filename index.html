<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>台股價值雷達 (GitHub版)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-12">
    <div id="app" v-cloak>
        <header class="bg-indigo-900 text-white p-4 sticky top-0 z-50 shadow-md">
            <div class="max-w-md mx-auto flex justify-between items-center">
                <h1 class="text-lg font-bold">台股雷達</h1>
                <div class="text-[10px] opacity-70">自動更新中</div>
            </div>
            <div class="max-w-md mx-auto mt-3">
                <input v-model="search" type="text" placeholder="搜尋代號或名稱..." 
                    class="w-full px-4 py-2 rounded-xl text-black shadow-inner outline-none">
            </div>
        </header>

        <main class="max-w-md mx-auto p-3">
            <div v-if="loading" class="text-center py-20 text-gray-400">
                <i class="fas fa-circle-notch fa-spin fa-2xl"></i>
                <p class="mt-4">讀取 data.json 中...</p>
            </div>

            <div v-else class="space-y-4">
                <div v-for="group in sortedGroups" :key="group.label" v-show="group.items.length">
                    <h2 class="text-xs font-black text-indigo-400 mb-2 mt-4 px-1">{{ group.label }}</h2>
                    <div class="space-y-2">
                        <div v-for="s in group.items" :key="s.id" 
                            class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                            <div class="flex-1">
                                <div class="font-bold text-gray-800">{{ s.name }}</div>
                                <div class="text-[10px] text-gray-400">
                                    <span class="mr-2">#{{ s.id }}</span>
                                    <span>PBR: {{ s.pbr }}</span>
                                </div>
                            </div>
                            <div class="text-right flex items-center gap-4">
                                <div>
                                    <div class="font-black text-indigo-600">${{ s.price }}</div>
                                    <div class="text-xs font-bold text-rose-500">{{ s.totalYield }}%</div>
                                </div>
                                <a :href="'https://www.wantgoo.com/stock/'+s.id+'/technical-chart'" target="_blank" class="text-gray-200 hover:text-indigo-300">
                                    <i class="fas fa-chevron-right fa-lg"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() { return { stocks: [], loading: true, search: '' } },
            computed: {
                sortedGroups() {
                    const filtered = this.stocks.filter(s => s.name.includes(this.search) || s.id.includes(this.search));
                    const groups = [
                        { label: "0-20 元區間", min: 0, max: 20 },
                        { label: "20-50 元區間", min: 20, max: 50 },
                        { label: "50-100 元區間", min: 50, max: 100 },
                        { label: "100-300 元區間", min: 100, max: 300 },
                        { label: "300+ 元區間", min: 300, max: 99999 }
                    ];
                    return groups.map(g => ({
                        label: g.label,
                        items: filtered.filter(s => s.price >= g.min && s.price < g.max).sort((a,b) => b.totalYield - a.totalYield)
                    }));
                }
            },
            async mounted() {
                try {
                    // 直接讀取同目錄下的 data.json
                    const res = await fetch('./data.json?v=' + Date.now());
                    this.stocks = await res.json();
                } catch (e) { console.error('Data not found'); }
                this.loading = false;
            }
        }).mount('#app');
    </script>
</body>
</html>
