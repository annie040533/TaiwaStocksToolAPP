<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股價值雷達 - 繁體中文版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50 p-6">

<div id="app" v-cloak class="max-w-7xl mx-auto">
    <header class="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm mb-10 border-t-8 border-indigo-600">
        <h1 class="text-3xl font-black text-slate-800">台股深度價值雷達</h1>
        <select v-model="selectedCat" class="bg-indigo-600 text-white rounded-xl px-6 py-2 font-bold outline-none">
            <option value="">所有產業</option>
            <option v-for="c in categories" :value="c">{{ c }}</option>
        </select>
    </header>

    <div v-for="pg in nestedData" :key="pg.range" class="mb-12">
        <h2 class="text-2xl font-black text-slate-700 mb-6 bg-white inline-block px-6 py-2 rounded-full shadow-sm">{{ pg.range }}</h2>
        
        <div class="space-y-10 pl-4 border-l-4 border-slate-200">
            <div v-for="yg in pg.yieldGroups" :key="yg.label" v-show="yg.items.length > 0">
                <div class="flex items-center gap-2 mb-4">
                    <div :class="yg.color" class="w-3 h-3 rounded-full"></div>
                    <h3 class="font-bold text-slate-500">{{ yg.label }}</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div v-for="s in yg.items" :key="s.id" class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-lg font-bold">{{ s.category }}</span>
                                <h4 class="text-lg font-black text-slate-800 mt-2">{{ s.id }} {{ s.name }}</h4>
                            </div>
                            <div class="text-xl font-black text-slate-900">${{ s.price }}</div>
                        </div>
                        <div class="bg-indigo-50 p-4 rounded-2xl flex justify-between items-center">
                            <span class="text-xs font-bold text-indigo-400">合計殖利率</span>
                            <span class="text-xl font-black text-indigo-600">{{ s.totalYield }}%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() { return { stocks: [], selectedCat: '' } },
        computed: {
            categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
            nestedData() {
                const ranges = [
                    { label: "股價 300+ 元以上", min: 300, max: 99999 },
                    { label: "股價 100 - 300 元", min: 100, max: 300 },
                    { label: "股價 50 - 100 元", min: 50, max: 100 },
                    { label: "股價 0 - 50 元", min: 0, max: 50 }
                ];
                return ranges.map(r => {
                    const inRange = this.stocks.filter(s => s.price >= r.min && s.price < r.max && (this.selectedCat==='' || s.category===this.selectedCat));
                    const sortFunc = (arr) => arr.sort((a,b) => b.totalYield - a.totalYield);
                    return {
                        range: r.label,
                        yieldGroups: [
                            { label: "合計殖利率 10% 以上", color: "bg-red-500", items: sortFunc(inRange.filter(s => s.totalYield >= 10)) },
                            { label: "合計殖利率 5 - 10%", color: "bg-emerald-500", items: sortFunc(inRange.filter(s => s.totalYield >= 5 && s.totalYield < 10)) },
                            { label: "合計殖利率 0 - 5%", color: "bg-slate-300", items: sortFunc(inRange.filter(s => s.totalYield < 5)) }
                        ]
                    };
                });
            }
        },
        async mounted() {
            const res = await fetch('./data.json?v=' + Date.now());
            this.stocks = await res.json();
        }
    }).mount('#app');
</script>
</body>
</html>
