<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雷達 - 自動搜尋版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div id="app" class="container mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-blue-800">台股全自動選股雷達</h1>
        <div v-if="loading" class="text-orange-500 font-bold animate-bounce">
            🔍 正在自動尋找可用資料源...
        </div>
    </div>

    <div class="bg-white rounded-lg shadow p-4 mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
        <input v-model="search" placeholder="搜尋股票代碼/名稱..." class="border p-2 rounded">
        <div class="text-sm text-gray-500 self-center">目前載入：{{ stocks.length }} 檔股票</div>
    </div>

    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
        <table class="w-full text-left text-sm">
            <thead class="bg-blue-900 text-white">
                <tr>
                    <th class="p-4">代碼</th>
                    <th class="p-4">名稱</th>
                    <th class="p-4">股價</th>
                    <th class="p-4">本淨比</th>
                    <th class="p-4">殖利率</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="s in filtered" :key="s.id" class="border-b hover:bg-gray-50">
                    <td class="p-4 font-bold">{{ s.id }}</td>
                    <td class="p-4">{{ s.name }}</td>
                    <td class="p-4 text-blue-600">NT$ {{ s.price }}</td>
                    <td class="p-4" :class="s.pbr < 1.2 ? 'text-green-600 font-bold' : ''">{{ s.pbr }}</td>
                    <td class="p-4 text-red-600 font-bold">{{ s.totalYield }}%</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                stocks: [],
                loading: true,
                search: '',
                // 替換成你最新的 /exec 網址
                gasUrl: 'https://script.google.com/macros/s/AKfycbxf4R8WQPsZo8Ga2u3QfM8G9OtRq0NR_vfqgQ9J7WBaMGnTsscQvsDDHeZI_XHpMnzK/exec'
            }
        },
        computed: {
            filtered() {
                return this.stocks.filter(s => 
                    s.id.includes(this.search) || s.name.includes(this.search)
                );
            }
        },
        async mounted() {
            try {
                const res = await fetch(this.gasUrl, { redirect: 'follow' });
                const data = await res.json();
                // 過濾掉帶有「錯誤」字眼的保底資料，只顯示正常股票
                this.stocks = data.filter(item => item.id !== "錯誤");
            } catch (e) {
                alert("目前所有數據源均在維護，請稍後再試");
            } finally {
                this.loading = false;
            }
        }
    }).mount('#app');
</script>
</body>
</html>
