<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股深度價值雷達</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

<div id="app" v-cloak class="p-4 max-w-7xl mx-auto">
    <header class="mb-8 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-3xl shadow-sm">
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter">台股深度價值雷達</h1>
        <div class="flex gap-3 w-full md:w-auto mt-4 md:mt-0">
            <input v-model="search" type="text" placeholder="搜尋代碼/名稱..." class="px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 flex-grow">
            <select v-model="selectedCat" class="border rounded-xl px-4 py-2 bg-slate-50 font-bold text-slate-600">
                <option value="">所有產業</option>
                <option v-for="c in categories" :value="c">{{ c }}</option>
            </select>
        </div>
    </header>

    <div v-for="pg in nestedData" :key="pg.range" class="mb-10">
        <div @click="togglePrice(pg.range)" class="flex justify-between items-center bg-indigo-600 text-white p-4 rounded-2xl shadow-lg cursor-pointer mb-4">
            <h2 class="text-xl font-black">{{ pg.range }} <span class="ml-2 opacity-70 text-sm">{{ pg.totalCount }} 檔</span></h2>
            <i :class="isPriceCollapsed(pg.range) ? 'fa-chevron-down' : 'fa-chevron-up'" class="fa-solid"></i>
        </div>

        <div v-show="!isPriceCollapsed(pg.range)" class="space-y-10 pl-2 border-l-4 border-slate-200 ml-2">
            <div v-for="yg in pg.yieldGroups" :key="yg.label" v-show="yg.items.length > 0">
                <div class="flex items-center gap-2 mb-4">
                    <div :class="yg.color" class="w-3 h-3 rounded-full"></div>
                    <h3 class="font-black text-slate-500 tracking-widest uppercase text-sm">{{ yg.label }}</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div v-for="s in yg.items" :key="s.id" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-xl transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-lg font-black">{{ s.category }}</span>
                                <h4 class="text-xl font-black text-slate-800 mt-1">{{ s.id }} {{ s.name }}</h4>
                            </div>
                            <div class="text-2xl font-black text-slate-900">${{ s.price }}</div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <div><p class="text-[10px] text-slate-400 font-bold">現金</p><p class="font-black text-slate-700">{{ s.cashYield }}%</p></div>
                            <div><p class="text-[10px] text-slate-400 font-bold">股票</p><p class="font-black text-slate-700">{{ s.stockYield }}%</p></div>
                            <div class="bg-blue-600 rounded-xl shadow-md p-1"><p class="text-[10px] text-white/70 font-bold">合計</p><p class="font-black text-white">{{ s.totalYield }}%</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                stocks: [], search: '', selectedCat: '', collapsedPrices: [],
                // 產業中文化映射表
                catMap: {
                    'Technology': '資訊科技', 'Financial Services': '金融保險', 'Industrials': '航運/工業',
                    'Consumer Cyclical': '消費性電子', 'Communication Services': '通訊網路', 'Consumer Defensive': '民生必需'
                }
            }
        },
        computed: {
            categories() { return [...new Set(this.stocks.map(s => s.category))].sort(); },
            filtered() {
                return this.stocks.filter(s => (s.id.includes(this.search) || s.name.includes(this.search)) && (this.selectedCat === '' || s.category === this.selectedCat));
            },
            nestedData() {
                const ranges = [
                    { label: "股價 300+ 元", min: 300, max: 99999 },
                    { label: "股價 100 - 300 元", min: 100, max: 300 },
                    { label: "股價 0 - 100 元", min: 0, max: 100 }
                ];
                return ranges.map(r => {
                    const inRange = this.filtered.filter(s => s.price >= r.min && s.price < r.max);
                    const sort = (arr) => arr.sort((a, b) => b.totalYield - a.totalYield);
                    return {
                        range: r.label, totalCount: inRange.length,
                        yieldGroups: [
                            { label: "合計殖利率 10% 以上", color: "bg-red-500", items: sort(inRange.filter(s => s.totalYield >= 10)) },
                            { label: "合計殖利率 5 - 10%", color: "bg-emerald-500", items: sort(inRange.filter(s => s.totalYield >= 5 && s.totalYield < 10)) },
                            { label: "合計殖利率 0 - 5%", color: "bg-slate-300", items: sort(inRange.filter(s => s.totalYield < 5)) }
                        ]
                    };
                });
            }
        },
        methods: {
            async load() {
                const res = await fetch('./data.json?v=' + Date.now());
                const data = await res.json();
                this.stocks = data.map(s => ({
                    ...s,
                    category: this.catMap[s.category] || s.category || '一般產業'
                }));
            },
            togglePrice(r) { this.collapsedPrices.includes(r) ? this.collapsedPrices = this.collapsedPrices.filter(x => x !== r) : this.collapsedPrices.push(r); },
            isPriceCollapsed(r) { return this.collapsedPrices.includes(r); }
        },
        mounted() { this.load(); }
    }).mount('#app');
</script>
</body>
</html>
