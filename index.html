<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股價值雷達 - 深度分類版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

<div id="app" v-cloak class="p-4 max-w-7xl mx-auto">
    <header class="mb-10 text-center">
        <h1 class="text-4xl font-black text-slate-800 tracking-tight">台股深度價值雷達</h1>
        <div class="mt-4 max-w-xl mx-auto">
            <input v-model="search" type="text" placeholder="搜尋代碼或名稱..." class="w-full px-6 py-3 rounded-full shadow-sm border-none focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
    </header>

    <div v-for="priceGroup in nestedData" :key="priceGroup.range" class="mb-8">
        <div @click="togglePrice(priceGroup.range)" class="flex items-center justify-between bg-white p-5 rounded-2xl shadow-md cursor-pointer hover:bg-slate-50 border-l-8 border-indigo-600">
            <div class="flex items-center gap-4">
                <h2 class="text-xl font-black text-slate-800">{{ priceGroup.range }}</h2>
                <span class="bg-indigo-100 text-indigo-600 text-xs px-3 py-1 rounded-full font-bold">{{ priceGroup.totalCount }} 檔</span>
            </div>
            <i :class="isPriceCollapsed(priceGroup.range) ? 'fa-chevron-down' : 'fa-chevron-up'" class="fa-solid text-slate-300"></i>
        </div>

        <div v-show="!isPriceCollapsed(priceGroup.range)" class="mt-4 ml-4 space-y-10 border-l-2 border-slate-200 pl-6">
            <div v-for="yGroup in priceGroup.yieldGroups" :key="yGroup.label" v-show="yGroup.items.length > 0">
                <div class="flex items-center gap-2 mb-4">
                    <div :class="yGroup.color" class="w-3 h-3 rounded-full"></div>
                    <h3 class="font-bold text-slate-600 text-lg">{{ yGroup.label }}</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div v-for="s in yGroup.items" :key="s.id" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-black">{{ s.category }}</span>
                                <h3 class="text-lg font-black text-slate-800 mt-1">{{ s.id }} {{ s.chineseName }}</h3>
                            </div>
                            <div class="text-xl font-black text-slate-900">${{ s.price }}</div>
                        </div>

                        <div class="grid grid-cols-3 gap-2 text-center bg-slate-50 p-3 rounded-2xl">
                            <div>
                                <p class="text-[8px] text-slate-400 font-bold">現金</p>
                                <p class="font-black text-slate-700 text-sm">{{ s.cashYield }}%</p>
                            </div>
                            <div>
                                <p class="text-[8px] text-slate-400 font-bold">股票</p>
                                <p class="font-black text-slate-700 text-sm">{{ s.stockYield }}%</p>
                            </div>
                            <div class="bg-white rounded-lg shadow-sm border border-slate-100">
                                <p class="text-[8px] text-indigo-500 font-bold">合計</p>
                                <p class="font-black text-indigo-600 text-sm">{{ s.totalYield }}%</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                stocks: [],
                search: '',
                collapsedPrices: ['股價 50 - 100 元', '股價 0 - 50 元'], // 預設摺疊較低價位
                catMap: { 'Technology': '資訊科技', 'Financial Services': '金融保險', 'Industrials': '航運/工業', 'Consumer Cyclical': '消費性電子' },
                nameMap: { '2330': '台積電', '1476': '儒鴻', '1477': '聚陽', '1519': '華城', '1560': '中砂' }
            }
        },
        computed: {
            filtered() {
                return this.stocks.filter(s => s.id.includes(this.search) || s.chineseName.includes(this.search));
            },
            nestedData() {
                const ranges = [
                    { label: "股價 300+ 元", min: 300, max: 99999 },
                    { label: "股價 100 - 300 元", min: 100, max: 300 },
                    { label: "股價 50 - 100 元", min: 50, max: 100 },
                    { label: "股價 0 - 50 元", min: 0, max: 50 }
                ];
                
                return ranges.map(r => {
                    const inRange = this.filtered.filter(s => s.price >= r.min && s.price < r.max);
                    const sort = (arr) => arr.sort((a, b) => b.totalYield - a.totalYield);
                    
                    return {
                        range: r.label,
                        totalCount: inRange.length,
                        yieldGroups: [
                            { label: "合計殖利率 10% 以上", color: "bg-red-500", items: sort(inRange.filter(s => s.totalYield >= 10)) },
                            { label: "合計殖利率 5 - 10%", color: "bg-emerald-500", items: sort(inRange.filter(s => s.totalYield >= 5 && s.totalYield < 10)) },
                            { label: "合計殖利率 0 - 5%", color: "bg-slate-300", items: sort(inRange.filter(s => s.totalYield < 5)) }
                        ]
                    };
                });
            }
        },
        methods: {
            async load() {
                const res = await fetch('./data.json?v=' + Date.now());
                const data = await res.json();
                this.stocks = data.map(s => ({
                    ...s,
                    chineseName: this.nameMap[s.id] || s.name.split(' ')[0].replace('CO.,LTD.', ''),
                    category: this.catMap[s.category] || '一般產業'
                }));
            },
            togglePrice(range) {
                const i = this.collapsedPrices.indexOf(range);
                if (i > -1) this.collapsedPrices.splice(i, 1);
                else this.collapsedPrices.push(range);
            },
            isPriceCollapsed(range) { return this.collapsedPrices.includes(range); }
        },
        mounted() { this.load(); }
    }).mount('#app');
</script>
</body>
</html>
